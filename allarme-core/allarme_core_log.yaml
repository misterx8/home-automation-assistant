# ============================================================================
# ALLARME CORE - LOGBOOK "CORE ONLY" (UNICO FILE)
# Mostra SOLO gli eventi scritti dalle automazioni usando una entity fittizia:
#   input_text.allarme_core_logbook_event
#
# Nota: quando scatta l'allarme lo stato diventa "triggered" (non "allarme")
# ============================================================================

# ----------------------------------------------------------------------------
# ENTITY FITTIZIA (serve solo per filtrare la Logbook card)
# ----------------------------------------------------------------------------
input_text:
  allarme_core_logbook_event:
    name: Allarme Core Logbook Event
    max: 255
  allarme_core_logbook_ultimo_evento:
    name: Allarme Core Logbook ultimo Evento
    max: 255
  allarme_core_nota_manuale:
    name: "Allarme Core - Nota Manuale"
    max: 255
    icon: mdi:note-text

# ----------------------------------------------------------------------------
# SCRIPT UNICO: emette evento nel Logbook e aggiorna l'entity fittizia
# ----------------------------------------------------------------------------
script:
  allarme_core_logbook_emit:
    alias: "Allarme Core - Emit Logbook Event"
    mode: queued
    max: 50
    fields:
      msg:
        description: "Messaggio evento"
    sequence:
      - service: logbook.log
        data:
          name: "Allarme Core"
          entity_id: input_text.allarme_core_logbook_event
          message: "{{ msg | string }}"
      - service: input_text.set_value
        data:
          entity_id: input_text.allarme_core_logbook_ultimo_evento
          value: "{{ msg | string }}"

  allarme_core_logbook_nota:
    alias: "Allarme Core - Nota Logbook"
    icon: mdi:note-plus
    mode: queued
    max: 50
    fields:
      nota:
        description: "Testo nota"
        example: "Manutenzione / test sirena"
    sequence:
      - service: script.allarme_core_logbook_emit
        data:
          msg: "📝 Nota: {{ nota | string }}"

  # Salva la nota scritta nel campo UI input_text.allarme_core_nota_manuale
  allarme_core_logbook_nota_da_ui:
    alias: "Allarme Core - Salva Nota da UI"
    icon: mdi:content-save
    mode: queued
    max: 50
    sequence:
      - variables:
          testo: "{{ states('input_text.allarme_core_nota_manuale') | trim }}"
      - condition: template
        value_template: "{{ testo | length > 0 }}"
      - service: script.allarme_core_logbook_emit
        data:
          msg: "📝 Nota: {{ testo }}"
      - service: input_text.set_value
        target:
          entity_id: input_text.allarme_core_nota_manuale
        data:
          value: ""

  allarme_core_logbook_cancella_tutto:
    alias: "Allarme Core - Cancella Tutto Logbook"
    icon: mdi:delete
    mode: queued
    max: 50
    sequence:
      - service: var.set
        data:
          entity_id: 
            - var.allarme_core_timeline_md
            - var.allarme_core_timeline_critici_md
            - var.allarme_core_timeline_note_md
            - var.allarme_core_timeline_operazioni_md
          value: ""
          attributes:
            long_state: ""

  allarme_core_snapshot_cameras:
    alias: "Allarme Core - Snapshot Cameras"
    mode: queued
    max: 50
    fields:
      cameras:
        description: "Lista entity_id camera"
      tag:
        description: "Tag nel nome file (es. sensore/area)"
      ts:
        description: "Timestamp (YYYYMMDD_HHMMSS) - se non fornito usa now()"
    sequence:
      - variables:
          ts_use: "{{ ts if (ts is defined and ts | string | length > 0) else now().strftime('%Y%m%d_%H%M%S') }}"
          cams: "{{ cameras if (cameras is iterable and cameras is not string) else ([cameras] if cameras else []) }}"
      - repeat:
          for_each: "{{ cams }}"
          sequence:
            - service: camera.snapshot
              data:
                entity_id: "{{ repeat.item }}"
                filename: "/config/www/allarme_core_snapshots/{{ ts_use }}_{{ tag | regex_replace('[^a-zA-Z0-9_-]', '_') }}_{{ repeat.item.split('.')[1] }}.jpg"

# ----------------------------------------------------------------------------
# AUTOMAZIONI: scrivono SOLO tramite lo script (quindi filtrabili al 100%)
# ----------------------------------------------------------------------------
automation:

  - alias: "Allarme Core - Logbook Sensori Esclusi (solo su change var)"
    id: allarme_core_logbook_esclusi_onchange
    mode: queued
    max: 50
    trigger:
      - platform: state
        entity_id: var.allarme_core_sensori_esclusi_var

    # evita log se riscrive uguale
    condition:
      - condition: template
        value_template: >
          {{ trigger.from_state is none
            or trigger.from_state.state != trigger.to_state.state }}
      # non loggare il reset automatico a 0 che avviene al disarmo
      - condition: template
        value_template: "{{ states('input_select.allarme_core_stato') != 'disarmed' }}"

    variables:
      esclusi: >
        {% set raw = trigger.to_state.state | string | trim %}
        {% set raw = raw | replace("'", '"') %}
        {{ (raw | from_json) if raw.startswith('[') else [] }}

    action:
      - service: script.allarme_core_logbook_emit
        data:
          msg: >
            ⚠️ ESCLUSI aggiornati: {{ esclusi | length }}
            {% if esclusi|length>0 %}— {{ esclusi|join(', ') }}{% endif %}
            (Profilo: {{ states('input_select.allarme_core_profilo') }})

  # Log cambio stato allarme (armato/disarmato/triggered/altro)
  - alias: "Allarme Core - Logbook Cambio Stato (Core Only)"
    id: allarme_core_logbook_cambio_stato_coreonly
    mode: queued
    max: 50
    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato

    condition:
      - condition: template
        value_template: >
          {{ trigger.from_state is none
            or trigger.from_state.state != trigger.to_state.state }}
      - condition: template
        value_template: "{{ trigger.to_state.state != 'triggered' }}"

    action:
      - choose:
          - conditions: "{{ trigger.to_state.state == 'armed' }}"
            sequence:
              - service: script.allarme_core_logbook_emit
                data:
                  msg: "🔒 ARMATO (Profilo: {{ states('input_select.allarme_core_profilo') }})"

          - conditions: "{{ trigger.to_state.state == 'disarmed' }}"
            sequence:
              - service: script.allarme_core_logbook_emit
                data:
                  msg: "🔓 DISARMATO (Profilo: {{ states('input_select.allarme_core_profilo') }})"

          - conditions: "{{ trigger.to_state.state == 'arming' }}"
            sequence:
              - service: script.allarme_core_logbook_emit
                data:
                  msg: "🔐 INSERIMENTO (Profilo: {{ states('input_select.allarme_core_profilo') }})"

        default:
          - service: script.allarme_core_logbook_emit
            data:
              msg: >
                🛡️ Stato: {{ trigger.from_state.state if trigger.from_state else 'startup' }}
                → {{ trigger.to_state.state }}
                (Profilo: {{ states('input_select.allarme_core_profilo') }})

  # Log cambio profilo
  - alias: "Allarme Core - Logbook Cambio Profilo (Core Only)"
    id: allarme_core_logbook_cambio_profilo_coreonly
    mode: queued
    max: 50
    trigger:
      - platform: state
        entity_id: input_select.allarme_core_profilo
    action:
      - service: script.allarme_core_logbook_emit
        data:
          msg: >
            ⚙️ Profilo: {{ trigger.from_state.state if trigger.from_state is not none else 'startup' }}
            → {{ trigger.to_state.state }}

  # Log allarme scattato: stato -> triggered
  - alias: "Allarme Core - Logbook Allarme Scattato (Core Only)"
    id: allarme_core_logbook_allarme_scattato_coreonly
    mode: queued
    max: 50
    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato
        to: "triggered"
    variables:
      aperti: "{{ state_attr('sensor.allarme_core_sensori_aperti_filtrati', 'sensori_aperti_ids') or [] }}"
      esclusi: >
        {% set raw = states('var.allarme_core_sensori_esclusi_var') | string | trim %}
        {% set raw = raw | replace("'", '"') %}
        {{ (raw | from_json) if raw.startswith('[') else [] }}
    action:
      - service: script.allarme_core_logbook_emit
        data:
          msg: >
            🚨 ALLARME SCATTATO! (triggered)
            | Aperti: {{ aperti | length }}{% if aperti | length > 0 %} — {{ aperti | join(', ') }}{% endif %}
            | Esclusi: {{ esclusi | length }}{% if esclusi | length > 0 %} — {{ esclusi | join(', ') }}{% endif %}
            (Profilo: {{ states('input_select.allarme_core_profilo') }})

  # Log e salvataggio snap telecamere
  - alias: "Allarme Core - Snapshot e clips su Triggered (camere da sensori)"
    id: allarme_core_snapshot_clip_on_triggered
    mode: queued
    max: 50
    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato
        to: "triggered"

    action:
      # Attendi che allarme_core_aut_memorizza_sensori_causa_allarme scriva la var aggiornata
      - wait_for_trigger:
          - platform: state
            entity_id: var.allarme_core_sensori_attivazione_allarme_var
        timeout: "00:00:05"
        continue_on_timeout: true

      # Calcola tutte le variabili DOPO l'aggiornamento della var (non al trigger time)
      - variables:
          raw: "{{ states('var.allarme_core_sensori_attivazione_allarme_var') | default('', true) | string }}"
          aperti_ids: >
            {{ (raw | regex_findall('binary_sensor\\.[a-zA-Z0-9_-]+')) | unique | list }}

          cams_all: >
            {% set ns = namespace(out=[]) %}
            {% for s in aperti_ids %}
              {% set cams0 = state_attr(s,'camera') | default([], true) %}
              {% set cams = cams0 if (cams0 is iterable and cams0 is not string) else [cams0] %}
              {% set cams_norm = cams | map('string') | map('trim') | reject('equalto','') | list %}
              {% for c in cams_norm %}
                {% if c.startswith('camera.') %}
                  {% set ns.out = ns.out + [c] %}
                {% endif %}
              {% endfor %}
            {% endfor %}
            {{ ns.out | unique | list }}

          tag: "{{ aperti_ids[0].split('.')[1] if aperti_ids|length > 0 else 'triggered' }}"

          # Un unico ts condiviso da URL e script → nessun mismatch
          ts: "{{ now().strftime('%Y%m%d_%H%M%S') }}"

          snapshot_urls_text: >
            {% set safe_tag = (tag | string | regex_replace('[^a-zA-Z0-9_-]', '_')) %}
            {% set ns = namespace(out=[]) %}
            {% for c in cams_all %}
              {% set cam = (c | string).split('.')[1] %}
              {% set ns.out = ns.out + ['/local/allarme_core_snapshots/' ~ ts ~ '_' ~ safe_tag ~ '_' ~ cam ~ '.jpg'] %}
            {% endfor %}
            {{ ns.out | join('\n') }}

          frigate_base: "http://192.168.2.92:5000"
          clip_start_ts: "{{ (as_timestamp(now()) - 30) | int }}"
          clip_end_ts: "{{ (as_timestamp(now()) + 10) | int }}"

          clips_text: >
            {% set ns = namespace(out=[]) %}
            {% for c in cams_all %}
              {% set cam = state_attr(c,'camera_name') | default('', true) | string | trim %}
              {% if not cam %}
                {% set cam = (c | string).split('.')[1] %}
              {% endif %}
              {% set ns.out = ns.out + [
                frigate_base ~ '/api/' ~ cam ~ '/start/' ~ clip_start_ts ~ '/end/' ~ clip_end_ts ~ '/clip.mp4'
              ] %}
            {% endfor %}
            {{ ns.out | join('\n') }}

      - condition: template
        value_template: "{{ cams_all | length > 0 }}"

      - service: script.allarme_core_snapshot_cameras
        data:
          cameras: "{{ cams_all }}"
          tag: "{{ tag }}"
          ts: "{{ ts }}"

      - service: var.set
        data:
          entity_id: var.allarme_core_last_snapshot_urls
          value: ""
          attributes:
            long_state: "{{ snapshot_urls_text }}"

      - service: var.set
        data:
          entity_id: var.allarme_core_last_clip_urls
          value: ""
          attributes:
            long_state: "{{ clips_text }}"

      - service: script.allarme_core_logbook_emit
        data:
          msg: >
            📸 Snapshot salvati: {{ cams_all | length }}
            {% if cams_all|length>0 %}— {{ cams_all | join(', ') }}{% endif %}

      - service: script.allarme_core_logbook_emit
        data:
          msg: >
            🎥 Clip generati: {{ cams_all | length }}
            {% if cams_all|length>0 %}— {{ cams_all | join(', ') }}{% endif %}
# ----------------------------------------------------------------------------
# AUTOMAZIONI PER VISUALIZZARE I LOG BENE IN UI
# ----------------------------------------------------------------------------

  - alias: "Allarme Core - UI Timeline Append"
    trigger:
      - platform: state
        entity_id: input_text.allarme_core_logbook_ultimo_evento
    variables:
      ora: "{{ now().strftime('%H:%M:%S') }}"
      line: "- **{{ ora }}** {{ trigger.to_state.state }}"
    action:
      - service: var.set
        data:
          entity_id: var.allarme_core_timeline_md
          attributes:
            long_state: >
              {{ line }}
              {{ '\n' }}
              {{ state_attr('var.allarme_core_timeline_md','long_state') }}

  - alias: "Allarme Core - UI Timeline Sezioni (Livello 4)"
    id: allarme_core_ui_timeline_sezioni_l4
    mode: queued
    max: 50
    trigger:
      - platform: state
        entity_id: input_text.allarme_core_logbook_ultimo_evento

    # evita append su startup o valori vuoti
    condition:
      - condition: template
        value_template: >
          {{ trigger.to_state is not none
            and (trigger.to_state.state | string | trim) != ''
            and (trigger.from_state is none or trigger.from_state.state != trigger.to_state.state) }}

    variables:
      ts: "{{ now().strftime('%H:%M:%S') }}"
      msg: "{{ trigger.to_state.state | string }}"
      line: "- **{{ ts }}** {{ msg }}"
      keep: 25

      # classificazione (basata sulle emoji che tu già usi)
      target: >
        {% if '🚨' in msg %}
          critici
        {% elif '📝' in msg %}
          note
        {% else %}
          operazioni
        {% endif %}

      ent: >
        {% if target == 'critici' %}
          var.allarme_core_timeline_critici_md
        {% elif target == 'note' %}
          var.allarme_core_timeline_note_md
        {% else %}
          var.allarme_core_timeline_operazioni_md
        {% endif %}

      old: "{{ state_attr(ent,'long_state') | string }}"
      old_lines: >
        {% set lines = old.split('\n') if old|length > 0 else [] %}
        {{ lines }}

      new_value: >
        {% set out = [line] + old_lines %}
        {% set out = out[:keep] %}
        {{ out | join('\n') }}

    action:
      - service: var.set
        data:
          entity_id: "{{ ent }}"
          attributes:
            long_state: "{{ new_value }}"

template:
  - sensor:
    # FIX AC-BUG-04: sensori indentati a 4 spazi invece di 6 → HA non li caricava.
    # Corretta l'indentazione a 6 spazi (livello corretto sotto "- sensor:").
      # FIX AC-BUG-04 (residuo): aggiunto unique_id a tutti e 4 i sensori template
      # (segnalato dal debugger di validazione — senza unique_id non gestibili via UI HA)
      - name: "Allarme Core – Timeline Render"
        unique_id: allarme_core_timeline_render
        state: ""
        attributes:
          long_state: >
            {% set src = state_attr('var.allarme_core_timeline_md','long_state') | default('', true) | string %}
            {% set lines = src.split('\n')
              | map('trim')
              | reject('equalto','')
              | list %}
            {% set out = namespace(v=[]) %}
            {% for l in lines[:20] %}
              {% if '🚨' in l %}
                {% set out.v = out.v + ['🔴 ' ~ l] %}
              {% elif '🔒' in l %}
                {% set out.v = out.v + ['🟢 ' ~ l] %}
              {% elif '🔓' in l %}
                {% set out.v = out.v + ['⚪ ' ~ l] %}
              {% elif '🔐' in l %}
                {% set out.v = out.v + ['🟡 ' ~ l] %}
              {% elif '📝' in l %}
                {% set out.v = out.v + ['⚫ ' ~ l] %}
              {% else %}
                {% set out.v = out.v + ['🔵 ' ~ l] %}
              {% endif %}
            {% endfor %}
            {{ out.v | join('\n') }}

      - name: "Allarme Core – Count Critici"
        unique_id: allarme_core_count_critici
        state: >
          {% set s = state_attr('var.allarme_core_timeline_critici_md','long_state') | default('', true) | string %}
          {{ (s.split('\n') | map('trim') | reject('equalto','') | list) | length }}
      - name: "Allarme Core – Count Operazioni"
        unique_id: allarme_core_count_operazioni
        state: >
          {% set s = state_attr('var.allarme_core_timeline_operazioni_md','long_state') | default('', true) | string %}
          {{ (s.split('\n') | map('trim') | reject('equalto','') | list) | length }}
      - name: "Allarme Core – Count Note"
        unique_id: allarme_core_count_note
        state: >
          {% set s = state_attr('var.allarme_core_timeline_note_md','long_state') | default('', true) | string %}
          {{ (s.split('\n') | map('trim') | reject('equalto','') | list) | length }}

      - name: "Allarme Core – Ultimo Trigger"
        unique_id: allarme_core_ultimo_trigger
        state: >
          {% set raw = states('var.allarme_core_sensori_attivazione_allarme_var') | string | trim %}
          {% set ids = [] if raw in ['unknown', 'unavailable', ''] else raw.split(', ') | reject('equalto','') | list %}
          {% if ids | length == 0 %}
            Nessun evento
          {% elif ids | length == 1 %}
            {{ state_attr(ids[0], 'friendly_name') | default(ids[0]) }}
          {% else %}
            {{ state_attr(ids[0], 'friendly_name') | default(ids[0]) }} +{{ ids | length - 1 }}
          {% endif %}
        attributes:
          sensori_ids: >
            {% set raw = states('var.allarme_core_sensori_attivazione_allarme_var') | string | trim %}
            {{ [] if raw in ['unknown', 'unavailable', ''] else raw.split(', ') | reject('equalto','') | list }}
          sensori_nomi: >
            {% set raw = states('var.allarme_core_sensori_attivazione_allarme_var') | string | trim %}
            {% set ids = [] if raw in ['unknown', 'unavailable', ''] else raw.split(', ') | reject('equalto','') | list %}
            {% set ns = namespace(nomi=[]) %}
            {% for eid in ids %}
              {% set ns.nomi = ns.nomi + [state_attr(eid, 'friendly_name') | default(eid)] %}
            {% endfor %}
            {{ ns.nomi }}
          zone: >
            {% set raw = states('var.allarme_core_sensori_attivazione_allarme_var') | string | trim %}
            {% set ids = [] if raw in ['unknown', 'unavailable', ''] else raw.split(', ') | reject('equalto','') | list %}
            {% set ns = namespace(zone=[]) %}
            {% for eid in ids %}
              {% set z = state_attr(eid, 'zone') | default([]) %}
              {% for zona in z %}
                {% if zona not in ns.zone %}
                  {% set ns.zone = ns.zone + [zona] %}
                {% endif %}
              {% endfor %}
            {% endfor %}
            {{ ns.zone }}
          profilo: >
            {{ state_attr('var.allarme_core_sensori_attivazione_allarme_var', 'profilo') | default('sconosciuto') }}
          data_evento: >
            {% if states.var.allarme_core_sensori_attivazione_allarme_var is not none %}
              {% set lc = states.var.allarme_core_sensori_attivazione_allarme_var.last_changed %}
              {{ lc | as_local | as_timestamp | timestamp_custom('%d/%m/%Y %H:%M:%S', true) }}
            {% else %}
              Nessun dato
            {% endif %}
          num_snapshot: >
            {% set ls = state_attr('var.allarme_core_last_snapshot_urls', 'long_state') | default('', true) | string %}
            {{ ls.split('\n') | map('trim') | reject('equalto','') | list | length }}
          num_clip: >
            {% set ls = state_attr('var.allarme_core_last_clip_urls', 'long_state') | default('', true) | string %}
            {{ ls.split('\n') | map('trim') | reject('equalto','') | list | length }}
          snapshot_urls: >
            {% set base_raw = states('input_text.allarme_core_url_base_ha') | trim %}
            {% set base = '' if base_raw in ['unknown', 'unavailable'] else base_raw %}
            {% set ls = state_attr('var.allarme_core_last_snapshot_urls', 'long_state') | default('', true) | string %}
            {% set righe = ls.split('\n') | map('trim') | reject('equalto','') | list %}
            {% if base | length == 0 %}
              {{ righe }}
            {% else %}
              {% set ns = namespace(out=[]) %}
              {% for r in righe %}
                {% set ns.out = ns.out + [base ~ r] %}
              {% endfor %}
              {{ ns.out }}
            {% endif %}
          clip_urls: >
            {% set base_old = 'http://192.168.2.92:5000' %}
            {% set base_new_raw = states('input_text.allarme_core_url_base_frigate') | trim %}
            {% set base_new = '' if base_new_raw in ['unknown', 'unavailable'] else base_new_raw %}
            {% set token = states('input_text.allarme_core_frigate_token') | trim %}
            {% set token = '' if token in ['unknown', 'unavailable'] else token %}
            {% set ls = state_attr('var.allarme_core_last_clip_urls', 'long_state') | default('', true) | string %}
            {% set righe = ls.split('\n') | map('trim') | reject('equalto','') | list %}
            {% if base_new | length == 0 %}
              {{ righe }}
            {% else %}
              {% set ns = namespace(out=[]) %}
              {% for r in righe %}
                {% set url = r | replace(base_old, base_new) %}
                {% set url = url ~ '?token=' ~ token if token | length > 0 else url %}
                {% set ns.out = ns.out + [url] %}
              {% endfor %}
              {{ ns.out }}
            {% endif %}