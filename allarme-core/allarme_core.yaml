input_boolean:
  allarme_core_panico_attivo:
    name: "Allarme Core - Panico Attivo"
    icon: mdi:alarm-light

script:
  arm_allarme_core:
    mode: restart
    sequence:
      - service: input_select.select_option
        target:
          entity_id: input_select.allarme_core_stato
        data:
          option: arming

      - delay:
          seconds: "{{ states('input_number.allarme_core_arming_delay') | int(20) }}"

      - service: input_select.select_option
        target:
          entity_id: input_select.allarme_core_stato
        data:
          option: armed
  allarme_core_attiva_panico:
    alias: "Allarme Core - Attiva PANICO"
    icon: mdi:alarm-light
    mode: single
    sequence:
      # Attiva segnale canale separato per Node-RED PRIMA del triggered
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.allarme_core_panico_attivo
      # Registra timestamp triggered (anticipa l'automazione automatica)
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.allarme_core_triggered_started
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      # Forza stato triggered
      - service: input_select.select_option
        target:
          entity_id: input_select.allarme_core_stato
        data:
          option: triggered
      # Log evento PANICO
      - service: script.allarme_core_logbook_emit
        data:
          msg: "🚨 PANICO manuale attivato da UI"

  disarm_allarme_core:
    sequence:
      # FIX AC-BUG-06: stoppa arm_allarme_core prima di impostare disarmed.
      # Senza questo, il delay del script arm continua in background e dopo X secondi
      # sovrascrive lo stato con 'armed', ignorando il disarm dell'utente.
      - service: script.turn_off
        target:
          entity_id: script.arm_allarme_core
      # FIX AC-BUG-01: entity_id spostato da data: a target: (sintassi deprecata causava failure silenzioso)
      - service: input_select.select_option
        target:
          entity_id: input_select.allarme_core_stato
        data:
          option: disarmed


alarm_control_panel:
  - platform: template
    panels:
      allarme_core:
        name: "Allarme Core Casa"
        value_template: >
          {% if states('input_select.allarme_core_stato') == 'armed' %}
            armed_away
          {% else %}
            {{ states('input_select.allarme_core_stato') }}
          {% endif %}
        code_arm_required: false
        arm_away:
          action: script.arm_allarme_core
        disarm:
          action: script.disarm_allarme_core



input_select:
  allarme_core_stato:
    name: Stato Allarme
    options:
      - disarmed
      - armed
      - triggered
      - arming
  allarme_core_profilo:
    name: Profilo Allarme
    options:
      - nessuno
      - sera
      - giorno
      - tutti
      - notte
  allarme_core_zone_disponibili:
    name: Allarme Core Zone Disponibili
    options:
      - perimetrali
      - volumetrici
      - giorno
      - sera
      - notte

input_text:
  allarme_core_ultimo_evento:
    name: Ultimo Evento Allarme
    max: 255
  allarme_core_sensori_esclusi:
    name: Sensori esclusi all'attivazione
    max: 255
  allarme_core_url_base_ha:
    name: "Allarme Core - URL Base HA (esterno)"
    max: 255
    icon: mdi:web
  allarme_core_url_base_frigate:
    name: "Allarme Core - URL Base Frigate (esterno)"
    max: 255
    icon: mdi:web
  allarme_core_frigate_token:
    name: "Allarme Core - Frigate Token"
    max: 255
    icon: mdi:key

input_number:
  allarme_core_arming_delay:
    name: "Allarme Core - Tempo Inserimento (sec)"
    min: 5
    max: 120
    step: 5
    initial: 20
    unit_of_measurement: s
    icon: mdi:timer-outline
    mode: slider
  allarme_core_notifica_timeout_secondi:
    name: "Allarme Core - Timeout Notifica (sec)"
    min: 10
    max: 120
    step: 5
    initial: 45
    unit_of_measurement: s
    icon: mdi:timer-alert-outline
    mode: slider

# FIX AC-BUG-05: input_datetime mancante — era referenziato nell'availability del sensore
# "Allarme Core Sensori Aperti Filtrati" ma non era definito in nessun file del progetto.
# Senza questa entity, arming_ts era sempre none e il sensore risultava unavailable
# durante lo stato 'arming'. L'automazione di set è in allarme_core_automazioni.yaml.
input_datetime:
  allarme_core_arming_started:
    name: "Allarme Core - Timestamp Inizio Arming"
    has_date: true
    has_time: true
  allarme_core_triggered_started:
    name: "Allarme Core - Timestamp Inizio Triggered"
    has_date: true
    has_time: true

template:
  - sensor:

# sensore che mappa il profilo allarme sulle zone
      - name: "Allarme Core Zone Attive"
        unique_id: allarme_core_zone_attive
        state: "{{ states('input_select.allarme_core_profilo') }}"
        attributes:
          zones: >
            {% set mappa = {
              'tutti': ['perimetrali','volumetrici'],
              'sera': ['sera'],
              'giorno': ['giorno'],
              'notte': ['notte'],
              'nessuno': []
            } %}
            {{ mappa.get(states('input_select.allarme_core_profilo'), []) }}

#sensore per zone attive che indica quanti sensori sono accesi su quella determinata zona
      - name: "Allarme Core Count Zona Sera"
        unique_id: allarme_core_count_zona_sera
        state: >
          {{
            states.binary_sensor
              | selectattr('entity_id','search','binary_sensor.allarme_core_')
              | selectattr('state','eq','on')
              | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
              | selectattr('attributes.zone','defined')
              | selectattr('attributes.zone','contains','sera')
              | list | count
          }}

      - name: "Allarme Core Count Zona Giorno"
        unique_id: allarme_core_count_zona_giorno
        state: >
          {{
            states.binary_sensor
              | selectattr('entity_id','search','binary_sensor.allarme_core_')
              | selectattr('state','eq','on')
              | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
              | selectattr('attributes.zone','defined')
              | selectattr('attributes.zone','contains','giorno')
              | list | count
          }}

      - name: "Allarme Core Count Zona Perimetrali"
        unique_id: allarme_core_count_zona_perimetrali
        state: >
          {{
            states.binary_sensor
              | selectattr('entity_id','search','binary_sensor.allarme_core_')
              | selectattr('state','eq','on')
              | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
              | selectattr('attributes.zone','defined')
              | selectattr('attributes.zone','contains','perimetrali')
              | list | count
          }}

      - name: "Allarme Core Count Zona Volumetrici"
        unique_id: allarme_core_count_zona_volumetrici
        state: >
          {{
            states.binary_sensor
              | selectattr('entity_id','search','binary_sensor.allarme_core_')
              | selectattr('state','eq','on')
              | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
              | selectattr('attributes.zone','defined')
              | selectattr('attributes.zone','contains','volumetrici')
              | list | count
          }}

      - name: "Allarme Core Count Zona Notte"
        unique_id: allarme_core_count_zona_notte
        state: >
          {{
            states.binary_sensor
              | selectattr('entity_id','search','binary_sensor.allarme_core_')
              | selectattr('state','eq','on')
              | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
              | selectattr('attributes.zone','defined')
              | selectattr('attributes.zone','contains','notte')
              | list | count
          }}
#-------------------------------------------------------------------------------------------------------------
# sensori utilità per allarme
      - name: "Allarme Core Sensori Esclusi (Memoria)"
        unique_id: allarme_core_sensori_esclusi_memoria
        state: >
          {% set v = states('input_text.allarme_core_sensori_esclusi') %}
          {{ 'true' if v not in ['', '[]', 'unknown'] else 'false' }}
        attributes:
          sensori: >
            {% set v = states('input_text.allarme_core_sensori_esclusi') %}
            {% if v not in ['', 'unknown'] %}
              {{ v | from_json }}
            {% else %}
              []
            {% endif %}      
      - name: "Allarme Core Sensori Attivi"
        unique_id: allarme_core_sensori_attivi
        icon: mdi:alert
        state: >
          {{
            states.binary_sensor
              | selectattr('entity_id', 'search', 'binary_sensor.allarme_core_')
              | selectattr('state', 'eq', 'on')
              | selectattr('attributes.abilitato', 'defined')
              | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
              | map(attribute='attributes.friendly_name')
              | join(', ')
              if (
                states.binary_sensor
                  | selectattr('entity_id', 'search', 'binary_sensor.allarme_core_')
                  | selectattr('state', 'eq', 'on')
                  | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
                  | list
                  | count > 0
              )
              else 'Nessun sensore attivo'
          }}
        attributes:
          elenco: >
            {{
              states.binary_sensor
                | selectattr('entity_id','search','binary_sensor.allarme_core_')
                | selectattr('state','eq','on')
                | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
                | map(attribute='attributes.friendly_name')
                | list
            }}

# sensore utilità su node-red per conoscere sensori attivi in base a zone allarme inserito e anche con l'esclusione di eventuali sensori aperti all'atto dell'attivazione
      - name: "Allarme Core Sensori Aperti Filtrati"
        unique_id: allarme_core_sensori_aperti_filtrati
        
        # Attendi che stato sia armed da almeno 2 secondi
        availability: >
          {% set stato = states('input_select.allarme_core_stato') %}
          {% set arming_ts = as_timestamp(states('input_datetime.allarme_core_arming_started')) %}
          {% set var_ts = as_timestamp(states.var.allarme_core_sensori_esclusi_var.last_changed) %}

          {% if stato == 'armed' %}
            true
          {% elif stato == 'arming' %}
            {{ arming_ts is not none and var_ts >= arming_ts }}
          {% else %}
            true
          {% endif %}

        state: >
          {% set profilo = states('input_select.allarme_core_profilo') %}
          {% set stato = states('input_select.allarme_core_stato') %}
          {% set zone_attive = state_attr('sensor.allarme_core_zone_attive','zones') or [] %}
          {% set esclusi = states('var.allarme_core_sensori_esclusi_var') or [] %}

          {# FIX-B: aggiunto 'triggered' alla lista stati validi #}
          {% if profilo == 'nessuno' or stato not in ['armed', 'triggered'] %}
            false
          {% else %}
            {% set ns = namespace(found=false) %}
            {% for sensor in states.binary_sensor
              | selectattr('entity_id','search','binary_sensor.allarme_core_')
              | selectattr('state','eq','on')
              | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
              | selectattr('attributes.zone','defined') %}
              {% if sensor.entity_id not in esclusi %}
                {% set zone_sensor = sensor.attributes.zone %}
                {% if zone_sensor | select('in', zone_attive) | list | length > 0 %}
                  {% set ns.found = true %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.found }}
          {% endif %}

        attributes:
          profilo: "{{ states('input_select.allarme_core_profilo') }}"
          stato_allarme: "{{ states('input_select.allarme_core_stato') }}"
          
          sensori_aperti_ids: >
            {% set profilo = states('input_select.allarme_core_profilo') %}
            {% set stato = states('input_select.allarme_core_stato') %}
            {% set zone_attive = state_attr('sensor.allarme_core_zone_attive','zones') or [] %}
            {% set esclusi = states('var.allarme_core_sensori_esclusi_var') or [] %}

            {# FIX-B: aggiunto 'triggered' alla lista stati validi #}
            {% if profilo == 'nessuno' or stato not in ['armed', 'triggered'] %}
              []
            {% else %}
              {% set ns = namespace(ids=[]) %}
              {% for sensor in states.binary_sensor
                | selectattr('entity_id','search','binary_sensor.allarme_core_')
                | selectattr('state','eq','on')
                | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
                | selectattr('attributes.zone','defined') %}
                {% if sensor.entity_id not in esclusi %}
                  {% set zone_sensor = sensor.attributes.zone %}
                  {% if zone_sensor | select('in', zone_attive) | list | length > 0 %}
                    {% set ns.ids = ns.ids + [sensor.entity_id] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ ns.ids }}
            {% endif %}
          
          conteggio: >
            {{ this.attributes.sensori_aperti_ids | length if this.attributes.sensori_aperti_ids is defined else 0 }}



  - binary_sensor:
# sensore utilita su node-red per conoscere sensori attivi su determinata zona in base ad allarme e profilo inserito cosi possiamo capire se si puo armare o meno allarme con sensori aperti su quella/e zone
      - name: "Allarme Core Sensori Aperti su Profilo Attivo"
        unique_id: allarme_core_sensori_aperti_profilo

        state: >
          {% set profilo = states('input_select.allarme_core_profilo') %}
          {% set stato = states('input_select.allarme_core_stato') %}
          {% set zone_attive = state_attr('sensor.allarme_core_zone_attive','zones') or [] %}

          {% if profilo == 'nessuno' or stato not in ['armed', 'arming'] %}
            false
          {% else %}
            {% set ns = namespace(found=false) %}
            {% for sensor in states.binary_sensor
              | selectattr('entity_id','search','binary_sensor.allarme_core_')
              | selectattr('state','eq','on')
              | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
              | selectattr('attributes.zone','defined') %}
              {% set zone_sensor = sensor.attributes.zone %}
              {% if zone_sensor | select('in', zone_attive) | list | length > 0 %}
                {% set ns.found = true %}
              {% endif %}
            {% endfor %}
            {{ ns.found }}
          {% endif %}

        attributes:
          profilo: "{{ states('input_select.allarme_core_profilo') }}"
          stato_allarme: "{{ states('input_select.allarme_core_stato') }}"
          zone_attive: "{{ state_attr('sensor.allarme_core_zone_attive','zones') or [] }}"

          sensori_aperti: >
            {% set profilo = states('input_select.allarme_core_profilo') %}
            {% set stato = states('input_select.allarme_core_stato') %}
            {% set zone_attive = state_attr('sensor.allarme_core_zone_attive','zones') or [] %}

            {% if profilo == 'nessuno' or stato not in ['armed', 'arming'] %}
              []
            {% else %}
              {% set ns = namespace(sensori=[]) %}
              {% for sensor in states.binary_sensor
                | selectattr('entity_id','search','binary_sensor.allarme_core_')
                | selectattr('state','eq','on')
                | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
                | selectattr('attributes.zone','defined') %}
                {% set zone_sensor = sensor.attributes.zone %}
                {% if zone_sensor | select('in', zone_attive) | list | length > 0 %}
                  {% set ns.sensori = ns.sensori + [{
                    'entity_id': sensor.entity_id,
                    'nome': sensor.attributes.friendly_name,
                    'zone': zone_sensor
                  }] %}
                {% endif %}
              {% endfor %}
              {{ ns.sensori }}
            {% endif %}
          
          sensori_aperti_ids: >
            {% set profilo = states('input_select.allarme_core_profilo') %}
            {% set stato = states('input_select.allarme_core_stato') %}
            {% set zone_attive = state_attr('sensor.allarme_core_zone_attive','zones') or [] %}

            {% if profilo == 'nessuno' or stato not in ['armed', 'arming'] %}
              []
            {% else %}
              {% set ns = namespace(ids=[]) %}
              {% for sensor in states.binary_sensor
                | selectattr('entity_id','search','binary_sensor.allarme_core_')
                | selectattr('state','eq','on')
                | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
                | selectattr('attributes.zone','defined') %}
                {% set zone_sensor = sensor.attributes.zone %}
                {% if zone_sensor | select('in', zone_attive) | list | length > 0 %}
                  {% set ns.ids = ns.ids + [sensor.entity_id] %}
                {% endif %}
              {% endfor %}
              {{ ns.ids }}
            {% endif %}
          
          conteggio: >
            {{ this.attributes.sensori_aperti_ids | length if this.attributes.sensori_aperti_ids is defined else 0 }}

      # Opzione 3: gate sincronizzazione notifica allarme.
      # Diventa 'on' quando tutti i dati sono pronti (sensori causa allarme +
      # eventuali media Frigate aggiornati dopo il trigger) oppure al timeout di fallback.
      # Node-RED si triggera sul fronte off->on di questo binary sensor per inviare notifiche.
      - name: "Allarme Core Dati Pronti"
        unique_id: allarme_core_dati_pronti

        state: >
          {% set stato = states('input_select.allarme_core_stato') %}
          {% if stato != 'triggered' %}
            false
          {% else %}
            {% set triggered_ts_raw = states('input_datetime.allarme_core_triggered_started') %}
            {% set triggered_ts = as_timestamp(triggered_ts_raw) if triggered_ts_raw not in ['unknown', 'unavailable', ''] else none %}
            {% set timeout_sec = states('input_number.allarme_core_notifica_timeout_secondi') | float(45) %}
            {% set secondi_da_triggered = (now().timestamp() - triggered_ts) if triggered_ts is not none else 9999 %}
            {% set timeout_scattato = secondi_da_triggered >= timeout_sec %}

            {% set sensori_raw = states('var.allarme_core_sensori_attivazione_allarme_var') %}
            {% set sensori_ok = sensori_raw not in ['', 'unknown', 'unavailable', 'none', 'None'] %}

            {% set frigate_url = states('input_text.allarme_core_url_base_frigate') %}
            {% set frigate_configurato = frigate_url not in ['', 'unknown', 'unavailable'] %}

            {# FIX scoping Jinja2: set dentro if/else non è visibile fuori — usare namespace #}
            {% set ns_media = namespace(snapshot_ok=false, clip_ok=false) %}
            {% if not frigate_configurato %}
              {% set ns_media.snapshot_ok = true %}
              {% set ns_media.clip_ok = true %}
            {% else %}
              {% set triggered_ts_safe = triggered_ts if triggered_ts is not none else 0 %}
              {% set snapshot_upd = as_timestamp(states.var.allarme_core_last_snapshot_urls.last_updated) if states.var.allarme_core_last_snapshot_urls is defined else none %}
              {% set clip_upd = as_timestamp(states.var.allarme_core_last_clip_urls.last_updated) if states.var.allarme_core_last_clip_urls is defined else none %}
              {% set ns_media.snapshot_ok = snapshot_upd is not none and snapshot_upd > triggered_ts_safe %}
              {% set ns_media.clip_ok = clip_upd is not none and clip_upd > triggered_ts_safe %}
            {% endif %}

            {% set dati_completi = sensori_ok and ns_media.snapshot_ok and ns_media.clip_ok %}
            {{ dati_completi or timeout_scattato }}
          {% endif %}

        attributes:
          dati_completi: >
            {% set stato = states('input_select.allarme_core_stato') %}
            {% if stato != 'triggered' %}
              false
            {% else %}
              {% set sensori_raw = states('var.allarme_core_sensori_attivazione_allarme_var') %}
              {% set sensori_ok = sensori_raw not in ['', 'unknown', 'unavailable', 'none', 'None'] %}
              {% set frigate_url = states('input_text.allarme_core_url_base_frigate') %}
              {% set frigate_configurato = frigate_url not in ['', 'unknown', 'unavailable'] %}
              {# FIX scoping Jinja2: usare namespace #}
              {% set ns_media = namespace(snapshot_ok=false, clip_ok=false) %}
              {% if not frigate_configurato %}
                {% set ns_media.snapshot_ok = true %}
                {% set ns_media.clip_ok = true %}
              {% else %}
                {% set triggered_ts_raw = states('input_datetime.allarme_core_triggered_started') %}
                {% set triggered_ts = as_timestamp(triggered_ts_raw) if triggered_ts_raw not in ['unknown', 'unavailable', ''] else 0 %}
                {% set snapshot_upd = as_timestamp(states.var.allarme_core_last_snapshot_urls.last_updated) if states.var.allarme_core_last_snapshot_urls is defined else none %}
                {% set clip_upd = as_timestamp(states.var.allarme_core_last_clip_urls.last_updated) if states.var.allarme_core_last_clip_urls is defined else none %}
                {% set ns_media.snapshot_ok = snapshot_upd is not none and snapshot_upd > triggered_ts %}
                {% set ns_media.clip_ok = clip_upd is not none and clip_upd > triggered_ts %}
              {% endif %}
              {{ sensori_ok and ns_media.snapshot_ok and ns_media.clip_ok }}
            {% endif %}
          timeout_scattato: >
            {% set stato = states('input_select.allarme_core_stato') %}
            {% if stato != 'triggered' %}
              false
            {% else %}
              {% set triggered_ts_raw = states('input_datetime.allarme_core_triggered_started') %}
              {% set triggered_ts = as_timestamp(triggered_ts_raw) if triggered_ts_raw not in ['unknown', 'unavailable', ''] else none %}
              {% set timeout_sec = states('input_number.allarme_core_notifica_timeout_secondi') | float(45) %}
              {% set secondi = (now().timestamp() - triggered_ts) if triggered_ts is not none else 0 %}
              {{ secondi >= timeout_sec }}
            {% endif %}
          secondi_da_triggered: >
            {% set triggered_ts_raw = states('input_datetime.allarme_core_triggered_started') %}
            {% set triggered_ts = as_timestamp(triggered_ts_raw) if triggered_ts_raw not in ['unknown', 'unavailable', ''] else none %}
            {{ (now().timestamp() - triggered_ts) | round(1) if triggered_ts is not none else 0 }}

#sensore binario per zone attive che indica se ci sono sensori accesi su quella determinata zona
      - name: "Allarme Core Zona Sera"
        unique_id: allarme_core_zona_sera
        state: >
          {{
            states.binary_sensor
              | selectattr('entity_id','search','binary_sensor.allarme_core_')
              | selectattr('state','eq','on')
              | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
              | selectattr('attributes.zone','defined')
              | selectattr('attributes.zone','contains','sera')
              | list | count > 0
          }}
      - name: "Allarme Core Zona Giorno"
        unique_id: allarme_core_zona_giorno
        state: >
          {{
            states.binary_sensor
              | selectattr('entity_id','search','binary_sensor.allarme_core_')
              | selectattr('state','eq','on')
              | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
              | selectattr('attributes.zone','defined')
              | selectattr('attributes.zone','contains','giorno')
              | list | count > 0
          }}
      - name: "Allarme Core Zona Perimetrali"
        unique_id: allarme_core_zona_perimetrali
        state: >
          {{
            states.binary_sensor
              | selectattr('entity_id','search','binary_sensor.allarme_core_')
              | selectattr('state','eq','on')
              | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
              | selectattr('attributes.zone','defined')
              | selectattr('attributes.zone','contains','perimetrali')
              | list | count > 0
          }}
      - name: "Allarme Core Zona Volumetrici"
        unique_id: allarme_core_zona_volumetrici
        state: >
          {{
            states.binary_sensor
              | selectattr('entity_id','search','binary_sensor.allarme_core_')
              | selectattr('state','eq','on')
              | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
              | selectattr('attributes.zone','defined')
              | selectattr('attributes.zone','contains','volumetrici')
              | list | count > 0
          }}
      - name: "Allarme Core Zona Notte"
        unique_id: allarme_core_zona_notte
        state: >
          {{
            states.binary_sensor
              | selectattr('entity_id','search','binary_sensor.allarme_core_')
              | selectattr('state','eq','on')
              | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
              | selectattr('attributes.zone','defined')
              | selectattr('attributes.zone','contains','notte')
              | list | count > 0
          }}
#-------------------------------------------------------------------------------------------------------------

  - trigger:
      - trigger: time_pattern
        seconds: /1
      - trigger: state
        entity_id: alarm_control_panel.allarme_core
        to: arming
    sensor:
      - name: "Allarme Core Arming Secondi Rimanenti"
        unique_id: allarme_core_arming_secondi_rimanenti
        unit_of_measurement: "s"
        icon: mdi:timer-sand
        state: >
          {% if not is_state('alarm_control_panel.allarme_core', 'arming') %}
            0
          {% else %}
            {% set started = states('input_datetime.allarme_core_arming_started') %}
            {% if started not in ['unknown', 'unavailable', ''] %}
              {% set delay = states('input_number.allarme_core_arming_delay') | float(60) %}
              {% set elapsed = (now() - (started | as_datetime | as_local)).total_seconds() %}
              {{ [delay - elapsed, 0] | max | int }}
            {% else %}
              0
            {% endif %}
          {% endif %}
        attributes:
          delay_totale: "{{ states('input_number.allarme_core_arming_delay') | int(60) }}"
          percentuale: >
            {% if not is_state('alarm_control_panel.allarme_core', 'arming') %}
              0
            {% else %}
              {% set started = states('input_datetime.allarme_core_arming_started') %}
              {% if started not in ['unknown', 'unavailable', ''] %}
                {% set delay = states('input_number.allarme_core_arming_delay') | float(60) %}
                {% set elapsed = (now() - (started | as_datetime | as_local)).total_seconds() %}
                {% set remaining = [delay - elapsed, 0] | max %}
                {{ ((remaining / delay) * 100) | int }}
              {% else %}
                0
              {% endif %}
            {% endif %}



