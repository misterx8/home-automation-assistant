  - type: grid
    cards:
      - type: heading
        heading_style: title
        icon: mdi:math-log
        heading: Log
      - type: tile
        grid_options:
          columns: 12
          rows: 1
        entity: script.allarme_core_logbook_cancella_tutto
        name: Cancella tutti i log
        vertical: false
        tap_action:
          action: toggle
        icon_tap_action:
          action: toggle
        features_position: bottom
      - type: custom:timeline-card
        title: 🛡️ Allarme Core – Stato & Eventi
        hours: 24
        limit: 50
        overflow: scroll
        max_height: 420px
        relative_time: true
        refresh_interval: 30
        entities:
          - entity: input_select.allarme_core_stato
            collapse_duplicates: true
            name: " "
            state_map:
              armed: ARMATO
              disarmed: DISARMATO
              triggered: ALLARME
              arming: ATTIVAZIONE
            icon_map:
              armed: mdi:lock
              disarmed: mdi:lock-open
              triggered: mdi:alarm-light
              arming: mdi:lock-alert-outline
            icon_color_map:
              armed: yellow
              disarmed: green
              triggered: red
              arming: grey
      - type: markdown
        title: 🧾 Time line Eventi
        content: |
          {{ state_attr('sensor.allarme_core_timeline_render','long_state') }}
      - type: markdown
        title: 🧾 Allarme Core – Registro
        content: >
          ### 📌 Ultimo evento **{{
          states('input_text.allarme_core_logbook_ultimo_evento') }}**

          ---

          {% set c_raw =
          state_attr('var.allarme_core_timeline_critici_md','long_state') |
          default('', true) | string %} {% set c_list = c_raw.split('\n') |
          map('trim') | reject('equalto','') | list %} ### 🚨 Critici ({{ c_list
          | length }}) {{ c_raw | trim if c_list | length > 0 else '_Nessun
          evento critico._' }}

          ---

          {% set o_raw =
          state_attr('var.allarme_core_timeline_operazioni_md','long_state') |
          default('', true) | string %} {% set o_list = o_raw.split('\n') |
          map('trim') | reject('equalto','') | list %} ### ⚙️ Operazioni ({{
          o_list | length }}) {{ o_raw | trim if o_list | length > 0 else
          '_Nessuna operazione._' }}

          ---

          {% set n_raw =
          state_attr('var.allarme_core_timeline_note_md','long_state') |
          default('', true) | string %} {% set n_list = n_raw.split('\n') |
          map('trim') | reject('equalto','') | list %} ### 📝 Note ({{ n_list |
          length }}) {{ n_raw | trim if n_list | length > 0 else '_Nessuna
          nota._' }}
      - type: markdown
        title: 🛡️ Allarme Core – Ultimo Evento
        content: |
          **{{ states('input_text.allarme_core_logbook_ultimo_evento') }}**
      - type: logbook
        title: 🛡️ Allarme Core – Eventi
        entities:
          - input_text.allarme_core_logbook_event
        hours_to_show: 24
  - type: grid
    cards:
      - type: heading
        heading: Immagini
        heading_style: title
        icon: far:image
      - type: markdown
        title: 📸 Snapshot allarme
        content: >
          {% set s =
          state_attr('var.allarme_core_last_snapshot_urls','long_state') |
          default('', true) | string %} {% set arr = s.split('\n') | map('trim')
          | reject('equalto','') | list %} {% set imgs = arr[:4] %}

          {% if imgs|length == 0 %} Nessuno snapshot disponibile. {% else %} {%
          for u in imgs %} [![]({{ u }})]({{ u }})

          {% endfor %} {% endif %}
      - type: markdown
        title: 🎥 Clip allarme (30s)
        content: >
          {% set s = state_attr('var.allarme_core_last_clip_urls','long_state')
          | default('', true) | string %} {% set arr = s.split('\n') |
          map('trim') | reject('equalto','') | list %} {% set arr = arr[:4] %}
          {% if arr|length == 0 %} Nessuna clip disponibile. {% else %} {% for u
          in arr %} - [Apri clip {{ loop.index }}]({{ u }}) {% endfor %} {%
          endif %}
