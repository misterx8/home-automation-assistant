        heading: Sala
        heading_style: subtitle
      - type: tile
        grid_options:
          columns: 6
          rows: 2
        entity: binary_sensor.allarme_core_porta_ingresso_sala
        name: " "
        vertical: false
        features_position: bottom
        tap_action:
          action: call-service
          service: browser_mod.popup
          service_data:
            title: Dettagli avanzati
            content:
              type: entities
              entities:
                - entity: input_boolean.allarme_core_porta_ingresso_sala_abilitato
                - entity: input_text.allarme_core_porta_ingresso_sala_zone
                  secondary_info: last-updated
                - entity: input_text.allarme_core_porta_ingresso_sala_camera
                  secondary_info: last-updated
        card_mod:
          style: >
            {% set enabled =
            states('input_boolean.allarme_core_porta_ingresso_sala_abilitato')
            %} {% set zone =
            states('input_text.allarme_core_porta_ingresso_sala_zone') %} {% set
            camera =
            states('input_text.allarme_core_porta_ingresso_sala_camera') %} {%
            set errore =
            states('binary_sensor.allarme_core_porta_ingresso_sala_zone_valida')
            %}

            {% set invalid_zone = zone in ['unknown','unavailable',''] %} {% set
            invalid_camera = camera in ['unknown','unavailable',''] %}

            {% set border_color = 'green' if enabled == 'on' else 'red' %}

            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px {{ border_color }};
              padding-left: 12px;
              position: relative;
            }

            /* badge icona warning / errore */ {% if errore == 'off' %}
            ha-card::after {
              content: "❌";
              position: absolute;
              top: 12px;
              right: 12px;
              font-size: 1.2em;
            } {% elif invalid_zone or invalid_camera %} ha-card::after {
              content: "⚠️";
              position: absolute;
              top: 12px;
              right: 12px;
              font-size: 1.2em;
            } {% endif %}
