type: sections
max_columns: 4
title: Mappa Sensori
path: allarme-mappa-sensori
icon: mdi:motion-sensor
sections:
  - type: grid
    cards:
      - type: heading
        icon: mdi:home-floor-1
        heading: Sensori Primo Piano
        heading_style: title
      - type: heading
        icon: ""
        heading: Sala
        heading_style: subtitle
      - type: tile
        grid_options:
          columns: 6
          rows: 2
        entity: binary_sensor.allarme_core_porta_ingresso_sala
        name: " "
        vertical: false
        features_position: bottom
        tap_action:
          action: call-service
          service: browser_mod.popup
          service_data:
            title: Dettagli avanzati
            content:
              type: entities
              entities:
                - entity: input_boolean.allarme_core_porta_ingresso_sala_abilitato
                - entity: input_text.allarme_core_porta_ingresso_sala_zone
                  secondary_info: last-updated
                - entity: input_text.allarme_core_porta_ingresso_sala_camera
                  secondary_info: last-updated
        card_mod:
          style: >
            {% set enabled =
            states('input_boolean.allarme_core_porta_ingresso_sala_abilitato')
            %} {% set zone =
            states('input_text.allarme_core_porta_ingresso_sala_zone') %} {% set
            camera =
            states('input_text.allarme_core_porta_ingresso_sala_camera') %} {%
            set errore =
            states('binary_sensor.allarme_core_porta_ingresso_sala_zone_valida')
            %}

            {% set invalid_zone = zone in ['unknown','unavailable',''] %} {% set
            invalid_camera = camera in ['unknown','unavailable',''] %}

            {# Anomalia fisico: legge sensore_origine (singolo) o sensori_origine (lista JSON)
               dal wrapper tramite config.entity. Usa namespace loop perché map('states')
               non è un filtro Jinja2 registrato in HA — states() va chiamato come funzione. #}
            {% set fisico_s = state_attr(config.entity, 'sensore_origine') %}
            {% set fisici_json = state_attr(config.entity, 'sensori_origine') %}
            {% set fisici_l = fisici_json | from_json if fisici_json is string else [] %}
            {% set ns_fa = namespace(v=false) %}
            {% if fisico_s is not none and states(fisico_s) not in ['on','off'] %}
              {% set ns_fa.v = true %}
            {% endif %}
            {% for f in fisici_l %}
              {% if states(f) not in ['on','off'] %}{% set ns_fa.v = true %}{% endif %}
            {% endfor %}
            {% set fisico_anomalo = enabled == 'on' and ns_fa.v %}

            {# Colore bordo: rosso=disabilitato | arancio=fisico anomalo | verde=ok #}
            {% set border_color = 'red' if enabled == 'off' else ('orange' if fisico_anomalo else 'green') %}

            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px {{ border_color }};
              padding-left: 12px;
              position: relative;
            }

            /* badge icona warning / errore */ {% if errore == 'off' %}
            ha-card::after {
              content: "❌";
              position: absolute;
              top: 12px;
              right: 12px;
              font-size: 1.2em;
            } {% elif fisico_anomalo %} ha-card::after {
              content: "🔌";
              position: absolute;
              top: 12px;
              right: 12px;
              font-size: 1.2em;
            } {% elif invalid_zone or invalid_camera %} ha-card::after {
              content: "⚠️";
              position: absolute;
              top: 12px;
              right: 12px;
              font-size: 1.2em;
            } {% endif %}
