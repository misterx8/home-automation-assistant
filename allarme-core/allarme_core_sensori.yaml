template:
  - binary_sensor:

#region tutti i sensori di allarme

  #region taverna
    - name: "Allarme Core Porta Ingresso Taverna"
      unique_id: allarme_core_porta_ingresso_taverna
      device_class: door
      state: >
          {% set porta = states('binary_sensor.contatto_porta_ingresso_taverna') %}
          {% set abilitato = is_state('input_boolean.allarme_core_porta_ingresso_taverna_abilitato','on') %}
          {% if porta in ['on','off'] %}
            {% if abilitato %}
              {{ porta }}
            {% else %}
              off
            {% endif %}
          {% else %}
            off
          {% endif %}
      attributes:
        sensore_origine: binary_sensor.contatto_porta_ingresso_taverna
        tipo_connessione: wireless
        batteria_origine: binary_sensor.batteria_contatto_porta_ingresso_taverna
        disponibilita_origine: binary_sensor.disponibilita_contatto_porta_taverna

        tipo: perimetrale
        priorita: alta
        ritardo: 0

        zone: "{{ states('input_text.allarme_core_porta_ingresso_taverna_zone').split(',') }}"
        camera: "{{ states('input_text.allarme_core_porta_ingresso_taverna_camera').split(',') }}"

        abilitato: "{{ is_state('input_boolean.allarme_core_porta_ingresso_taverna_abilitato','on') }}"

    - name: "Allarme Core Movimento Taverna"
      unique_id: allarme_core_movimento_Taverna
      device_class: motion
      state: >
          {% set porta = states('binary_sensor.pir_taverna') %}
          {% set abilitato = is_state('input_boolean.allarme_core_movimento_taverna_abilitato','on') %}
          {% if porta in ['on','off'] %}
            {% if abilitato %}
              {{ porta }}
            {% else %}
              off
            {% endif %}
          {% else %}
            off
          {% endif %}
      attributes:
        sensore_origine: binary_sensor.pir_taverna
        tipo_connessione: filare
        batteria_origine: ""
        disponibilita_origine: ""

        tipo: volumetrico
        priorita: media
        ritardo: 0

        zone: "{{ states('input_text.allarme_core_movimento_taverna_zone').split(',') }}"
        camera: "{{ states('input_text.allarme_core_movimento_taverna_camera').split(',') }}"

        abilitato: "{{ is_state('input_boolean.allarme_core_movimento_taverna_abilitato','on') }}"
    
    - name: "Allarme Core Movimento Corridoio Taverna"
      unique_id: allarme_core_movimento_corridoio_taverna
      device_class: motion
      state: >
          {% set porta = states('binary_sensor.pir_corridoio_taverna') %}
          {% set abilitato = is_state('input_boolean.allarme_core_movimento_corridoio_taverna_abilitato','on') %}
          {% if porta in ['on','off'] %}
            {% if abilitato %}
              {{ porta }}
            {% else %}
              off
            {% endif %}
          {% else %}
            off
          {% endif %}
