    - name: "Allarme Core Movimento Esterno Davanti"
      unique_id: allarme_core_movimento_esterno_davanti
      device_class: motion

      state: >
        {% set sorgenti = [
          'binary_sensor.pir_giardino_barriera_davanti',
          'binary_sensor.pir_giardino_balcone',
          'binary_sensor.pir_giardino_tettoia'
        ] %}
        {% set abilitato = is_state('input_boolean.allarme_core_movimento_esterno_davanti_abilitato','on') %}

        {% if not abilitato %}
          off
        {% else %}
          {{ 'on' if sorgenti | select('is_state','on') | list | count > 0 else 'off' }}
        {% endif %}

      attributes:
        sensori_origine: >
          {{ [
            'binary_sensor.pir_giardino_barriera_davanti',
            'binary_sensor.pir_giardino_balcone',
            'binary_sensor.pir_giardino_tettoia'
          ] | to_json }}

        sensori_config: >
          {{ [
            {'entity_id': 'binary_sensor.pir_giardino_barriera_davanti', 'tipo_connessione': 'filare', 'batteria_origine': '', 'disponibilita_origine': ''},
            {'entity_id': 'binary_sensor.pir_giardino_balcone', 'tipo_connessione': 'filare', 'batteria_origine': '', 'disponibilita_origine': ''},
            {'entity_id': 'binary_sensor.pir_giardino_tettoia', 'tipo_connessione': 'filare', 'batteria_origine': '', 'disponibilita_origine': ''}
          ] | to_json }}

        sensori_aperti: >
          {% set sorgenti = [
            'binary_sensor.pir_giardino_barriera_davanti',
            'binary_sensor.pir_giardino_balcone',
            'binary_sensor.pir_giardino_tettoia'
          ] %}
          {{
            sorgenti
              | select('is_state','on')
              | list
          }}

        nomi_aperti: >
          {% set sorgenti = [
            'binary_sensor.pir_giardino_barriera_davanti',
            'binary_sensor.pir_giardino_balcone',
            'binary_sensor.pir_giardino_tettoia'
          ] %}
          {{
            sorgenti
              | select('is_state','on')
              | map('state_attr','friendly_name')
              | list
          }}

        tipo_connessione: filare
        tipo: volumetrico
        priorita: media
        ritardo: 0

        zone: "{{ states('input_text.allarme_core_movimento_esterno_davanti_zone').split(',') }}"
        camera: "{{ states('input_text.allarme_core_movimento_esterno_davanti_camera').split(',') }}"

        abilitato: "{{ is_state('input_boolean.allarme_core_movimento_esterno_davanti_abilitato','on') }}"

