                      {% set ns_grp.batt_min_fisico = fisico %}
                      {% set ns_grp.has_batt = true %}
                    {% endif %}
                  {% elif batt not in ['unknown','unavailable','none','None','','false','False','off'] %}
                    {% set batt_int = batt | int(999) %}
