                      {% set ns.batt_list = ns.batt_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'batteria': 5, 'nome': (state_attr(s.entity_id,'friendly_name') | default(s.entity_id)) ~ ' – ' ~ nome_base}] %}
                    {% elif batt not in ['unknown','unavailable','none','None','','false','False','off'] %}
                      {% set batt_int = batt | int(-1) %}
                      {% if batt_int >= 0 and batt_int < soglia %}
                        {% set ns.batt_list = ns.batt_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'batteria': batt_int, 'nome': (state_attr(s.entity_id,'friendly_name') | default(s.entity_id)) ~ ' – ' ~ nome_base}] %}
