      # -----------------------------------------------------------------------
      # sensor.allarme_core_stato_batterie
      # Sensore di riepilogo per Node-RED: critical | warning | ok
      # -----------------------------------------------------------------------
      - name: "Allarme Core Stato Batterie"
        unique_id: allarme_core_stato_batterie
        state: >
          {% set critico = states('binary_sensor.allarme_core_batteria_critica') == 'on' %}
          {% set offline  = states('binary_sensor.allarme_core_sensore_offline') == 'on' %}
          {% set basse    = states('sensor.allarme_core_batterie_basse') | int(0) %}
          {% if critico or offline %}
            critical
          {% elif basse > 0 %}
            warning
          {% else %}
            ok
          {% endif %}
        attributes:
          livello: >
            {% set critico = states('binary_sensor.allarme_core_batteria_critica') == 'on' %}
            {% set offline  = states('binary_sensor.allarme_core_sensore_offline') == 'on' %}
            {% set basse    = states('sensor.allarme_core_batterie_basse') | int(0) %}
            {% if critico or offline %}
              critical
            {% elif basse > 0 %}
              warning
            {% else %}
              ok
            {% endif %}
          batteria_minima: "{{ states('sensor.allarme_core_batteria_minima') | int(0) }}"
          contatore_batterie_basse: "{{ states('sensor.allarme_core_batterie_basse') | int(0) }}"
          contatore_offline: "{{ states('sensor.allarme_core_sensori_offline') | int(0) }}"
          batterie_basse: "{{ state_attr('sensor.allarme_core_batterie_basse', 'lista') | default([]) }}"
          sensori_offline: "{{ state_attr('sensor.allarme_core_sensori_offline', 'lista_offline') | default([]) }}"
          soglia_corrente: "{{ states('input_number.allarme_core_soglia_batteria_bassa') | float(20) }}"
          ultimo_aggiornamento: "{{ now().isoformat() }}"

