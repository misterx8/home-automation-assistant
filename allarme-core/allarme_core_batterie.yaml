                      {% set ns_grp.batt_min_fisico = fisico %}
                      {% set ns_grp.has_batt = true %}
                    {% endif %}
                  {% elif batt in ['unknown','unavailable','none','None',''] %}
                    {% if states('binary_sensor.' ~ nome_base ~ '_battery_low') == 'on' %}
                      {% if 5 < ns_grp.batt_min %}
                        {% set ns_grp.batt_min = 5 %}
                        {% set ns_grp.batt_min_fisico = fisico %}
                        {% set ns_grp.has_batt = true %}
                      {% endif %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {% if ns_grp.has_batt and ns_grp.batt_min < soglia %}
                  {% set ns.batt_list = ns.batt_list + [{'wrapper': s.entity_id, 'fisico': ns_grp.batt_min_fisico, 'batteria': ns_grp.batt_min, 'nome': state_attr(s.entity_id,'friendly_name') | default(s.entity_id)}] %}
                {% endif %}

              {# === PERCORSO C: sensore_origine singolo === #}
              {% elif sensore_sing is not none and sensore_sing | string not in ['','None','none'] %}
