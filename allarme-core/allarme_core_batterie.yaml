      - name: "Allarme Core Sensori Offline"
        unique_id: allarme_core_sensori_offline
        unit_of_measurement: "sensori"
        state_class: measurement
        state: >
          {% set ns = namespace(offline_list=[]) %}

          {% for s in states.binary_sensor
              | selectattr('entity_id', 'search', '^binary_sensor\.allarme_core_')
              | rejectattr('entity_id', 'search', 'batteria_critica|sensore_offline') %}

            {% set tipo_conn = state_attr(s.entity_id, 'tipo_connessione') | default('filare') | string %}
            {% set sensore_sing = state_attr(s.entity_id, 'sensore_origine') %}
            {% set sensori_plur = state_attr(s.entity_id, 'sensori_origine') %}
            {% set sensori_cfg_raw = state_attr(s.entity_id, 'sensori_config') %}

            {% if tipo_conn == 'wireless' %}
              {# === PERCORSO A: sensori_config presente === #}
              {% if sensori_cfg_raw is not none and sensori_cfg_raw | string not in ['','None','none'] %}
                {% if sensori_cfg_raw is string %}{% set sensori_cfg = sensori_cfg_raw | from_json %}
                {% else %}{% set sensori_cfg = sensori_cfg_raw %}{% endif %}
                {% for cfg in sensori_cfg %}
                  {% set tipo_s = cfg.tipo_connessione | default('filare') | string %}
                  {% if tipo_s == 'wireless' %}
                    {% set fisico = cfg.entity_id | string %}
                    {% set nome_base = fisico.split('.')[1] %}
                    {% set avail_ovr = cfg.disponibilita_origine | default('') | string %}
                    {% set avail_entity = avail_ovr if (avail_ovr != '' and avail_ovr not in ['None','none']) else ('binary_sensor.' ~ nome_base ~ '_availability') %}
                    {% if states(avail_entity) == 'off' %}
                      {% set ns.offline_list = ns.offline_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'nome': (state_attr(s.entity_id,'friendly_name') | default(s.entity_id)) ~ ' – ' ~ nome_base}] %}
