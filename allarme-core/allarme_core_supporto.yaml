template:
  - binary_sensor:

    - name: "allarme_core_finestra_camera_zone_valida"
      state: >
          {% set zone_list = states('input_text.allarme_core_finestra_camera_zone').split(',') | map('trim') | list %}
          {% set available_zones = state_attr('input_select.allarme_core_zone_disponibili','options') %}
          {% if zone_list == [''] %}
            false
          {% else %}
            {{ zone_list | select('in', available_zones) | list | length == zone_list | length }}
          {% endif %}
