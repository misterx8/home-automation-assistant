automation:
  # FIX AC-BUG-05: automazione che imposta input_datetime.allarme_core_arming_started
  # al momento esatto in cui inizia la fase di arming. Questo timestamp è usato dal sensore
  # "Allarme Core Sensori Aperti Filtrati" nell'attributo availability per determinare
  # se la var dei sensori esclusi è stata aggiornata dopo l'inizio dell'arming.
  - alias: "Allarme Core - Registra timestamp inizio arming"
    id: allarme_core_aut_registra_arming_started
    mode: single
    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato
        to: "arming"
    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.allarme_core_arming_started
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  - alias: "Allarme Core - Reset sensori esclusi al disarm"
    id: allarme_core_aut_reset_sensori_esclusi
    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato
        to: "disarmed"

    action:
      # FIX AC-BUG-01 (residuo): entity_id spostato da data: a target: anche qui
      - service: input_text.set_value
        target:
          entity_id: input_text.allarme_core_sensori_esclusi
        data:
          value: "[]"

  - alias: "Allarme Core - Memorizza sensori esclusi all'arming"
    id: allarme_core_aut_memorizza_sensori_esclusi
    mode: single

    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato
        to: "armed"

      - platform: state
        entity_id: input_select.allarme_core_stato
        to: "arming"

    action:
      - wait_for_trigger:
          - platform: state
            entity_id: binary_sensor.allarme_core_sensori_aperti_su_profilo_attivo
            to: "on"
        timeout: "00:00:15"
        continue_on_timeout: true  # Continua anche se non diventa on, per sicurezza

      # FIX AC-BUG-01 (residuo): entity_id spostato da data: a target: anche qui
      - service: input_text.set_value
        target:
          entity_id: input_text.allarme_core_sensori_esclusi
        data:
          value: >
            {% set sensori = state_attr('binary_sensor.allarme_core_sensori_aperti_su_profilo_attivo', 'sensori_aperti_ids') %}
            {{ sensori | default([]) | to_json }}

  - alias: "Allarme Core - Memorizza sensori esclusi con Var"
    id: allarme_core_aut_memorizza_sensori_esclusi_var
    mode: single

    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato
        to: "armed"

      - platform: state
        entity_id: input_select.allarme_core_stato
        to: "arming"

    action:
      - wait_for_trigger:
          - platform: state
            entity_id: binary_sensor.allarme_core_sensori_aperti_su_profilo_attivo
            to: "on"
        timeout: "00:00:15"
        continue_on_timeout: true

      - service: var.set
        data:
          entity_id:
            - var.allarme_core_sensori_esclusi_var
          value: >
            {{ state_attr('binary_sensor.allarme_core_sensori_aperti_su_profilo_attivo','sensori_aperti_ids') | default([]) }}

  - alias: "Allarme Core - Reset sensori esclusi al disarm con Var"
    id: allarme_core_aut_reset_sensori_esclusi_var
    mode: single

    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato
        to: "disarmed"

    action:
      - service: var.set
        data:
          entity_id:
            - var.allarme_core_sensori_esclusi_var
          value: []  # Resetta la lista a vuoto

  - alias: "Allarme Core - Memorizza sensori che provocano allarme"
    id: allarme_core_aut_memorizza_sensori_causa_allarme
    mode: queued
    max: 50
    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato
        to: "triggered"
    variables:
      aperti: "{{ state_attr('sensor.allarme_core_sensori_aperti_filtrati', 'sensori_aperti_ids') or [] }}"
      # FIX AC-BUG-03: map('state_attr','friendly_name') non è un filtro Jinja2 valido su lista di stringhe.
      # Sostituito con loop esplicito che usa state_attr(eid, 'friendly_name').
      aperti_nomi: >
        {% set ids = state_attr('sensor.allarme_core_sensori_aperti_filtrati', 'sensori_aperti_ids') | default([]) %}
        {% set ns = namespace(nomi=[]) %}
        {% for eid in ids %}
          {% set ns.nomi = ns.nomi + [state_attr(eid, 'friendly_name') | default(eid)] %}
        {% endfor %}
        {{ ns.nomi }}
      ts: "{{ now().isoformat() }}"
    action:
      - service: var.set
        data:
          entity_id:
            - var.allarme_core_sensori_attivazione_allarme_var
          value: >
            {{ aperti | join(', ') }}
          attributes:
            profilo: "{{ states('input_select.allarme_core_profilo') }}"

  # Disattiva automaticamente la modalità test.
  # Due trigger per coprire tutti i casi:
  #  - timeout_scaduto: template rivalutato da HA periodicamente e al boot.
  #    Se il timeout è già scaduto quando HA si riavvia, scatta immediatamente.
  #  - riavvio_ha: se HA riavvia con il flag attivo, disattiva subito.
  #    Il delay morirebbe al riavvio — questo trigger è la rete di sicurezza.
  - alias: "Allarme Core - Auto-disattiva modalità test al timeout"
    id: allarme_core_aut_test_auto_disattiva
    mode: single
    trigger:
      - platform: template
        id: timeout_scaduto
        value_template: >
          {% if is_state('input_boolean.allarme_core_modalita_test', 'on') %}
            {% set attivato = states('input_datetime.allarme_core_test_attivato_alle') %}
            {% if attivato not in ['unknown', 'unavailable', ''] %}
              {% set timeout = states('input_number.allarme_core_test_timeout_minuti') | int(30) %}
              {% set elapsed = (now() - (attivato | as_datetime | as_local)).total_seconds() / 60 %}
              {{ elapsed >= timeout }}
            {% else %}
              false
            {% endif %}
          {% else %}
            false
          {% endif %}
      - platform: homeassistant
        id: riavvio_ha
        event: start
    condition:
      - condition: state
        entity_id: input_boolean.allarme_core_modalita_test
        state: "on"
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: riavvio_ha
            sequence:
              - service: script.allarme_core_logbook_emit
                data:
                  msg: "🧪 Modalità Test DISATTIVATA — riavvio HA rilevato (timer perso)"
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.allarme_core_modalita_test
        default:
          - service: script.turn_on
            target:
              entity_id: script.allarme_core_disattiva_test_mode