automation:
  # FIX AC-BUG-05: automazione che imposta input_datetime.allarme_core_arming_started
  # al momento esatto in cui inizia la fase di arming. Questo timestamp è usato dal sensore
  # "Allarme Core Sensori Aperti Filtrati" nell'attributo availability per determinare
  # se la var dei sensori esclusi è stata aggiornata dopo l'inizio dell'arming.
  - alias: "Allarme Core - Registra timestamp inizio arming"
    id: allarme_core_aut_registra_arming_started
    mode: single
    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato
        to: "arming"
    action:
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.allarme_core_arming_started
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  # Opzione 3: registra il timestamp esatto dell'inizio dello stato 'triggered'.
  # Usato da binary_sensor.allarme_core_dati_pronti per il calcolo del timeout
  # e per confrontare last_updated delle var snapshot/clip Frigate.
  - alias: "Allarme Core - Registra timestamp inizio triggered"
    id: allarme_core_aut_registra_triggered_started
    mode: single
    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato
        to: "triggered"
    action:
      - action: input_datetime.set_datetime
        target:
          entity_id: input_datetime.allarme_core_triggered_started
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  - alias: "Allarme Core - Reset sensori esclusi al disarm"
    id: allarme_core_aut_reset_sensori_esclusi
    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato
        to: "disarmed"

    action:
      # FIX AC-BUG-01 (residuo): entity_id spostato da data: a target: anche qui
      - service: input_text.set_value
        target:
          entity_id: input_text.allarme_core_sensori_esclusi
        data:
          value: "[]"

  - alias: "Allarme Core - Memorizza sensori esclusi all'arming"
    id: allarme_core_aut_memorizza_sensori_esclusi
    mode: single

    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato
        to: "armed"

    action:
      # Snapshot immediata al momento esatto di armed: solo i sensori ancora aperti
      # in questo istante vengono esclusi. Sensori aperti/chiusi durante l'arming
      # (es. porta di casa mentre si esce) non vengono inclusi se già richiusi.
      # FIX AC-BUG-01 (residuo): entity_id spostato da data: a target: anche qui
      - service: input_text.set_value
        target:
          entity_id: input_text.allarme_core_sensori_esclusi
        data:
          value: >
            {% set sensori = state_attr('binary_sensor.allarme_core_sensori_aperti_su_profilo_attivo', 'sensori_aperti_ids') %}
            {{ sensori | default([]) | to_json }}

  - alias: "Allarme Core - Memorizza sensori esclusi con Var"
    id: allarme_core_aut_memorizza_sensori_esclusi_var
    mode: single

    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato
        to: "armed"

    action:
      # Snapshot immediata al momento esatto di armed: stessa logica dell'automazione
      # gemella che scrive input_text. Le due var devono sempre essere allineate.
      - service: var.set
        data:
          entity_id:
            - var.allarme_core_sensori_esclusi_var
          value: >
            {{ state_attr('binary_sensor.allarme_core_sensori_aperti_su_profilo_attivo','sensori_aperti_ids') | default([]) }}

  - alias: "Allarme Core - Reset sensori esclusi al disarm con Var"
    id: allarme_core_aut_reset_sensori_esclusi_var
    mode: single

    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato
        to: "disarmed"

    action:
      - service: var.set
        data:
          entity_id:
            - var.allarme_core_sensori_esclusi_var
          value: []  # Resetta la lista a vuoto

  - alias: "Allarme Core - Memorizza sensori che provocano allarme"
    id: allarme_core_aut_memorizza_sensori_causa_allarme
    mode: queued
    max: 50
    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato
        to: "triggered"
    variables:
      # FIX-C: lettura diretta dai binary_sensor fisici — elimina race condition primaria
      # con sensor.allarme_core_sensori_aperti_filtrati (che richiede rivalutazione del template).
      # Replica la stessa logica di filtro del template sensor.
      aperti: >
        {% set esclusi_raw = states('var.allarme_core_sensori_esclusi_var') | string | trim %}
        {% set esclusi_raw = esclusi_raw | replace("'", '"') %}
        {% set esclusi = (esclusi_raw | from_json) if esclusi_raw.startswith('[') else [] %}
        {% set zone_att = state_attr('sensor.allarme_core_zone_attive', 'zones') or [] %}
        {% set ns = namespace(ids=[]) %}
        {% if states('input_select.allarme_core_profilo') != 'nessuno' %}
          {% for sensor in states.binary_sensor
            | selectattr('entity_id', 'search', 'binary_sensor.allarme_core_')
            | selectattr('state', 'eq', 'on')
            | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
            | selectattr('attributes.zone', 'defined') %}
            {% if sensor.entity_id not in esclusi %}
              {% if sensor.attributes.zone | select('in', zone_att) | list | length > 0 %}
                {% set ns.ids = ns.ids + [sensor.entity_id] %}
              {% endif %}
            {% endif %}
          {% endfor %}
        {% endif %}
        {{ ns.ids }}
      aperti_nomi: >
        {% set esclusi_raw = states('var.allarme_core_sensori_esclusi_var') | string | trim %}
        {% set esclusi_raw = esclusi_raw | replace("'", '"') %}
        {% set esclusi = (esclusi_raw | from_json) if esclusi_raw.startswith('[') else [] %}
        {% set zone_att = state_attr('sensor.allarme_core_zone_attive', 'zones') or [] %}
        {% set ns = namespace(nomi=[]) %}
        {% if states('input_select.allarme_core_profilo') != 'nessuno' %}
          {% for sensor in states.binary_sensor
            | selectattr('entity_id', 'search', 'binary_sensor.allarme_core_')
            | selectattr('state', 'eq', 'on')
            | selectattr('attributes.abilitato', 'in', [true, 'true', 'on'])
            | selectattr('attributes.zone', 'defined') %}
            {% if sensor.entity_id not in esclusi %}
              {% if sensor.attributes.zone | select('in', zone_att) | list | length > 0 %}
                {% set ns.nomi = ns.nomi + [sensor.attributes.friendly_name | default(sensor.entity_id)] %}
              {% endif %}
            {% endif %}
          {% endfor %}
        {% endif %}
        {{ ns.nomi }}
      ts: "{{ now().isoformat() }}"
    action:
      - service: var.set
        data:
          entity_id:
            - var.allarme_core_sensori_attivazione_allarme_var
          value: >
            {{ aperti | join(', ') }}
          attributes:
            profilo: "{{ states('input_select.allarme_core_profilo') }}"

  # Disattiva automaticamente la modalità test.
  # Due trigger per coprire tutti i casi:
  #  - timeout_scaduto: template rivalutato da HA periodicamente e al boot.
  #    Se il timeout è già scaduto quando HA si riavvia, scatta immediatamente.
  #  - riavvio_ha: se HA riavvia con il flag attivo, disattiva subito.
  #    Il delay morirebbe al riavvio — questo trigger è la rete di sicurezza.
  - alias: "Allarme Core - Auto-disattiva modalità test al timeout"
    id: allarme_core_aut_test_auto_disattiva
    mode: single
    trigger:
      - platform: template
        id: timeout_scaduto
        value_template: >
          {% if is_state('input_boolean.allarme_core_modalita_test', 'on') %}
            {% set attivato = states('input_datetime.allarme_core_test_attivato_alle') %}
            {% if attivato not in ['unknown', 'unavailable', ''] %}
              {% set timeout = states('input_number.allarme_core_test_timeout_minuti') | int(30) %}
              {% set elapsed = (now() - (attivato | as_datetime | as_local)).total_seconds() / 60 %}
              {{ elapsed >= timeout }}
            {% else %}
              false
            {% endif %}
          {% else %}
            false
          {% endif %}
      - platform: homeassistant
        id: riavvio_ha
        event: start
    condition:
      - condition: state
        entity_id: input_boolean.allarme_core_modalita_test
        state: "on"
    action:
      - choose:
          - conditions:
              - condition: trigger
                id: riavvio_ha
            sequence:
              - service: script.allarme_core_logbook_emit
                data:
                  msg: "🧪 Modalità Test DISATTIVATA — riavvio HA rilevato (timer perso)"
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.allarme_core_modalita_test
        default:
          - service: script.turn_on
            target:
              entity_id: script.allarme_core_disattiva_test_mode