type: sections
max_columns: 4
title: Ring Keypad
path: ring-keypad
icon: mdi:keyboard-settings
subview: true
back_path: /home-new/controllo-generale
header:
  cards:
    - type: conditional
      conditions:
        - condition: state
          entity: input_boolean.ring_keypad_debug
          state: "on"
      card:
        type: markdown
        content: >-
          <ha-alert alert-type="warning">DEBUG ATTIVO — la modalità debug è
          abilitata sul sistema keypad</ha-alert>
    - type: conditional
      conditions:
        - condition: or
          conditions:
            - condition: state
              entity: input_select.ring_keypad_alarm_state
              state: triggered_burglar
            - condition: state
              entity: input_select.ring_keypad_alarm_state
              state: triggered_rapina
            - condition: state
              entity: input_select.ring_keypad_alarm_state
              state: triggered_fire
            - condition: state
              entity: input_select.ring_keypad_alarm_state
              state: triggered_medical
            - condition: state
              entity: input_select.ring_keypad_alarm_state
              state: triggered_water
      card:
        type: markdown
        content: >-
          {% set stato = states('input_select.ring_keypad_alarm_state') %} {%
          set etichette = {
            'triggered_burglar': 'INTRUSIONE',
            'triggered_rapina':  'ANTI-RAPINA SILENZIOSO',
            'triggered_fire':    'INCENDIO / FUMO',
            'triggered_medical': 'EMERGENZA MEDICA',
            'triggered_water':   'PERDITA ACQUA'
          } %} <ha-alert alert-type="error">ALLARME IN CORSO — {{
          etichette.get(stato, stato | replace('triggered_','') | upper)
          }}</ha-alert>
    - type: conditional
      conditions:
        - condition: state
          entity: input_boolean.ring_keypad_bypass_pending
          state: "on"
      card:
        type: markdown
        content: >-
          <ha-alert alert-type="warning">BYPASS IN ATTESA — premere V per confermare o X per annullare</ha-alert>
    - type: conditional
      conditions:
        - condition: state
          entity: input_boolean.ring_keypad_lockout_active
          state: "on"
      card:
        type: markdown
        content: >-
          <ha-alert alert-type="error">🔒 LOCKOUT ATTIVO — tastiera bloccata per troppi PIN errati. Reset automatico dopo 5 minuti.</ha-alert>
    - type: conditional
      conditions:
        - condition: state
          entity: binary_sensor.keypad_collisione_pin
          state: "on"
      card:
        type: markdown
        content: >-
          <ha-alert alert-type="warning">⚠️ COLLISIONE PIN — due o più utenti hanno lo stesso PIN. Verificare la configurazione.</ha-alert>
sections:
  - type: grid
    cards:
      - type: heading
        heading: Controllo Tastiere Ring
        heading_style: title
        icon: mdi:shield-home
      - type: tile
        entity: input_select.ring_keypad_alarm_state
        name: Stato Allarme
        vertical: false
        features_position: bottom
        grid_options:
          columns: 12
          rows: 1
        card_mod:
          style: >
            {% set stato = states('input_select.ring_keypad_alarm_state') %} {%
            if stato.startswith('triggered_') %}
              {% set color = 'red' %}
            {% elif stato in ['armed_home','armed_away','arming','armed_sera'] %}
              {% set color = '#f0a500' %}
            {% else %}
              {% set color = 'green' %}
            {% endif %} ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 3px {{ color }};
              padding-left: 12px;
            }
      - type: custom:mushroom-template-card
        primary: >
          {% set stato = states('input_select.ring_keypad_alarm_state') %} {%
          set mappa = {
            'disarmed':          'Disinserito',
            'armed_home':        'Armato Casa',
            'armed_away':        'Armato Fuori',
            'armed_sera':        'Armato Sera',
            'arming':            'Armamento in corso...',
            'triggered_burglar': 'ALLARME INTRUSIONE',
            'triggered_rapina':  'ANTI-RAPINA SILENZIOSO',
            'triggered_fire':    'ALLARME INCENDIO',
            'triggered_medical': 'EMERGENZA MEDICA',
            'triggered_water':   'ALLARME PERDITA ACQUA'
          } %} {{ mappa.get(stato, stato) }}
        secondary: >
          {% set utente = states('input_text.ring_keypad_last_user') %} {% set
          tastiera = states('input_text.ring_keypad_last_keypad') %} {% if
          utente not in ['','unknown','unavailable'] %}
            Utente: {{ utente }}
            {%- if tastiera not in ['','unknown','unavailable'] %} — Tastiera: {{ tastiera }}{% endif %}
          {% else %}
            Nessuna attività recente
          {% endif %}
        icon: >
          {% set stato = states('input_select.ring_keypad_alarm_state') %} {% if
          stato == 'triggered_rapina' %}
            mdi:alarm-light-off
          {% elif stato.startswith('triggered_') %}
            mdi:alarm-light
          {% elif stato in ['armed_home','armed_away','armed_sera'] %}
            mdi:shield-lock
          {% elif stato == 'arming' %}
            mdi:shield-sync
          {% else %}
            mdi:shield-home-outline
          {% endif %}
        icon_color: >
          {% set stato = states('input_select.ring_keypad_alarm_state') %} {% if
          stato.startswith('triggered_') %}
            red
          {% elif stato == 'armed_sera' %}
            #8B6FDB
          {% elif stato in ['armed_home','armed_away','arming'] %}
            orange
          {% else %}
            green
          {% endif %}
        grid_options:
          columns: 12
          rows: 1
        tap_action:
          action: none
      - type: conditional
        conditions:
          - condition: state
            entity: input_boolean.ring_keypad_bypass_pending
            state: "on"
        grid_options:
          columns: 12
          rows: 1
        card:
          type: custom:mushroom-template-card
          primary: Bypass in attesa di conferma
          secondary: >
            {% set tastiera = states('input_text.ring_keypad_bypass_keypad') %}
            {% set profilo = states('input_text.ring_keypad_bypass_mode') %}
            Tastiera: {{ tastiera if tastiera not in ['','unknown','unavailable'] else 'N/D' }}
            — Profilo: {{ profilo if profilo not in ['','unknown','unavailable'] else 'N/D' }}
          icon: mdi:shield-alert
          icon_color: orange
          tap_action:
            action: none
      - type: conditional
        conditions:
          - condition: or
            conditions:
              - condition: state
                entity: input_select.ring_keypad_alarm_state
                state: triggered_burglar
              - condition: state
                entity: input_select.ring_keypad_alarm_state
                state: triggered_rapina
              - condition: state
                entity: input_select.ring_keypad_alarm_state
                state: triggered_fire
              - condition: state
                entity: input_select.ring_keypad_alarm_state
                state: triggered_medical
              - condition: state
                entity: input_select.ring_keypad_alarm_state
                state: triggered_water
        grid_options:
          columns: 12
          rows: 2
        card:
          type: markdown
          content: >-
            {% set stato = states('input_select.ring_keypad_alarm_state') %}

            {% set mappa = {
              'triggered_burglar': 'INTRUSIONE',
              'triggered_rapina':  'ANTI-RAPINA SILENZIOSO',
              'triggered_fire':    'INCENDIO / FUMO',
              'triggered_medical': 'EMERGENZA MEDICA',
              'triggered_water':   'PERDITA ACQUA'
            } %}

            <ha-alert alert-type="error" title="ALLARME ATTIVO: {{
            mappa.get(stato, stato | replace('triggered_','') | upper) }}">{% if
            stato == 'triggered_rapina' %}Allarme silenzioso attivo. Contattare
            le autorità.{% else %}Intervenire immediatamente o inserire il PIN
            sulla tastiera per disattivare.{% endif %}</ha-alert>
  - type: grid
    cards:
      - type: heading
        heading: Stato Hardware
        heading_style: title
        icon: mdi:keyboard-variant
      - type: tile
        entity: binary_sensor.tastiera_camera_allarme_online
        name: Camera — Online
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        card_mod:
          style: >
            {% set online =
            is_state('binary_sensor.tastiera_camera_allarme_online','on') %}
            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px {{ 'green' if online else 'red' }};
              padding-left: 12px;
            }
      - type: tile
        entity: sensor.tastiera_camera_allarme_batteria
        name: Camera — Batteria
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        card_mod:
          style: >
            {% set batt = states('sensor.tastiera_camera_allarme_batteria') |
            int(0) %} {% set color = 'green' if batt > 30 else ('orange' if batt
            > 15 else 'red') %} ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px {{ color }};
              padding-left: 12px;
            }
      - type: tile
        entity: binary_sensor.tastiera_sala_allarme_online
        name: Sala — Online
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        card_mod:
          style: >
            {% set online =
            is_state('binary_sensor.tastiera_sala_allarme_online','on') %}
            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px {{ 'green' if online else 'red' }};
              padding-left: 12px;
            }
      - type: tile
        entity: sensor.tastiera_sala_allarme_batteria
        name: Sala — Batteria
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        card_mod:
          style: >
            {% set batt = states('sensor.tastiera_sala_allarme_batteria') |
            int(0) %} {% set color = 'green' if batt > 30 else ('orange' if batt
            > 15 else 'red') %} ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px {{ color }};
              padding-left: 12px;
            }
      - type: custom:mushroom-template-card
        primary: Tastiere attive
        secondary: >
          {% set raw = states('input_text.ring_keypad_active_keypads') %} {% if
          raw in ['','unknown','unavailable'] %}
            Nessuna tastiera configurata
          {% else %}
            {% set lista = raw.split(',') | map('trim') | list %}
            {{ lista | join(' • ') }} ({{ lista | count }} tastier{{ 'a' if lista | count == 1 else 'e' }})
          {% endif %}
        icon: mdi:keyboard-multiple
        icon_color: >
          {% set raw = states('input_text.ring_keypad_active_keypads') %} {{
          'green' if raw not in ['','unknown','unavailable'] else 'red' }}
        grid_options:
          columns: 12
          rows: 1
        tap_action:
          action: none
  - type: grid
    cards:
      - type: heading
        heading: Configurazione
        heading_style: title
        icon: mdi:cog
      - type: tile
        entity: input_boolean.ring_keypad_voice_feedback
        name: Feedback vocale
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        card_mod:
          style: >
            {% set on =
            is_state('input_boolean.ring_keypad_voice_feedback','on') %} ha-card
            {
              border-radius: 30px;
              box-shadow: 0 0 0 3px {{ 'green' if on else 'grey' }};
              padding-left: 12px;
            }
      - type: tile
        entity: input_boolean.ring_keypad_require_code_to_arm
        name: Richiedi PIN per armare
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        card_mod:
          style: >
            {% set on =
            is_state('input_boolean.ring_keypad_require_code_to_arm','on') %}
            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 3px {{ 'orange' if on else 'green' }};
              padding-left: 12px;
            }
      - type: tile
        entity: input_select.ring_keypad_led_mode
        name: Modalità LED
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        card_mod:
          style: >
            {% set mode = states('input_select.ring_keypad_led_mode') %} {% if
            mode == 'Spenti' %}
              {% set color = '#555' %}
            {% elif mode == 'Lampeggio (3s)' %}
              {% set color = '#f0a500' %}
            {% else %}
              {% set color = '#4a90d9' %}
            {% endif %} ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px {{ color }};
              padding-left: 12px;
            }
      - type: tile
        entity: input_boolean.ring_keypad_debug
        name: Modalità Debug
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        card_mod:
          style: >
            {% set on = is_state('input_boolean.ring_keypad_debug','on') %}
            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 3px {{ 'orange' if on else 'grey' }};
              padding-left: 12px;
            }
      - type: tile
        entity: input_number.ring_keypad_exit_delay
        name: Ritardo Uscita (da allarme-core)
        vertical: false
        features_position: bottom
        grid_options:
          columns: 12
          rows: 1
        card_mod:
          style: |
            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px #888;
              padding-left: 12px;
              opacity: 0.75;
            }
      - type: tile
        entity: input_number.ring_keypad_siren_volume
        name: Volume Sirena (1-10)
        vertical: false
        features_position: bottom
        features:
          - type: numeric-input
            style: buttons
        grid_options:
          columns: 6
          rows: 2
        card_mod:
          style: >
            {% set vol = states('input_number.ring_keypad_siren_volume') |
            int(5) %} {% if vol <= 3 %}
              {% set color = '#4a90d9' %}
            {% elif vol <= 7 %}
              {% set color = '#f0a500' %}
            {% else %}
              {% set color = 'red' %}
            {% endif %} ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px {{ color }};
              padding-left: 12px;
            }
      - type: tile
        entity: input_number.ring_keypad_bypass_timeout
        name: Timeout Bypass (sec)
        vertical: false
        features_position: bottom
        features:
          - type: numeric-input
            style: buttons
        grid_options:
          columns: 6
          rows: 2
        card_mod:
          style: >
            {% set t = states('input_number.ring_keypad_bypass_timeout') |
            int(30) %} {% if t <= 30 %}
              {% set color = '#4a90d9' %}
            {% elif t <= 60 %}
              {% set color = '#f0a500' %}
            {% else %}
              {% set color = '#9b59b6' %}
            {% endif %} ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px {{ color }};
              padding-left: 12px;
            }
      - type: tile
        entity: input_number.ring_keypad_max_failed_attempts
        name: Soglia Lockout (tentativi)
        vertical: false
        features_position: bottom
        features:
          - type: numeric-input
            style: buttons
        grid_options:
          columns: 6
          rows: 2
        card_mod:
          style: >
            {% set val = states('input_number.ring_keypad_max_failed_attempts') | int(5) %}
            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px {{ 'red' if val <= 3 else ('orange' if val <= 5 else '#4a90d9') }};
              padding-left: 12px;
            }
      - type: tile
        entity: input_boolean.ring_keypad_lockout_active
        name: Lockout Brute-Force
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        card_mod:
          style: >
            {% set on = is_state('input_boolean.ring_keypad_lockout_active','on') %}
            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 3px {{ 'red' if on else 'grey' }};
              padding-left: 12px;
            }
      - type: tile
        entity: input_number.ring_keypad_failed_attempts
        name: Tentativi PIN falliti
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        card_mod:
          style: >
            {% set n = states('input_number.ring_keypad_failed_attempts') | int(0) %}
            {% set max = states('input_number.ring_keypad_max_failed_attempts') | int(5) %}
            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px {{ 'red' if n >= max else ('orange' if n > 0 else 'grey') }};
              padding-left: 12px;
            }
      - type: button
        name: Sync Forzato
        icon: mdi:sync
        grid_options:
          columns: 6
          rows: 1
        tap_action:
          action: perform-action
          perform_action: script.turn_on
          target:
            entity_id: script.ring_keypad_sync_all
        hold_action:
          action: perform-action
          perform_action: script.turn_on
          target:
            entity_id: script.ring_keypad_set_siren_volume_all
        card_mod:
          style: |
            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px #4a90d9;
            }
      - type: button
        name: Configurazione Avanzata
        icon: mdi:account-key
        grid_options:
          columns: 6
          rows: 2
        tap_action:
          action: perform-action
          perform_action: browser_mod.popup
          data:
            title: Configurazione Avanzata — Ring Keypad
            content:
              type: vertical-stack
              cards:
                - type: entities
                  title: Utenti e PIN
                  entities:
                    - entity: input_text.ring_keypad_name_master
                      name: Nome Master
                    - entity: input_text.ring_keypad_pin_master
                      name: PIN Master
                    - entity: input_text.ring_keypad_name_user1
                      name: Nome Utente 1
                    - entity: input_text.ring_keypad_pin_user1
                      name: PIN Utente 1
                    - entity: input_text.ring_keypad_name_user2
                      name: Nome Utente 2
                    - entity: input_text.ring_keypad_pin_user2
                      name: PIN Utente 2
                    - entity: input_text.ring_keypad_name_user3
                      name: Nome Utente 3
                    - entity: input_text.ring_keypad_pin_user3
                      name: PIN Utente 3
                - type: conditional
                  conditions:
                    - condition: state
                      entity: binary_sensor.keypad_collisione_pin
                      state: "on"
                  card:
                    type: markdown
                    content: >-
                      <ha-alert alert-type="warning">⚠️ Due o più utenti hanno lo stesso PIN — verificare la configurazione sopra.</ha-alert>
                - type: entities
                  title: Tastiere e Display
                  entities:
                    - entity: input_text.ring_keypad_active_keypads
                      name: Tastiere Attive (topic CSV)
                    - entity: input_select.ring_keypad_led_mode
                      name: Modalità LED
                    - entity: input_boolean.ring_keypad_voice_feedback
                      name: Feedback vocale
                - type: markdown
                  content: >-
                    **Ping Z-Wave** — verifica che ogni comando LED sia effettivamente
                    ricevuto dalla tastiera. Se il ping fallisce viene loggato un alert 🚨.
                    Inserire un qualsiasi *entity_id* dell'integrazione **zwave_js** per ogni
                    tastiera (es. sensore batteria o qualsiasi entità del dispositivo zwave_js).
                    Formato JSON: `{"tastiera_allarme_camera": "sensor.ring_keypad_v2_battery_level"}`
                - type: entities
                  title: Ping Z-Wave
                  entities:
                    - entity: input_text.ring_keypad_zwave_entity_ids
                      name: Entity IDs Z-Wave JS (JSON)
        card_mod:
          style: |
            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px #4a90d9;
            }
      - type: button
        name: Debug
        icon: mdi:bug-check
        grid_options:
          columns: 6
          rows: 2
        tap_action:
          action: perform-action
          perform_action: browser_mod.popup
          data:
            title: Debug — Ring Keypad
            content:
              type: vertical-stack
              cards:
                - type: conditional
                  conditions:
                    - condition: state
                      entity: input_boolean.ring_keypad_debug
                      state: "on"
                  card:
                    type: markdown
                    content: >-
                      <ha-alert alert-type="warning"> ⚠️ Debug ON: propagazione
                      verso allarme-core e safety-core BLOCCATA </ha-alert>
                - type: entities
                  title: Registro e Diagnostica
                  entities:
                    - entity: input_boolean.ring_keypad_debug
                      name: Debug Mode
                    - entity: input_text.ring_keypad_last_user
                      name: Ultimo Utente
                      secondary_info: last-updated
                    - entity: input_text.ring_keypad_last_event
                      name: Ultimo Evento
                      secondary_info: last-updated
                    - entity: input_text.ring_keypad_last_keypad
                      name: Ultima Tastiera
                      secondary_info: last-updated
                    - entity: input_select.ring_keypad_alarm_state
                      name: Stato Corrente
                    - entity: input_text.ring_keypad_arming_target_mode
                      name: Target Mode Arming
                      secondary_info: last-updated
                    - entity: input_boolean.ring_keypad_bypass_pending
                      name: Bypass Pendente
                    - entity: input_text.ring_keypad_bypass_mode
                      name: Bypass Mode
                      secondary_info: last-updated
                    - entity: input_text.ring_keypad_bypass_keypad
                      name: Bypass Tastiera
                      secondary_info: last-updated
                    - type: divider
                    - entity: input_boolean.ring_keypad_lockout_active
                      name: Lockout Attivo
                    - entity: input_number.ring_keypad_failed_attempts
                      name: Tentativi falliti
                    - entity: binary_sensor.keypad_collisione_pin
                      name: Collisione PIN
        card_mod:
          style: |
            ha-card {
              border-radius: 30px;
              opacity: 0.55;
              box-shadow: 0 0 0 2px grey;
            }
  - type: grid
    cards:
      - type: heading
        heading: Log & Attività
        heading_style: title
        icon: mdi:math-log
      - type: custom:mushroom-template-card
        primary: Ultimo Evento
        secondary: >
          {% set ev = states('input_text.ring_keypad_last_event') %} {{ ev if ev
          not in ['','unknown','unavailable'] else 'Nessun evento registrato' }}
        icon: mdi:history
        icon_color: >
          {% set ev = states('input_text.ring_keypad_last_event') %} {{ 'orange'
          if ev not in ['','unknown','unavailable'] else 'grey' }}
        grid_options:
          columns: 12
          rows: 2
        tap_action:
          action: none
      - type: tile
        entity: input_text.ring_keypad_last_keypad
        name: Ultima Tastiera
        vertical: false
        features_position: bottom
        grid_options:
          columns: 4
          rows: 1
        card_mod:
          style: |
            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px #555;
              padding-left: 12px;
            }
      - type: tile
        entity: input_text.ring_keypad_last_user
        name: Ultimo Utente
        vertical: false
        features_position: bottom
        grid_options:
          columns: 4
          rows: 1
        card_mod:
          style: |
            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px #555;
              padding-left: 12px;
            }
      - type: button
        grid_options:
          columns: 6
          rows: 2
        name: Registro
        icon: mdi:book-open-outline
        tap_action:
          action: perform-action
          perform_action: browser_mod.popup
          data:
            title: Registro Log Ring Keypad
            content:
              type: vertical-stack
              cards:
                - type: markdown
                  title: Critici
                  content: >
                    {% set c_raw =
                    state_attr('var.ring_keypad_timeline_critici_md','long_state')
                    | default('', true) | string %} {% set c_list =
                    c_raw.split('\n') | map('trim') | reject('equalto','') |
                    list %} ### 🚨 Critici ({{ c_list | length }}) {{ c_raw |
                    trim if c_list | length > 0 else '_Nessun evento critico._'
                    }}
                  card_mod:
                    style: |
                      ha-markdown {
                        max-height: 200px;
                        overflow-y: auto;
                        display: block;
                      }
                - type: markdown
                  title: Operazioni
                  content: >
                    {% set o_raw =
                    state_attr('var.ring_keypad_timeline_operazioni_md','long_state')
                    | default('', true) | string %} {% set o_list =
                    o_raw.split('\n') | map('trim') | reject('equalto','') |
                    list %} ### ⚙️ Operazioni ({{ o_list | length }}) {{ o_raw |
                    trim if o_list | length > 0 else '_Nessuna operazione._' }}
                  card_mod:
                    style: |
                      ha-markdown {
                        max-height: 200px;
                        overflow-y: auto;
                        display: block;
                      }
                - type: markdown
                  title: Note
                  content: >
                    {% set n_raw =
                    state_attr('var.ring_keypad_timeline_note_md','long_state')
                    | default('', true) | string %} {% set n_list =
                    n_raw.split('\n') | map('trim') | reject('equalto','') |
                    list %} ### 📝 Note ({{ n_list | length }}) {{ n_raw | trim
                    if n_list | length > 0 else '_Nessuna nota._' }}
                  card_mod:
                    style: |
                      ha-markdown {
                        max-height: 200px;
                        overflow-y: auto;
                        display: block;
                      }
