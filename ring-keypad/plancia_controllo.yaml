              armed_away: mdi:lock
              armed_sera: mdi:weather-night
              arming: mdi:lock-alert-outline
              triggered_burglar: mdi:alarm-light
              triggered_rapina: mdi:police-badge
              triggered_fire: mdi:fire
              triggered_medical: mdi:medical-bag
              triggered_water: mdi:water-alert
            icon_color_map:
