              armed_away: ARMATO FUORI
              armed_sera: ARMATO SERA
              arming: INSERIMENTO
              triggered_burglar: INTRUSIONE
              triggered_rapina: ANTI-RAPINA
              triggered_fire: INCENDIO
              triggered_medical: MEDICO
              triggered_water: ACQUA
            icon_map:
