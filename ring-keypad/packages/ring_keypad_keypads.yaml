###############################################################################
# RING KEYPAD V2 - SENSORI MQTT PER TASTIERA FISICA
#
# Una sezione per ogni tastiera fisica presente nell'impianto.
# Questi sensori forniscono stato batteria e connettività di ogni device.
#
# Per aggiungere una nuova tastiera:
#   1. Decommentare il blocco template corrispondente
#   2. Sostituire <topic_base> con il nome nodo reale in zwave2mqtt
#   3. Sostituire <id_univoco> con un identificatore univoco (snake_case)
#   4. Aggiungere il topic base in input_text.ring_keypad_active_keypads
#      (separato da virgola)
#
# NOTA: il topic "status" di zwave2mqtt pubblica payload JSON con struttura:
#   {"time":..., "value":true, "status":"Alive", "nodeId":N}
#   Usare value_template: "{{ value_json.status }}" per estrarre "Alive"/"Dead".
#
# NOTA: il topic "battery" pubblica il livello reale (0-100) con struttura:
#   {"time":..., "value":100}
#   Topic: zwave2mqtt/{keypad_id}/battery/endpoint_0/level
###############################################################################

mqtt:
  sensor:

    # ── TASTIERA 1: tastiera_allarme_camera ───────────────────────────────
    - name: "Tastiera Camera - Batteria"
      unique_id: ring_keypad_tastiera_allarme_camera_battery
      object_id: tastiera_camera_allarme_batteria
      state_topic: "zwave2mqtt/tastiera_allarme_camera/battery/endpoint_0/level"
      value_template: "{{ value_json.value }}"
      device_class: battery
      unit_of_measurement: "%"
      icon: mdi:battery

    # ── TEMPLATE NUOVA TASTIERA - BATTERIA (decommentare e modificare) ─────
    # - name: "Tastiera Ingresso - Batteria"
    #   unique_id: ring_keypad_tastiera_ingresso_battery
    #   state_topic: "zwave2mqtt/tastiera_ingresso/battery/endpoint_0/level"
    #   value_template: "{{ value_json.value }}"
    #   device_class: battery
    #   unit_of_measurement: "%"
    #   icon: mdi:battery

    # - name: "Tastiera Garage - Batteria"
    #   unique_id: ring_keypad_tastiera_garage_battery
    #   state_topic: "zwave2mqtt/tastiera_garage/battery/endpoint_0/level"
    #   value_template: "{{ value_json.value }}"
    #   device_class: battery
    #   unit_of_measurement: "%"
    #   icon: mdi:battery

  binary_sensor:

    # ── TASTIERA 1: tastiera_allarme_camera ───────────────────────────────
    - name: "Tastiera Camera - Online"
      unique_id: ring_keypad_tastiera_allarme_camera_online
      object_id: tastiera_camera_allarme_online
      state_topic: "zwave2mqtt/tastiera_allarme_camera/status"
      # Payload JSON: {"time":..., "value":true, "status":"Alive", "nodeId":N}
      value_template: "{{ value_json.status }}"
      payload_on: "Alive"
      payload_off: "Dead"
      device_class: connectivity
      icon: mdi:keyboard

    # ── TEMPLATE NUOVA TASTIERA - ONLINE (decommentare e modificare) ───────
