###############################################################################
# RING KEYPAD V2 - AUTOMAZIONI INPUT
#
# Tutte le automazioni usano wildcard MQTT (+) per supportare qualsiasi
# tastiera senza modifiche al codice. Il keypad_id viene estratto
# automaticamente dal topic ricevuto:
#   trigger.topic.split('/')[1]
#
# ── PROTOCOLLO CORRETTO (Entry Control CC 111) ────────────────────────────
# Topic: zwave2mqtt/+/unknownClass_111/endpoint_0/{event_type}/{data_type}
#
# event_type | data_type | Significato
# -----------|-----------|--------------------------------------------------
#  3         | 2         | Tasto Disarm + codice
#  6         | 2         | Tasto Arm Home + codice
#  6         | 0         | Tasto Arm Home senza codice
#  5         | 2         | Tasto Arm Away + codice
#  5         | 0         | Tasto Arm Away senza codice
#  2         | 2         | Tasto V (Enter) + codice → arma profilo sera
# 25         | 2         | Tasto X (Cancel) + codice → annulla bypass o solo log
# 25         | 0         | Tasto X (Cancel) senza codice → annulla bypass o solo log
# 17         | 0         | Tasto Police hold 3s → anti-rapina SILENZIOSO
# 19         | 0         | Tasto Medical hold 3s
# 16         | 0         | Tasto Fire hold 3s
#
# Payload JSON con codice: {"time":..., "value":"1234"}
# Payload JSON senza codice: {"time":...}  (no campo value)
###############################################################################

automation:

  # ════════════════════════════════════════════════════════════════════════
  # TASTO DISARM + codice (event_type=3, data_type=2)
  # ════════════════════════════════════════════════════════════════════════
  - id: ring_keypad_input_disarm
    alias: "Keypad - Input: Disarm"
    trigger:
      - platform: mqtt
        topic: "zwave2mqtt/+/unknownClass_111/endpoint_0/3/2"
    variables:
      keypad_id: "{{ trigger.topic.split('/')[1] }}"
    action:
      - action: script.ring_keypad_validate_and_disarm
        data:
          code: "{{ trigger.payload_json.get('value', '') }}"
          keypad_id: "{{ keypad_id }}"

  # ════════════════════════════════════════════════════════════════════════
  # TASTO ARM AWAY + codice (event_type=5, data_type=2)
  # Se bypass pendente per questa tastiera: solo V può confermare → code_rejected.
  # ════════════════════════════════════════════════════════════════════════
  - id: ring_keypad_input_arm_away
    alias: "Keypad - Input: Arm Away (con codice)"
    trigger:
      - platform: mqtt
        topic: "zwave2mqtt/+/unknownClass_111/endpoint_0/5/2"
    variables:
      keypad_id: "{{ trigger.topic.split('/')[1] }}"
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.ring_keypad_bypass_pending
                state: "on"
              - condition: template
                value_template: "{{ states('input_text.ring_keypad_bypass_keypad') == keypad_id }}"
            sequence:
              - action: script.ring_keypad_code_rejected
                data:
                  keypad_id: "{{ keypad_id }}"
              - action: input_text.set_value
                target:
                  entity_id: input_text.ring_keypad_last_event
                data:
                  value: "Bypass attivo - premere V per confermare"
        default:
          - action: script.ring_keypad_validate_and_arm
            data:
              code: "{{ trigger.payload_json.get('value', '') }}"
              mode: "armed_away"
              keypad_id: "{{ keypad_id }}"

  # ════════════════════════════════════════════════════════════════════════
  # TASTO ARM AWAY senza codice (event_type=5, data_type=0)
  # Se require_code_to_arm=off → arma direttamente
  # Se require_code_to_arm=on  → feedback codice rifiutato
  # Mantenuto per compatibilità hardware (alcuni firmware lo emettono)
  # ════════════════════════════════════════════════════════════════════════
  - id: ring_keypad_input_arm_away_nocode
    alias: "Keypad - Input: Arm Away (no codice)"
    trigger:
      - platform: mqtt
        topic: "zwave2mqtt/+/unknownClass_111/endpoint_0/5/0"
    variables:
      keypad_id: "{{ trigger.topic.split('/')[1] }}"
    action:
      - choose:
          # Bypass pendente → solo V può confermare, non questo tasto
          - conditions:
              - condition: state
                entity_id: input_boolean.ring_keypad_bypass_pending
                state: "on"
              - condition: template
                value_template: "{{ states('input_text.ring_keypad_bypass_keypad') == keypad_id }}"
            sequence:
              - action: script.ring_keypad_code_rejected
                data:
                  keypad_id: "{{ keypad_id }}"
              - action: input_text.set_value
                target:
                  entity_id: input_text.ring_keypad_last_event
                data:
                  value: "Bypass attivo - premere V per confermare"
          # Nessun bypass pendente + code non richiesto → controlla sensori e arma
          - conditions:
              - condition: state
                entity_id: input_boolean.ring_keypad_require_code_to_arm
                state: "off"
            sequence:
              - action: script.ring_keypad_arm_or_challenge
                data:
                  mode: "armed_away"
                  keypad_id: "{{ keypad_id }}"
        default:
          - action: script.ring_keypad_code_rejected
            data:
              keypad_id: "{{ keypad_id }}"

  # ════════════════════════════════════════════════════════════════════════
  # TASTO ARM HOME + codice (event_type=6, data_type=2)
  # Se bypass pendente per questa tastiera: solo V può confermare → code_rejected.
  # ════════════════════════════════════════════════════════════════════════
  - id: ring_keypad_input_arm_home
    alias: "Keypad - Input: Arm Home (con codice)"
    trigger:
      - platform: mqtt
        topic: "zwave2mqtt/+/unknownClass_111/endpoint_0/6/2"
    variables:
      keypad_id: "{{ trigger.topic.split('/')[1] }}"
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.ring_keypad_bypass_pending
                state: "on"
              - condition: template
                value_template: "{{ states('input_text.ring_keypad_bypass_keypad') == keypad_id }}"
            sequence:
              - action: script.ring_keypad_code_rejected
                data:
                  keypad_id: "{{ keypad_id }}"
              - action: input_text.set_value
                target:
                  entity_id: input_text.ring_keypad_last_event
                data:
                  value: "Bypass attivo - premere V per confermare"
        default:
          - action: script.ring_keypad_validate_and_arm
            data:
              code: "{{ trigger.payload_json.get('value', '') }}"
              mode: "armed_home"
              keypad_id: "{{ keypad_id }}"

  # ════════════════════════════════════════════════════════════════════════
  # TASTO ARM HOME senza codice (event_type=6, data_type=0)
  # Se require_code_to_arm=off → arma direttamente
  # Se require_code_to_arm=on  → feedback codice rifiutato
  # Mantenuto per compatibilità hardware (alcuni firmware lo emettono)
  # ════════════════════════════════════════════════════════════════════════
  - id: ring_keypad_input_arm_home_nocode
    alias: "Keypad - Input: Arm Home (no codice)"
    trigger:
      - platform: mqtt
        topic: "zwave2mqtt/+/unknownClass_111/endpoint_0/6/0"
    variables:
      keypad_id: "{{ trigger.topic.split('/')[1] }}"
    action:
      - choose:
          # Bypass pendente → solo V può confermare, non questo tasto
          - conditions:
              - condition: state
                entity_id: input_boolean.ring_keypad_bypass_pending
                state: "on"
              - condition: template
                value_template: "{{ states('input_text.ring_keypad_bypass_keypad') == keypad_id }}"
            sequence:
              - action: script.ring_keypad_code_rejected
                data:
                  keypad_id: "{{ keypad_id }}"
              - action: input_text.set_value
                target:
                  entity_id: input_text.ring_keypad_last_event
                data:
                  value: "Bypass attivo - premere V per confermare"
          # Nessun bypass pendente + code non richiesto → controlla sensori e arma
          - conditions:
              - condition: state
                entity_id: input_boolean.ring_keypad_require_code_to_arm
                state: "off"
            sequence:
              - action: script.ring_keypad_arm_or_challenge
                data:
                  mode: "armed_home"
                  keypad_id: "{{ keypad_id }}"
        default:
          - action: script.ring_keypad_code_rejected
            data:
              keypad_id: "{{ keypad_id }}"

  # ════════════════════════════════════════════════════════════════════════
  # TASTO V (Enter) + codice (event_type=2, data_type=2)
  # Se bypass pendente → conferma bypass (senza PIN).
  # Altrimenti → arma profilo sera con PIN.
  # ════════════════════════════════════════════════════════════════════════
  - id: ring_keypad_input_enter
    alias: "Keypad - Input: Tasto V (Arm Sera)"
    trigger:
      - platform: mqtt
        topic: "zwave2mqtt/+/unknownClass_111/endpoint_0/2/2"
    variables:
      keypad_id: "{{ trigger.topic.split('/')[1] }}"
    action:
      - choose:
          # Bypass pendente → V conferma il bypass, PIN ignorato
          - conditions:
              - condition: state
                entity_id: input_boolean.ring_keypad_bypass_pending
                state: "on"
              - condition: template
                value_template: "{{ states('input_text.ring_keypad_bypass_keypad') == keypad_id }}"
            sequence:
              - action: script.ring_keypad_bypass_confirm
                data:
                  keypad_id: "{{ keypad_id }}"
        default:
          # Nessun bypass → arma profilo sera con PIN
          - action: script.ring_keypad_validate_and_arm
            data:
              code: "{{ trigger.payload_json.get('value', '') }}"
              mode: "armed_sera"
              keypad_id: "{{ keypad_id }}"

  # ════════════════════════════════════════════════════════════════════════
  # TASTO V (Enter) senza codice (event_type=2, data_type=0)
  # Se bypass pendente → conferma bypass (senza PIN).
  # Altrimenti → arma profilo sera se require_code_to_arm=off.
  # ════════════════════════════════════════════════════════════════════════
  - id: ring_keypad_input_enter_nocode
    alias: "Keypad - Input: Tasto V (Arm Sera, no codice)"
    trigger:
      - platform: mqtt
        topic: "zwave2mqtt/+/unknownClass_111/endpoint_0/2/0"
    variables:
      keypad_id: "{{ trigger.topic.split('/')[1] }}"
    action:
      - choose:
          # Bypass pendente → V conferma il bypass
          - conditions:
              - condition: state
                entity_id: input_boolean.ring_keypad_bypass_pending
                state: "on"
              - condition: template
                value_template: "{{ states('input_text.ring_keypad_bypass_keypad') == keypad_id }}"
            sequence:
              - action: script.ring_keypad_bypass_confirm
                data:
                  keypad_id: "{{ keypad_id }}"
          # Nessun bypass + code non richiesto → controlla sensori e arma.
          # GUARDIA DOPPIA anti-loop:
          #   1. bypass_confirm NON in esecuzione: evita che un messaggio 2/0 duplicato
          #      (hardware o rete) arrivi DOPO che bypass_cancel ha azzerato bypass_pending
          #      ma PRIMA che do_arm imposti lo stato su "arming", chiamando
          #      arm_or_challenge con sensori ancora aperti e ri-entrando nel bypass loop.
          #   2. stato == disarmed: evita arm_or_challenge durante arming/armed.
          - conditions:
              - condition: state
                entity_id: input_boolean.ring_keypad_require_code_to_arm
                state: "off"
              - condition: template
                value_template: >
                  {{ not is_state('script.ring_keypad_bypass_confirm', 'on') and
                     states('input_select.ring_keypad_alarm_state') == 'disarmed' }}
            sequence:
              - action: script.ring_keypad_arm_or_challenge
                data:
                  mode: "armed_sera"
                  keypad_id: "{{ keypad_id }}"
        default:
          - action: script.ring_keypad_code_rejected
            data:
              keypad_id: "{{ keypad_id }}"

  # ════════════════════════════════════════════════════════════════════════
  # TASTO X (Cancel) — con codice (25/2) o senza codice (25/0)
  # Se bypass pendente per questa tastiera: annulla il bypass e ripristina LED.
  # In ogni caso aggiorna il log.
  # Nota: durante il bypass l'utente preme X senza codice → 25/0, non solo 25/2.
  # ════════════════════════════════════════════════════════════════════════
  - id: ring_keypad_input_cancel
    alias: "Keypad - Input: Tasto X (Cancel)"
    trigger:
      - platform: mqtt
        topic: "zwave2mqtt/+/unknownClass_111/endpoint_0/25/2"
      - platform: mqtt
        topic: "zwave2mqtt/+/unknownClass_111/endpoint_0/25/0"
    variables:
      keypad_id: "{{ trigger.topic.split('/')[1] }}"
    action:
      # Se bypass pendente per questa tastiera: annulla e ripristina LED
      - if:
          - condition: state
            entity_id: input_boolean.ring_keypad_bypass_pending
            state: "on"
          - condition: template
            value_template: "{{ states('input_text.ring_keypad_bypass_keypad') == keypad_id }}"
        then:
          - action: script.ring_keypad_bypass_cancel
          - action: script.ring_keypad_sync_state
            data:
              keypad_id: "{{ keypad_id }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.ring_keypad_last_event
        data:
          value: "Tasto X - annullamento"
      - action: input_text.set_value
        target:
          entity_id: input_text.ring_keypad_last_keypad
        data:
          value: "{{ keypad_id }}"

  # ════════════════════════════════════════════════════════════════════════
  # TASTO POLICE / ANTI-RAPINA (event_type=17, data_type=0) - hold 3s
  # → stato triggered_rapina → broadcast SILENZIOSO (Alarming_Burglar payload 1)
  # ════════════════════════════════════════════════════════════════════════
  - id: ring_keypad_input_rapina
    alias: "Keypad - Input: Anti-Rapina (Police hold 3s)"
    trigger:
      - platform: mqtt
        topic: "zwave2mqtt/+/unknownClass_111/endpoint_0/17/0"
    variables:
      keypad_id: "{{ trigger.topic.split('/')[1] }}"
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.ring_keypad_alarm_state
        data:
          option: "triggered_rapina"
      - action: input_text.set_value
        target:
          entity_id: input_text.ring_keypad_last_event
        data:
          value: "ANTI-RAPINA dalla tastiera {{ keypad_id }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.ring_keypad_last_keypad
        data:
          value: "{{ keypad_id }}"
      # broadcast diretto: non passa da sync_all (che userebbe lo stato, già corretto)
      # ma chiama broadcast_alarm per garantire il feedback immediato su tutte le tastiere
      - action: script.ring_keypad_broadcast_alarm
        data:
          alarm_type: "rapina"

  # ════════════════════════════════════════════════════════════════════════
  # TASTO MEDICAL (event_type=19, data_type=0) - hold 3s
  # ════════════════════════════════════════════════════════════════════════
  - id: ring_keypad_input_medical
    alias: "Keypad - Input: Medical (hold 3s)"
    trigger:
      - platform: mqtt
        topic: "zwave2mqtt/+/unknownClass_111/endpoint_0/19/0"
    variables:
      keypad_id: "{{ trigger.topic.split('/')[1] }}"
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.ring_keypad_alarm_state
        data:
          option: "triggered_medical"
      - action: input_text.set_value
        target:
          entity_id: input_text.ring_keypad_last_event
        data:
          value: "MEDICAL dalla tastiera {{ keypad_id }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.ring_keypad_last_keypad
        data:
          value: "{{ keypad_id }}"
      - action: script.ring_keypad_broadcast_alarm
        data:
          alarm_type: "medical"

  # ════════════════════════════════════════════════════════════════════════
  # TASTO FIRE (event_type=16, data_type=0) - hold 3s
  # ════════════════════════════════════════════════════════════════════════
  - id: ring_keypad_input_fire
    alias: "Keypad - Input: Fire (hold 3s)"
    trigger:
      - platform: mqtt
        topic: "zwave2mqtt/+/unknownClass_111/endpoint_0/16/0"
    variables:
      keypad_id: "{{ trigger.topic.split('/')[1] }}"
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.ring_keypad_alarm_state
        data:
          option: "triggered_fire"
      - action: input_text.set_value
        target:
          entity_id: input_text.ring_keypad_last_event
        data:
          value: "FIRE dalla tastiera {{ keypad_id }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.ring_keypad_last_keypad
        data:
          value: "{{ keypad_id }}"
      - action: script.ring_keypad_broadcast_alarm
        data:
          alarm_type: "fire"

  # ════════════════════════════════════════════════════════════════════════
  # SYNC INDICATORI AL CAMBIO DI STATO
  # Quando ring_keypad_alarm_state cambia, aggiorna tutte le tastiere.
  # Questo gestisce automaticamente i casi: disarmed, armed_home, armed_away,
  # arming (ma NON i triggered: quelli usano broadcast_alarm diretto
  # per garantire il feedback immediato, poi sync_all li rinforza).
  # ════════════════════════════════════════════════════════════════════════
  - id: ring_keypad_sync_on_state_change
    alias: "Keypad - Sync indicatori da cambio stato"
    trigger:
      - platform: state
        entity_id: input_select.ring_keypad_alarm_state
    action:
      - action: script.ring_keypad_sync_all

  # ════════════════════════════════════════════════════════════════════════
  # RIPRISTINO INDICATORI E LED QUANDO UNA TASTIERA TORNA ONLINE
  # zwave2mqtt pubblica JSON: {"status":"Alive", "nodeId":N, ...}
  # value_template estrae il campo "status" per confrontarlo con payload.
  # Condizione: risponde solo se il nodo è nella lista tastiere attive.
  # Dopo il delay: sync stato + imposta modalità LED.
  # ════════════════════════════════════════════════════════════════════════
  - id: ring_keypad_restore_on_connect
    alias: "Keypad - Ripristina indicatori quando torna online"
    trigger:
      - platform: mqtt
        topic: "zwave2mqtt/+/status"
        # Payload JSON: {"time":..., "value":true, "status":"Alive", "nodeId":N}
        value_template: "{{ value_json.status }}"
        payload: "Alive"
    variables:
      keypad_id: "{{ trigger.topic.split('/')[1] }}"
    condition:
      # Reagisce solo se il nodo è una tastiera registrata
      - condition: template
        value_template: "{{ keypad_id in (states('input_text.ring_keypad_active_keypads').split(',') | map('trim') | list) }}"
    action:
      # Breve attesa per permettere alla tastiera di completare l'inizializzazione
      - delay:
          seconds: 3
      - action: script.ring_keypad_set_siren_volume
        data:
          keypad_id: "{{ keypad_id }}"
      # sync_state gestisce internamente il LED (set_led_mode + eventuale override sera)
      - action: script.ring_keypad_sync_state
        data:
          keypad_id: "{{ keypad_id }}"

  # ════════════════════════════════════════════════════════════════════════
  # SYNC ALL AL RIAVVIO DI HOME ASSISTANT
  # Delay 15s per attendere che MQTT e zwave2mqtt siano completamente pronti
  # ════════════════════════════════════════════════════════════════════════
  - id: ring_keypad_sync_on_ha_start
    alias: "Keypad - Sync all al riavvio HA"
    trigger:
      - platform: homeassistant
        event: start
    action:
      - delay:
          seconds: 15
      - action: script.ring_keypad_set_siren_volume_all
      # sync_all → sync_state gestisce internamente il LED per ogni tastiera
      - action: script.ring_keypad_sync_all

  # ════════════════════════════════════════════════════════════════════════
  # SYNC LED QUANDO CAMBIA LA MODALITÀ LED (NUOVO)
  # Quando l'utente modifica ring_keypad_led_mode dalla UI,
  # aggiorna immediatamente tutte le tastiere attive.
  # ════════════════════════════════════════════════════════════════════════
  - id: ring_keypad_sync_led_on_mode_change
    alias: "Keypad - Sync LED da cambio modalità"
    trigger:
      - platform: state
        entity_id: input_select.ring_keypad_led_mode
    condition:
      # Non applicare mentre lo stato è armed_sera: il fast blink verrebbe
      # sovrascritto dalla preferenza utente. Il LED corretto viene ripristinato
      # al prossimo cambio di stato (sync_state chiama set_led_mode all'inizio).
      - condition: template
        value_template: "{{ states('input_select.ring_keypad_alarm_state') != 'armed_sera' }}"
    action:
      - action: script.ring_keypad_set_led_mode_all

  # ════════════════════════════════════════════════════════════════════════
  # SYNC VOLUME SIRENA QUANDO CAMBIA L'IMPOSTAZIONE
  # Quando l'utente modifica ring_keypad_siren_volume dalla UI,
  # aggiorna immediatamente tutte le tastiere attive.
  # ════════════════════════════════════════════════════════════════════════
  - id: ring_keypad_sync_siren_volume_on_change
    alias: "Keypad - Sync volume sirena da cambio impostazione"
    trigger:
      - platform: state
        entity_id: input_number.ring_keypad_siren_volume
    action:
      - action: script.ring_keypad_set_siren_volume_all
