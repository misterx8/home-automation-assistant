###############################################################################
# RING KEYPAD V2 - SCRIPT PARAMETRICI
#
# Tutti gli script che interagiscono con l'hardware accettano `keypad_id`
# come campo obbligatorio (topic base del nodo zwave2mqtt).
#
# ── PROTOCOLLO CORRETTO ────────────────────────────────────────────────────
# Indicator CC:
#   zwave2mqtt/{keypad_id}/indicator/endpoint_0/{Name}/{sub_cmd}/set
#   sub_cmd 1  = on/off indicatore (payload: 0 o 99)
#   sub_cmd 9  = level suono/LED  (payload: 1=silenzioso, 99=con suono)
#   sub_cmd timeout = delay stringa formato "{min}m{sec}s"
#
# LED (System Security Mode Display):
#   zwave2mqtt/{keypad_id}/configuration/endpoint_0/System_Security_Mode_Display/set
#   payload: 0=spenti, 3=lampeggio 3s, 601=sempre accesi
#
# ── VOICE FEEDBACK ─────────────────────────────────────────────────────────
# I payload sub_cmd 9 VOICE-AWARE usano:
#   99 se input_boolean.ring_keypad_voice_feedback = on  (LED + suono)
#    1 se input_boolean.ring_keypad_voice_feedback = off (solo LED)
#
# ECCEZIONI (sempre fissi, non voice-aware):
#   ring_keypad_code_rejected  → sempre 99 (il feedback di errore è fondamentale)
#   ring_keypad_bypass_challenge → sempre 99
#   ring_keypad_alarm_rapina       → sempre 1  (anti-rapina DEVE essere silenzioso)
#   ring_keypad_alarm_burglar      → sempre 99 (allarme intrusione DEVE suonare)
#   ring_keypad_alarm_fire/medical/water → sempre 99 (sicurezza vitale)
#
# SCRIPT PRINCIPALI:
#   ring_keypad_sync_state    → dispatcher per singola tastiera
#   ring_keypad_sync_all      → broadcast sync a tutte le tastiere attive
#   ring_keypad_set_led_mode_all → imposta LED su tutte le tastiere
#   ring_keypad_broadcast_alarm → allarme a tutte le tastiere attive
###############################################################################

script:

  # ══════════════════════════════════════════════════════════════════════════
  # INDICATORE GENERICO (accetta qualsiasi combinatore indicator/sub_cmd)
  # ══════════════════════════════════════════════════════════════════════════

  ring_keypad_send_indicator:
    alias: "Keypad - Invia indicatore generico"
    description: "Invia un comando Indicator CC a una tastiera specifica"
    fields:
      keypad_id:
        description: "Topic base della tastiera (es. tastiera_allarme_camera)"
        required: true
      indicator:
        description: "Nome indicatore (es. Not_armed_-_disarmed)"
        required: true
      sub_cmd:
        description: "Sub-command (1=on/off, 9=level, timeout=delay stringa)"
        required: true
      value:
        description: "Valore payload"
        required: true
    sequence:
      - action: mqtt.publish
        data:
          topic: "zwave2mqtt/{{ keypad_id }}/indicator/endpoint_0/{{ indicator }}/{{ sub_cmd }}/set"
          payload: "{{ value }}"

  # ══════════════════════════════════════════════════════════════════════════
  # STATI MODALITÀ (sub_cmd 9, VOICE-AWARE)
  # ══════════════════════════════════════════════════════════════════════════

  ring_keypad_show_disarmed:
    alias: "Keypad → Disarmed"
    description: "Indica stato disarmato (voice-aware: 99=suono+LED, 1=solo LED)"
    fields:
      keypad_id:
        description: "Topic base della tastiera"
        required: true
    sequence:
      - action: mqtt.publish
        data:
          topic: "zwave2mqtt/{{ keypad_id }}/indicator/endpoint_0/Not_armed_-_disarmed/9/set"
          payload: "{{ '99' if is_state('input_boolean.ring_keypad_voice_feedback', 'on') else '1' }}"

  ring_keypad_show_armed_home:
    alias: "Keypad → Armed Home"
    description: "Indica stato armato casa (voice-aware)"
    fields:
      keypad_id:
        description: "Topic base della tastiera"
        required: true
    sequence:
      - action: mqtt.publish
        data:
          topic: "zwave2mqtt/{{ keypad_id }}/indicator/endpoint_0/Armed_Stay/9/set"
          payload: "{{ '99' if is_state('input_boolean.ring_keypad_voice_feedback', 'on') else '1' }}"

  ring_keypad_show_armed_away:
    alias: "Keypad → Armed Away"
    description: "Indica stato armato fuori (voice-aware)"
    fields:
      keypad_id:
        description: "Topic base della tastiera"
        required: true
    sequence:
      - action: mqtt.publish
        data:
          topic: "zwave2mqtt/{{ keypad_id }}/indicator/endpoint_0/Armed_Away/9/set"
          payload: "{{ '99' if is_state('input_boolean.ring_keypad_voice_feedback', 'on') else '1' }}"

  # ══════════════════════════════════════════════════════════════════════════
  # FEEDBACK CODICE
  # ══════════════════════════════════════════════════════════════════════════

  ring_keypad_code_rejected:
    alias: "Keypad → Codice non accettato"
    description: "Bip di errore codice — SEMPRE con suono (payload 99 fisso)"
    fields:
      keypad_id:
        description: "Topic base della tastiera"
        required: true
    sequence:
      - action: mqtt.publish
        data:
          topic: "zwave2mqtt/{{ keypad_id }}/indicator/endpoint_0/Code_not_accepted/9/set"
          payload: "99"

  ring_keypad_bypass_challenge:
    alias: "Keypad → Bypass richiesto"
    description: "Richiesta bypass — sub_cmd 1! (non 9) — SEMPRE con suono"
    fields:
      keypad_id:
        description: "Topic base della tastiera"
        required: true
    sequence:
      - action: mqtt.publish
        data:
          topic: "zwave2mqtt/{{ keypad_id }}/indicator/endpoint_0/Bypass_challenge/1/set"
          # payload 99 come da manuale del dispositivo
          payload: "99"

  # ══════════════════════════════════════════════════════════════════════════
  # DELAY CON COUNTDOWN (formato stringa "{min}m{sec}s")
  # Il topic usa sub_cmd "timeout" e il payload è una stringa es. "0m30s"
  # ══════════════════════════════════════════════════════════════════════════

  ring_keypad_show_exit_delay:
    alias: "Keypad → Exit Delay"
    description: >
      Mostra countdown exit delay (legge input_number.ring_keypad_exit_delay).
      Payload formato stringa "XmYs" richiesto da zwave2mqtt per il campo timeout
      dell'Indicator CC (es. "0m30s", "1m30s").
    fields:
      keypad_id:
        description: "Topic base della tastiera"
        required: true
    sequence:
      - variables:
          s: "{{ states('input_number.ring_keypad_exit_delay') | int(30) }}"
      - action: mqtt.publish
        data:
          topic: "zwave2mqtt/{{ keypad_id }}/indicator/endpoint_0/Exit_Delay/timeout/set"
          payload: '"{{ s // 60 }}m{{ s % 60 }}s"'


  # ══════════════════════════════════════════════════════════════════════════
  # ALLARMI
  # ══════════════════════════════════════════════════════════════════════════

  ring_keypad_alarm_burglar:
    alias: "Keypad → Allarme Intrusione"
    description: "Allarme intrusione (Alarming) — SEMPRE con suono (payload 99 fisso)"
    fields:
      keypad_id:
        description: "Topic base della tastiera"
        required: true
    sequence:
      - action: mqtt.publish
        data:
          topic: "zwave2mqtt/{{ keypad_id }}/indicator/endpoint_0/Alarming/9/set"
          payload: "99"

  ring_keypad_alarm_rapina:
    alias: "Keypad → Allarme Anti-Rapina"
    description: >
      Anti-rapina (tasto Police tenuto 3s) — usa Alarming_Burglar SEMPRE SILENZIOSO.
      payload 1 fisso (non voice-aware): il silenzio è requisito di sicurezza.
    fields:
      keypad_id:
        description: "Topic base della tastiera"
        required: true
    sequence:
      - action: mqtt.publish
        data:
          topic: "zwave2mqtt/{{ keypad_id }}/indicator/endpoint_0/Alarming_Burglar/9/set"
          # SEMPRE 1: l'anti-rapina deve essere silenzioso per non allertare l'aggressore
          payload: "1"

  ring_keypad_alarm_fire:
    alias: "Keypad → Allarme Fuoco"
    description: "Allarme fuoco/fumo — SEMPRE con suono (payload 99 fisso)"
    fields:
      keypad_id:
        description: "Topic base della tastiera"
        required: true
    sequence:
      - action: mqtt.publish
        data:
          topic: "zwave2mqtt/{{ keypad_id }}/indicator/endpoint_0/Alarming_Smoke_-_Fire/9/set"
          payload: "99"

  ring_keypad_alarm_medical:
    alias: "Keypad → Allarme Medico"
    description: "Allarme medico — SEMPRE con suono (payload 99 fisso)"
    fields:
      keypad_id:
        description: "Topic base della tastiera"
        required: true
    sequence:
      - action: mqtt.publish
        data:
          topic: "zwave2mqtt/{{ keypad_id }}/indicator/endpoint_0/Alarming_Medical/9/set"
          payload: "99"

  ring_keypad_alarm_water:
    alias: "Keypad → Allarme Perdita Acqua"
    description: "Allarme perdita acqua — SEMPRE con suono (payload 99 fisso)"
    fields:
      keypad_id:
        description: "Topic base della tastiera"
        required: true
    sequence:
      - action: mqtt.publish
        data:
          topic: "zwave2mqtt/{{ keypad_id }}/indicator/endpoint_0/Alarming_Water_leak/9/set"
          payload: "99"

  # ══════════════════════════════════════════════════════════════════════════
  # LED MODALITÀ DISPLAY
  # Legge input_select.ring_keypad_led_mode e pubblica il valore corrispondente:
  #   "Spenti"         → 0
  #   "Lampeggio (3s)" → 3
  #   "Sempre accesi"  → 601
  # ══════════════════════════════════════════════════════════════════════════

  ring_keypad_set_led_mode:
    alias: "Keypad → Imposta modalità LED (singola tastiera)"
    description: "Legge ring_keypad_led_mode e pubblica la config LED sulla tastiera"
    fields:
      keypad_id:
        description: "Topic base della tastiera"
        required: true
    sequence:
      - variables:
          led_val: "{{ {'Spenti': '0', 'Lampeggio (3s)': '3', 'Sempre accesi': '601'}.get(states('input_select.ring_keypad_led_mode'), '601') }}"
      - action: mqtt.publish
        data:
          topic: "zwave2mqtt/{{ keypad_id }}/configuration/endpoint_0/System_Security_Mode_Display/set"
          payload: "{{ led_val }}"

  ring_keypad_set_led_mode_all:
    alias: "Keypad → Imposta modalità LED (tutte le tastiere)"
    description: "Itera ring_keypad_active_keypads e chiama set_led_mode su ognuna"
    sequence:
      - repeat:
          for_each: >
            {{ states('input_text.ring_keypad_active_keypads')
               .split(',')
               | map('trim')
               | select('ne', '')
               | list }}
          sequence:
            - action: script.ring_keypad_set_led_mode
              data:
                keypad_id: "{{ repeat.item }}"

  # ══════════════════════════════════════════════════════════════════════════
  # SYNC STATO → SINGOLA TASTIERA (dispatcher)
  # Legge input_select.ring_keypad_alarm_state e invia l'indicatore corretto.
  # Include tutti gli stati: disarmed, armed_home, armed_away, arming,
  # triggered_burglar, triggered_rapina, triggered_fire, triggered_medical, triggered_water
  # ══════════════════════════════════════════════════════════════════════════

  ring_keypad_sync_state:
    alias: "Keypad → Sync stato indicatori (singola tastiera)"
    description: "Dispatcher: invia l'indicatore corretto in base allo stato attuale"
    fields:
      keypad_id:
        description: "Topic base della tastiera"
        required: true
    sequence:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.ring_keypad_alarm_state
                state: "disarmed"
            sequence:
              - action: script.ring_keypad_show_disarmed
                data:
                  keypad_id: "{{ keypad_id }}"

          - conditions:
              - condition: state
                entity_id: input_select.ring_keypad_alarm_state
                state: "armed_home"
            sequence:
              - action: script.ring_keypad_show_armed_home
                data:
                  keypad_id: "{{ keypad_id }}"

          - conditions:
              - condition: state
                entity_id: input_select.ring_keypad_alarm_state
                state: "armed_away"
            sequence:
              - action: script.ring_keypad_show_armed_away
                data:
                  keypad_id: "{{ keypad_id }}"

          - conditions:
              - condition: state
                entity_id: input_select.ring_keypad_alarm_state
                state: "arming"
            sequence:
              - action: script.ring_keypad_show_exit_delay
                data:
                  keypad_id: "{{ keypad_id }}"


          - conditions:
              - condition: state
                entity_id: input_select.ring_keypad_alarm_state
                state: "triggered_burglar"
            sequence:
              - action: script.ring_keypad_alarm_burglar
                data:
                  keypad_id: "{{ keypad_id }}"

          - conditions:
              - condition: state
                entity_id: input_select.ring_keypad_alarm_state
                state: "triggered_rapina"
            sequence:
              # Anti-rapina: sempre silenzioso
              - action: script.ring_keypad_alarm_rapina
                data:
                  keypad_id: "{{ keypad_id }}"

          - conditions:
              - condition: state
                entity_id: input_select.ring_keypad_alarm_state
                state: "triggered_fire"
            sequence:
              - action: script.ring_keypad_alarm_fire
                data:
                  keypad_id: "{{ keypad_id }}"

          - conditions:
              - condition: state
                entity_id: input_select.ring_keypad_alarm_state
                state: "triggered_medical"
            sequence:
              - action: script.ring_keypad_alarm_medical
                data:
                  keypad_id: "{{ keypad_id }}"

          - conditions:
              - condition: state
                entity_id: input_select.ring_keypad_alarm_state
                state: "triggered_water"
            sequence:
              - action: script.ring_keypad_alarm_water
                data:
                  keypad_id: "{{ keypad_id }}"

  # ══════════════════════════════════════════════════════════════════════════
  # SYNC TUTTE LE TASTIERE
  # Itera ring_keypad_active_keypads e chiama sync_state su ognuna
  # ══════════════════════════════════════════════════════════════════════════

  ring_keypad_sync_all:
    alias: "Keypad → Sync tutte le tastiere"
    description: "Invia lo stato corrente a tutte le tastiere registrate in ring_keypad_active_keypads"
    sequence:
      - repeat:
          for_each: >
            {{ states('input_text.ring_keypad_active_keypads')
               .split(',')
               | map('trim')
               | select('ne', '')
               | list }}
          sequence:
            - action: script.ring_keypad_sync_state
              data:
                keypad_id: "{{ repeat.item }}"

  # ══════════════════════════════════════════════════════════════════════════
  # BROADCAST ALLARME A TUTTE LE TASTIERE
  # alarm_type: burglar | rapina | fire | medical | water
  # ══════════════════════════════════════════════════════════════════════════

  ring_keypad_broadcast_alarm:
    alias: "Keypad → Broadcast allarme"
    description: "Invia un tipo di allarme a tutte le tastiere attive"
    fields:
      alarm_type:
        description: "Tipo allarme: burglar | rapina | fire | medical | water"
        required: true
    sequence:
      - repeat:
          for_each: >
            {{ states('input_text.ring_keypad_active_keypads')
               .split(',')
               | map('trim')
               | select('ne', '')
               | list }}
          sequence:
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ alarm_type == 'burglar' }}"
                  sequence:
                    - action: script.ring_keypad_alarm_burglar
                      data:
                        keypad_id: "{{ repeat.item }}"

                - conditions:
                    - condition: template
                      value_template: "{{ alarm_type == 'rapina' }}"
                  sequence:
                    - action: script.ring_keypad_alarm_rapina
                      data:
                        keypad_id: "{{ repeat.item }}"

                - conditions:
                    - condition: template
                      value_template: "{{ alarm_type == 'fire' }}"
                  sequence:
                    - action: script.ring_keypad_alarm_fire
                      data:
                        keypad_id: "{{ repeat.item }}"

                - conditions:
                    - condition: template
                      value_template: "{{ alarm_type == 'medical' }}"
                  sequence:
                    - action: script.ring_keypad_alarm_medical
                      data:
                        keypad_id: "{{ repeat.item }}"

                - conditions:
                    - condition: template
                      value_template: "{{ alarm_type == 'water' }}"
                  sequence:
                    - action: script.ring_keypad_alarm_water
                      data:
                        keypad_id: "{{ repeat.item }}"

  # ══════════════════════════════════════════════════════════════════════════
  # RISOLUZIONE UTENTE DA PIN
  # Pattern sicuro: ignora PIN vuoti (lunghezza < 4)
  # ══════════════════════════════════════════════════════════════════════════

  ring_keypad_resolve_user:
    alias: "Keypad - Risolvi utente da PIN"
    description: "Imposta ring_keypad_last_user in base al PIN inserito"
    fields:
      code:
        description: "Codice inserito"
        required: true
    sequence:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ states('input_text.ring_keypad_pin_master') | length >= 4 and code == states('input_text.ring_keypad_pin_master') }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.ring_keypad_last_user
                data:
                  value: "{{ states('input_text.ring_keypad_name_master') }}"

          - conditions:
              - condition: template
                value_template: "{{ states('input_text.ring_keypad_pin_user1') | length >= 4 and code == states('input_text.ring_keypad_pin_user1') }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.ring_keypad_last_user
                data:
                  value: "{{ states('input_text.ring_keypad_name_user1') }}"

          - conditions:
              - condition: template
                value_template: "{{ states('input_text.ring_keypad_pin_user2') | length >= 4 and code == states('input_text.ring_keypad_pin_user2') }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.ring_keypad_last_user
                data:
                  value: "{{ states('input_text.ring_keypad_name_user2') }}"

          - conditions:
              - condition: template
                value_template: "{{ states('input_text.ring_keypad_pin_user3') | length >= 4 and code == states('input_text.ring_keypad_pin_user3') }}"
            sequence:
              - action: input_text.set_value
                target:
                  entity_id: input_text.ring_keypad_last_user
                data:
                  value: "{{ states('input_text.ring_keypad_name_user3') }}"

        default:
          - action: input_text.set_value
            target:
              entity_id: input_text.ring_keypad_last_user
            data:
              value: "sconosciuto"

  # ══════════════════════════════════════════════════════════════════════════
  # VALIDAZIONE PIN E DISARMO
  # Pattern sicuro: il PIN vuoto non viene mai considerato valido
  # ══════════════════════════════════════════════════════════════════════════

  ring_keypad_validate_and_disarm:
    alias: "Keypad - Valida PIN e disarma"
    fields:
      code:
        description: "Codice inserito"
        required: true
      keypad_id:
        description: "Topic base della tastiera"
        required: true
    sequence:
      - if:
          - condition: template
            value_template: >
              {% set ns = namespace(valid=false) %}
              {% for pin in [
                states('input_text.ring_keypad_pin_master'),
                states('input_text.ring_keypad_pin_user1'),
                states('input_text.ring_keypad_pin_user2'),
                states('input_text.ring_keypad_pin_user3')
              ] %}
                {% if pin | length >= 4 and pin == code %}{% set ns.valid = true %}{% endif %}
              {% endfor %}
              {{ ns.valid }}
        then:
          - action: script.ring_keypad_resolve_user
            data:
              code: "{{ code }}"
          - action: script.ring_keypad_do_disarm
            data:
              keypad_id: "{{ keypad_id }}"
        else:
          - action: script.ring_keypad_code_rejected
            data:
              keypad_id: "{{ keypad_id }}"
          - action: input_text.set_value
            target:
              entity_id: input_text.ring_keypad_last_event
            data:
              value: "PIN errato - tentativo disarmo"

  # ══════════════════════════════════════════════════════════════════════════
  # VALIDAZIONE PIN E ARMO
  # ══════════════════════════════════════════════════════════════════════════

  ring_keypad_validate_and_arm:
    alias: "Keypad - Valida PIN e arma"
    fields:
      code:
        description: "Codice inserito"
        required: true
      mode:
        description: "armed_home o armed_away"
        required: true
      keypad_id:
        description: "Topic base della tastiera"
        required: true
    sequence:
      - if:
          - condition: template
            value_template: >
              {% set ns = namespace(valid=false) %}
              {% for pin in [
                states('input_text.ring_keypad_pin_master'),
                states('input_text.ring_keypad_pin_user1'),
                states('input_text.ring_keypad_pin_user2'),
                states('input_text.ring_keypad_pin_user3')
              ] %}
                {% if pin | length >= 4 and pin == code %}{% set ns.valid = true %}{% endif %}
              {% endfor %}
              {{ ns.valid }}
        then:
          - action: script.ring_keypad_resolve_user
            data:
              code: "{{ code }}"
          - action: script.ring_keypad_do_arm
            data:
              mode: "{{ mode }}"
              keypad_id: "{{ keypad_id }}"
        else:
          - action: script.ring_keypad_code_rejected
            data:
              keypad_id: "{{ keypad_id }}"
          - action: input_text.set_value
            target:
              entity_id: input_text.ring_keypad_last_event
            data:
              value: "PIN errato - tentativo armo {{ mode }}"

  # ══════════════════════════════════════════════════════════════════════════
  # DISARMO EFFETTIVO
  # ══════════════════════════════════════════════════════════════════════════

  ring_keypad_do_disarm:
    alias: "Keypad - Esegui disarmo"
    fields:
      keypad_id:
        description: "Topic base della tastiera (per log)"
        required: true
    sequence:
      # FIX RK-30: ferma ring_keypad_do_arm se ancora in esecuzione (exit delay in corso).
      # Senza questo, il delay del do_arm continua in background e al termine
      # sovrascrive lo stato con "armed_home/away", ri-armando allarme-core.
      - action: script.turn_off
        target:
          entity_id: script.ring_keypad_do_arm
      - action: input_select.select_option
        target:
          entity_id: input_select.ring_keypad_alarm_state
        data:
          option: "disarmed"
      - action: input_text.set_value
        target:
          entity_id: input_text.ring_keypad_last_event
        data:
          value: "Disarmato da {{ states('input_text.ring_keypad_last_user') }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.ring_keypad_last_keypad
        data:
          value: "{{ keypad_id }}"

  # ══════════════════════════════════════════════════════════════════════════
  # ARMO EFFETTIVO (con exit delay)
  # Imposta arming → sync automatico via ring_keypad_sync_on_state_change
  # → attende exit_delay → imposta stato finale → sync automatico
  # ══════════════════════════════════════════════════════════════════════════

  ring_keypad_do_arm:
    alias: "Keypad - Esegui armo"
    # mode single: previene esecuzioni concorrenti durante l'exit delay
    mode: single
    max_exceeded: silent
    fields:
      mode:
        description: "armed_home o armed_away"
        required: true
      keypad_id:
        description: "Topic base della tastiera (per log)"
        required: true
    sequence:
      # Salva il target mode prima di entrare in arming: serve all'integrazione
      # per impostare il profilo corretto su allarme-core e avviare arm_allarme_core
      # (normale, non immediate) così il bypass sensori aperti viene calcolato.
      - action: input_text.set_value
        target:
          entity_id: input_text.ring_keypad_arming_target_mode
        data:
          value: "{{ mode }}"
      - action: input_select.select_option
        target:
          entity_id: input_select.ring_keypad_alarm_state
        data:
          option: "arming"
      - action: input_text.set_value
        target:
          entity_id: input_text.ring_keypad_last_event
        data:
          value: "Armo {{ mode }} da {{ states('input_text.ring_keypad_last_user') }}"
      - action: input_text.set_value
        target:
          entity_id: input_text.ring_keypad_last_keypad
        data:
          value: "{{ keypad_id }}"
      # Invia Exit_Delay countdown direttamente sulla tastiera che ha avviato l'armo.
      # Chiamata diretta (non via sync_all) per garantire che il countdown parta
      # immediatamente e indipendentemente da race condition nel sync chain.
      - action: script.ring_keypad_show_exit_delay
        data:
          keypad_id: "{{ keypad_id }}"
      # Attende exit delay (default 30s se il valore fosse unknown)
      - delay:
          seconds: "{{ states('input_number.ring_keypad_exit_delay') | int(30) }}"
      - action: input_select.select_option
        target:
          entity_id: input_select.ring_keypad_alarm_state
        data:
          option: "{{ mode }}"

  # ══════════════════════════════════════════════════════════════════════════
  # VOLUME SIRENA
  # topic: zwave2mqtt/{keypad_id}/configuration/endpoint_0/Siren_Volume/set
  # payload: intero 1-10
  # ══════════════════════════════════════════════════════════════════════════

  ring_keypad_set_siren_volume:
    alias: "Keypad → Imposta volume sirena (singola tastiera)"
    description: "Pubblica il volume sirena (1-10) da ring_keypad_siren_volume su una tastiera"
    fields:
      keypad_id:
        description: "Topic base della tastiera"
        required: true
    sequence:
      - action: mqtt.publish
        data:
          topic: "zwave2mqtt/{{ keypad_id }}/configuration/endpoint_0/Siren_Volume/set"
          payload: "{{ states('input_number.ring_keypad_siren_volume') | int(5) }}"

  ring_keypad_set_siren_volume_all:
    alias: "Keypad → Imposta volume sirena (tutte le tastiere)"
    description: "Itera ring_keypad_active_keypads e chiama set_siren_volume su ognuna"
    sequence:
      - repeat:
          for_each: >
            {{ states('input_text.ring_keypad_active_keypads')
               .split(',')
               | map('trim')
               | select('ne', '')
               | list }}
          sequence:
            - action: script.ring_keypad_set_siren_volume
              data:
                keypad_id: "{{ repeat.item }}"
