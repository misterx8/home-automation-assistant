# ══════════════════════════════════════════════════════════════════════════════
# SEZIONE 3: INTEGRAZIONE CON SAFETY-CORE [ATTIVA]
#
# ── MAPPATURA safety-core → ring_keypad ──────────────────────────────────────
#   triggered + categoria fumo/gas/carbonio → triggered_fire  (LED Smoke-Fire)
#   triggered + categoria acqua             → triggered_water (LED Water Leak)
#   ok (dopo reset manuale)                 → re-sync da allarme-core
#     (se allarme-core è armato torna armato, se disarmato torna disarmato)
#
# ── MAPPATURA ring_keypad → safety-core ──────────────────────────────────────
#   triggered_fire (da tasto Fire fisico tastiera, hold 3s)
#     → safety_core_stato = triggered, ultima_categoria = fumo
#     → log "🔥 Allarme fuoco manuale da tastiera Ring Keypad"
#   Anti-loop: invia solo se safety_core_stato != 'triggered'
#
# NOTA: il tasto Fire su Ring Keypad V2 (hold 3s) genera topic 16/0.
#   ring_keypad_input_fire (automations.yaml) imposta già triggered_fire
#   e fa broadcast LED. Questa sezione aggiunge l'invio verso safety-core.
# ══════════════════════════════════════════════════════════════════════════════

  # ── SYNC IN: safety-core → ring_keypad ───────────────────────────────────
  - id: ring_keypad_sync_from_safety_core
    alias: "Keypad - Sync da safety-core"
    description: >
      Aggiorna il keypad quando safety-core entra in triggered o torna ok.
      fumo/gas/carbonio → triggered_fire | acqua → triggered_water.
      Al reset (ok) ripristina lo stato corrente di allarme-core sulla tastiera.
    trigger:
      - platform: state
        entity_id: input_select.safety_core_stato
    action:
      - variables:
          stato_safety: "{{ trigger.to_state.state }}"
          categoria: "{{ states('input_select.safety_core_ultima_categoria') }}"
          stato_ac: "{{ states('input_select.allarme_core_stato') }}"
          profilo_ac: "{{ states('input_select.allarme_core_profilo') }}"
      - choose:
          # Fumo, gas o monossido → LED Alarming Smoke-Fire
          - conditions:
              - condition: template
                value_template: >
                  {{ stato_safety == 'triggered' and
                     categoria in ['fumo', 'gas', 'carbonio'] }}
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.ring_keypad_alarm_state
                data:
                  option: "triggered_fire"

          # Acqua → LED Alarming Water Leak
          - conditions:
              - condition: template
                value_template: >
                  {{ stato_safety == 'triggered' and categoria == 'acqua' }}
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.ring_keypad_alarm_state
                data:
                  option: "triggered_water"

          # Reset safety-core (ok) → ripristina stato allarme-core sulla tastiera
          - conditions:
              - condition: template
                value_template: "{{ stato_safety == 'ok' }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ stato_ac == 'disarmed' }}"
                    sequence:
                      - action: input_select.select_option
                        target:
                          entity_id: input_select.ring_keypad_alarm_state
                        data:
                          option: "disarmed"
                  - conditions:
                      - condition: template
                        value_template: "{{ stato_ac == 'arming' }}"
                    sequence:
                      - action: input_select.select_option
                        target:
                          entity_id: input_select.ring_keypad_alarm_state
                        data:
                          option: "arming"
                  - conditions:
                      - condition: template
                        value_template: "{{ stato_ac == 'armed' and profilo_ac == 'notte' }}"
                    sequence:
                      - action: input_select.select_option
                        target:
                          entity_id: input_select.ring_keypad_alarm_state
                        data:
                          option: "armed_home"
                  - conditions:
                      - condition: template
                        value_template: >
                          {{ stato_ac == 'armed' and profilo_ac in ['giorno', 'tutti'] }}
                    sequence:
                      - action: input_select.select_option
                        target:
                          entity_id: input_select.ring_keypad_alarm_state
                        data:
                          option: "armed_away"
                  - conditions:
                      - condition: template
                        value_template: >
                          {{ stato_ac == 'armed' and profilo_ac == 'sera' }}
                    sequence:
                      - action: input_select.select_option
                        target:
                          entity_id: input_select.ring_keypad_alarm_state
                        data:
                          option: "disarmed"
                  - conditions:
                      - condition: template
                        value_template: "{{ stato_ac == 'triggered' }}"
                    sequence:
                      - action: input_select.select_option
                        target:
                          entity_id: input_select.ring_keypad_alarm_state
                        data:
                          option: "triggered_burglar"

  # ── SYNC OUT: ring_keypad tasto Fire → safety-core ───────────────────────
  # Il tasto Fire (hold 3s) imposta già triggered_fire sul keypad tramite
  # ring_keypad_input_fire (automations.yaml). Questa automazione intercetta
  # quel cambio stato e propaga il triggered verso safety-core.
  # Solo il log distingue lo scatto manuale da tastiera rispetto ai sensori fisici.
  - id: ring_keypad_command_to_safety_core
    alias: "Keypad - Allarme fuoco manuale verso safety-core"
    description: >
      Quando il tasto Fire (hold 3s) porta il keypad a triggered_fire,
      imposta safety-core in triggered con categoria fumo e logga lo scatto
      come manuale. Anti-loop: invia solo se safety-core non è già triggered.
    trigger:
      - platform: state
        entity_id: input_select.ring_keypad_alarm_state
        to: "triggered_fire"
    condition:
      # Anti-loop: invia solo se safety-core non è già triggered
      - condition: template
        value_template: "{{ states('input_select.safety_core_stato') != 'triggered' }}"
    action:
      - action: input_select.select_option
        target:
          entity_id: input_select.safety_core_stato
        data:
          option: "triggered"
      - action: input_select.select_option
        target:
          entity_id: input_select.safety_core_ultima_categoria
        data:
          option: "fumo"
      # Log che distingue lo scatto manuale da tastiera da quello automatico dei sensori
      - action: script.safety_core_logbook_emit
        data:
          msg: "🔥 Allarme fuoco manuale da tastiera Ring Keypad"
