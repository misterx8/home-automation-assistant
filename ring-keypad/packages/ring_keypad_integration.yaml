###############################################################################
# RING KEYPAD V2 - BRIDGE VERSO SISTEMI ESTERNI
#
# Questo file è il bridge bidirezionale tra il Ring Keypad e il sistema
# di allarme installato. È progettato per essere agnostico: basta
# abilitare la sezione relativa al proprio sistema e commentare le altre.
#
# SISTEMI SUPPORTATI:
#   [ATTIVO]    allarme-core  (sezione 1)
#   [TEMPLATE]  alarm_control_panel generico / Alarmo (sezione 2, commentata)
#
# ── MAPPATURA STATI allarme-core → ring_keypad (profilo-aware) ─────────────
#   disarmed               → disarmed
#   arming                 → arming
#   armed + profilo notte  → armed_home  (LED Armed Stay)
#   armed + profilo giorno → armed_away  (LED Armed Away)
#   armed + profilo tutti  → armed_away  (LED Armed Away)
#   armed + profilo sera   → disarmed    (tastiera non mostra stato armato)
#   triggered              → triggered_burglar
#
# ── MAPPATURA STATI ring_keypad → allarme-core ────────────────────────────
#   disarmed   → script.disarm_allarme_core
#   arming     → profilo target + script.arm_allarme_core (calcola bypass sensori)
#   armed_home → profilo notte  + script.arm_allarme_core (safety fallback)
#   armed_away → profilo giorno + script.arm_allarme_core (safety fallback)
#
# ── GESTIONE DOPPIO DELAY ─────────────────────────────────────────────────
#   Quando si arma da tastiera, ring_keypad_do_arm gestisce il countdown
#   visivo (exit_delay) e chiama arm_allarme_core all'INIZIO della fase
#   arming: allarme-core entra in arming, calcola i bypass dei sensori
#   aperti, poi arma. Il suo arming_delay è sincronizzato con
#   ring_keypad_exit_delay → i due sistemi armano in parallelo senza
#   doppio delay.
#   armed_home/away chiamano arm_allarme_core solo se allarme-core non è
#   già in arming o armed (safety fallback per sincronizzazioni anomale).
#   Quando si arma da allarme-core (dashboard), allarme-core gestisce il suo
#   delay e ring_keypad lo segue via ring_keypad_sync_from_allarme_core.
#
# ── SYNC EXIT DELAY ────────────────────────────────────────────────────────
#   ring_keypad_exit_delay è mantenuto sempre uguale ad allarme_core_arming_delay
#   tramite l'automazione ring_keypad_sync_exit_delay.
#
# NOTA: triggered_rapina, triggered_water, triggered_medical, triggered_fire
#   sono generati direttamente dai tasti fisici della tastiera.
#   Non vengono propagati verso allarme-core (logica separata).
###############################################################################

automation:

  # ══════════════════════════════════════════════════════════════════════════
  # SEZIONE 1: INTEGRAZIONE CON ALLARME-CORE
  # ══════════════════════════════════════════════════════════════════════════

  # ── SYNC IN: allarme-core → ring_keypad ───────────────────────────────────
  # Quando lo stato o il profilo di allarme-core cambia, aggiorna ring_keypad_alarm_state.
  #
  # TRIGGER DOPPIO:
  #   - allarme_core_stato: reagisce sempre
  #   - allarme_core_profilo: reagisce SOLO se stato == 'armed'
  #     (evita flickering durante la sequenza set-profilo → arm_immediate)
  - id: ring_keypad_sync_from_allarme_core
    alias: "Keypad - Sync da allarme-core"
    description: >
      Aggiorna lo stato del keypad quando cambia allarme_core_stato o allarme_core_profilo.
      Mappatura profilo-aware per lo stato 'armed':
        notte→armed_home | giorno/tutti→armed_away | sera→disarmed.
      Il trigger su allarme_core_profilo è attivo solo quando stato==armed,
      per evitare flickering durante la sequenza di armo dalla tastiera.
    # mode queued: gestisce correttamente trigger ravvicinati stato+profilo
    # (es. profilo cambia subito prima che allarme-core raggiunga armed)
    mode: queued
    max: 5
    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato
      - platform: state
        entity_id: input_select.allarme_core_profilo
    condition:
      # Reagi sempre al cambio di stato; reagi al cambio profilo solo se armato
      - condition: template
        value_template: >
          {{ trigger.entity_id == 'input_select.allarme_core_stato' or
             states('input_select.allarme_core_stato') == 'armed' }}
    action:
      - variables:
          stato: "{{ states('input_select.allarme_core_stato') }}"
          profilo: "{{ states('input_select.allarme_core_profilo') }}"
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ stato == 'disarmed' }}"
            sequence:
              # BUG-02 fix: ferma ring_keypad_do_arm se in esecuzione (exit delay).
              # Senza questo, il delay del do_arm continua in background e al termine
              # sovrascrive lo stato con "armed_home/away", ri-armando allarme-core.
              # Copre il caso "disarmo da dashboard/esterno" che ring_keypad_do_disarm
              # non gestisce (do_disarm viene chiamato solo da tastiera).
              - action: script.turn_off
                target:
                  entity_id: script.ring_keypad_do_arm
              - action: input_select.select_option
                target:
                  entity_id: input_select.ring_keypad_alarm_state
                data:
                  option: "disarmed"

          - conditions:
              - condition: template
                value_template: "{{ stato == 'arming' }}"
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.ring_keypad_alarm_state
                data:
                  option: "arming"

          # armed + profilo notte → LED Armed Stay (in casa)
          # Guardia anti-race: non sovrascrivere il countdown se ring_keypad_do_arm
          # è ancora in esecuzione (armo da tastiera — il countdown deve completare
          # per tutta la durata del delay). Se ring_keypad_do_arm NON è in esecuzione
          # (armo da dashboard), il sync può procedere normalmente.
          - conditions:
              - condition: template
                value_template: "{{ stato == 'armed' and profilo == 'notte' }}"
              - condition: template
                value_template: >
                  {{ states('input_select.ring_keypad_alarm_state') != 'arming' or
                     not is_state('script.ring_keypad_do_arm', 'on') }}
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.ring_keypad_alarm_state
                data:
                  option: "armed_home"

          # armed + profilo giorno o tutti → LED Armed Away (fuori casa)
          - conditions:
              - condition: template
                value_template: "{{ stato == 'armed' and profilo in ['giorno', 'tutti'] }}"
              - condition: template
                value_template: >
                  {{ states('input_select.ring_keypad_alarm_state') != 'arming' or
                     not is_state('script.ring_keypad_do_arm', 'on') }}
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.ring_keypad_alarm_state
                data:
                  option: "armed_away"

          # armed + profilo sera → tastiera non mostra stato armato (sera è modalità automatica)
          - conditions:
              - condition: template
                value_template: "{{ stato == 'armed' and profilo == 'sera' }}"
              - condition: template
                value_template: >
                  {{ states('input_select.ring_keypad_alarm_state') != 'arming' or
                     not is_state('script.ring_keypad_do_arm', 'on') }}
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.ring_keypad_alarm_state
                data:
                  option: "disarmed"

          - conditions:
              - condition: template
                value_template: "{{ stato == 'triggered' }}"
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.ring_keypad_alarm_state
                data:
                  option: "triggered_burglar"

  # ── SYNC OUT: ring_keypad → allarme-core ──────────────────────────────────
  # Quando il keypad cambia stato (per comando da tastiera), invia al core
  # con il profilo corretto. arm_allarme_core è chiamato all'inizio (arming)
  # così allarme-core calcola i bypass; armed_home/away sono safety fallback.
  #
  # MAPPATURA PROFILO:
  #   armed_home → profilo notte  (allarme in casa, zone notte)
  #   armed_away → profilo giorno (allarme fuori casa, zone giorno)
  #
  # ANTI-LOOP:
  #   Per disarmed: invia solo se allarme-core non è già disarmed.
  #   Per armed_home: invia solo se allarme-core non è già armed+notte.
  #   Per armed_away: invia solo se allarme-core non è già armed+giorno.
  - id: ring_keypad_command_to_allarme_core
    alias: "Keypad - Comandi verso allarme-core"
    description: >
      Quando ring_keypad_alarm_state passa a disarmed/arming/armed_home/armed_away,
      invia il comando corretto ad allarme-core con il profilo appropriato.
      arming → arm_allarme_core normale (calcola bypass sensori aperti).
      armed_home/armed_away → arm_allarme_core (safety fallback,
      solo se allarme-core non è già in arming o armed).
      Anti-loop: verifica stato+profilo prima di inviare il comando.
      mode queued: garantisce che un disarmed immediato dopo arming non venga scartato.
      Debug mode: quando ring_keypad_debug è ON la propagazione è bloccata.
      La direzione inversa (allarme-core → keypad) non passa da questa automazione.
    mode: queued
    max: 5
    trigger:
      - platform: state
        entity_id: input_select.ring_keypad_alarm_state
        to:
          - disarmed
          - arming       # NUOVO: avvia arm_allarme_core (normale) per calcolo bypass
          - armed_home
          - armed_away
    condition:
      # Debug mode: blocca propagazione keypad → allarme-core
      # La direzione inversa (allarme-core → keypad) non passa da questa automazione.
      - condition: state
        entity_id: input_boolean.ring_keypad_debug
        state: "off"
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state == 'disarmed' }}"
              # Anti-loop: invia disarmo se allarme-core non è già disarmed
              # OPPURE se il keypad proveniva da uno stato attivo (arming, armed_home/away).
              # Questo gestisce la race condition in cui arm_allarme_core non ha ancora
              # aggiornato allarme_core_stato quando l'utente disarma durante l'exit delay.
              - condition: template
                value_template: >
                  {{ trigger.from_state.state not in ['disarmed', 'unknown', 'unavailable'] or
                     states('input_select.allarme_core_stato') != 'disarmed' }}
            sequence:
              - action: script.disarm_allarme_core

          # ── ARMING (avvia armo normale su allarme-core) ──────────────────────
          # Chiamato all'inizio dell'arming dalla tastiera.
          # Usa arm_allarme_core (normale, non immediate) così allarme-core
          # entra in arming, calcola i bypass dei sensori aperti, poi arma.
          # Anti-loop: invia solo se allarme-core non è già in arming o armed.
          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state == 'arming' }}"
              - condition: template
                value_template: >
                  {{ states('input_select.allarme_core_stato') not in ['arming', 'armed'] }}
            sequence:
              - variables:
                  target_mode: "{{ states('input_text.ring_keypad_arming_target_mode') }}"
              # Imposta profilo corretto prima di armare
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ target_mode == 'armed_home' }}"
                    sequence:
                      - action: input_select.select_option
                        target:
                          entity_id: input_select.allarme_core_profilo
                        data:
                          option: "notte"
                  - conditions:
                      - condition: template
                        value_template: "{{ target_mode == 'armed_away' }}"
                    sequence:
                      - action: input_select.select_option
                        target:
                          entity_id: input_select.allarme_core_profilo
                        data:
                          option: "giorno"
              # Armo normale: fire-and-forget (script.turn_on) per non bloccare la coda.
              # Se l'utente disarma subito dopo, il caso 'disarmed' parte immediatamente
              # mentre arm_allarme_core è ancora nel suo delay → disarm_allarme_core
              # lo ferma prima che completi, evitando il re-armo.
              - action: script.turn_on
                target:
                  entity_id: script.arm_allarme_core

          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state == 'armed_home' }}"
              # Anti-loop: invia solo se allarme-core non è già armed+notte O già in arming
              - condition: template
                value_template: >
                  {{ states('input_select.allarme_core_stato') != 'arming' and
                     (states('input_select.allarme_core_stato') != 'armed' or
                      states('input_select.allarme_core_profilo') != 'notte') }}
            sequence:
              # Imposta profilo notte (in casa) prima di armare
              - action: input_select.select_option
                target:
                  entity_id: input_select.allarme_core_profilo
                data:
                  option: "notte"
              # Safety fallback: fire-and-forget per non bloccare la coda
              - action: script.turn_on
                target:
                  entity_id: script.arm_allarme_core

          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state == 'armed_away' }}"
              # Anti-loop: invia solo se allarme-core non è già armed+giorno/tutti O già in arming
              - condition: template
                value_template: >
                  {{ states('input_select.allarme_core_stato') != 'arming' and
                     (states('input_select.allarme_core_stato') != 'armed' or
                      states('input_select.allarme_core_profilo') not in ['giorno', 'tutti']) }}
            sequence:
              # Imposta profilo giorno (fuori casa) prima di armare
              - action: input_select.select_option
                target:
                  entity_id: input_select.allarme_core_profilo
                data:
                  option: "giorno"
              # Safety fallback: fire-and-forget per non bloccare la coda
              - action: script.turn_on
                target:
                  entity_id: script.arm_allarme_core

  # ── SYNC EXIT DELAY: ring_keypad_exit_delay ← allarme_core_arming_delay ──
  # Mantiene ring_keypad_exit_delay sempre uguale ad allarme_core_arming_delay.
  # In questo modo il countdown visivo della tastiera corrisponde esattamente
  # al delay configurato in allarme-core (unica sorgente di verità).
  # Si sincronizza anche all'avvio di HA per garantire coerenza dopo riavvio.
  - id: ring_keypad_sync_exit_delay
    alias: "Keypad - Sincronizza exit delay con allarme-core"
    description: >
      Copia allarme_core_arming_delay in ring_keypad_exit_delay ad ogni modifica
      e all'avvio di HA. Garantisce che il countdown sulla tastiera corrisponda
      al tempo di inserimento configurato in allarme-core.
    trigger:
      - platform: state
        entity_id: input_number.allarme_core_arming_delay
      - platform: homeassistant
        event: start
    action:
      - action: input_number.set_value
        target:
          entity_id: input_number.ring_keypad_exit_delay
        data:
          value: "{{ states('input_number.allarme_core_arming_delay') | float(20) }}"

