###############################################################################
# RING KEYPAD V2 - BRIDGE VERSO SISTEMI ESTERNI
#
# Questo file √® il bridge bidirezionale tra il Ring Keypad e il sistema
# di allarme installato. √à progettato per essere agnostico: basta
# abilitare la sezione relativa al proprio sistema e commentare le altre.
#
# SISTEMI SUPPORTATI:
#   [ATTIVO]    allarme-core  (sezione 1)
#   [TEMPLATE]  alarm_control_panel generico / Alarmo (sezione 2, commentata)
#
# ‚îÄ‚îÄ MAPPATURA STATI allarme-core ‚Üí ring_keypad ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
#   allarme-core: disarmed | arming | armed | triggered
#   ring_keypad:  disarmed | arming | armed_away | triggered_burglar
#
# ‚îÄ‚îÄ MAPPATURA STATI ring_keypad ‚Üí allarme-core ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
#   disarmed   ‚Üí script.disarm_allarme_core
#   armed_home ‚Üí script.arm_allarme_core  (allarme-core non distingue home/away)
#   armed_away ‚Üí script.arm_allarme_core
#
# NOTA: triggered_rapina, triggered_water, triggered_medical, triggered_fire
#   sono generati direttamente dai tasti fisici della tastiera.
#   Non vengono propagati verso allarme-core (logica separata).
#   Per integrare safety-core (perdita acqua), decommentare la sezione 3.
###############################################################################

automation:

  # ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
  # SEZIONE 1: INTEGRAZIONE CON ALLARME-CORE
  # ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê

  # ‚îÄ‚îÄ SYNC IN: allarme-core ‚Üí ring_keypad ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  # Quando lo stato di allarme-core cambia, aggiorna ring_keypad_alarm_state
  - id: ring_keypad_sync_from_allarme_core
    alias: "Keypad - Sync da allarme-core"
    description: >
      Aggiorna lo stato del keypad quando cambia input_select.allarme_core_stato.
      Mappatura: disarmed‚Üídisarmed, arming‚Üíarming,
      armed‚Üíarmed_away, triggered‚Üítriggered_burglar.
    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state == 'disarmed' }}"
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.ring_keypad_alarm_state
                data:
                  option: "disarmed"

          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state == 'arming' }}"
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.ring_keypad_alarm_state
                data:
                  option: "arming"

          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state == 'armed' }}"
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.ring_keypad_alarm_state
                data:
                  # allarme-core ha un solo stato "armed" ‚Üí armed_away sul keypad
                  option: "armed_away"

          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state == 'triggered' }}"
            sequence:
              - action: input_select.select_option
                target:
                  entity_id: input_select.ring_keypad_alarm_state
                data:
                  option: "triggered_burglar"

  # ‚îÄ‚îÄ SYNC OUT: ring_keypad ‚Üí allarme-core ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  # Quando il keypad cambia stato (per comando da tastiera), invia al core.
  # ANTI-LOOP: prima di inviare il comando verifica che allarme-core non
  # sia gi√Ý nello stato corrispondente (evita ring_keypad ‚Üî allarme-core loop).
  - id: ring_keypad_command_to_allarme_core
    alias: "Keypad - Comandi verso allarme-core"
    description: >
      Quando ring_keypad_alarm_state passa a disarmed/armed_home/armed_away,
      richiama gli script di allarme-core solo se lo stato di allarme-core
      √® gi√Ý diverso (prevenzione loop bidirezionale).
    trigger:
      - platform: state
        entity_id: input_select.ring_keypad_alarm_state
        to:
          - disarmed
          - armed_home
          - armed_away
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state == 'disarmed' }}"
              # Anti-loop: invia solo se allarme-core non √® gi√Ý disarmed
              - condition: template
                value_template: "{{ states('input_select.allarme_core_stato') != 'disarmed' }}"
            sequence:
              - action: script.disarm_allarme_core

          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state in ['armed_home', 'armed_away'] }}"
              # Anti-loop: invia solo se allarme-core non √® gi√Ý armed
              - condition: template
                value_template: "{{ states('input_select.allarme_core_stato') != 'armed' }}"
            sequence:
              # allarme-core non distingue home/away: usa arm generico
              - action: script.arm_allarme_core

# ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
# SEZIONE 2: INTEGRAZIONE CON alarm_control_panel GENERICO (es. Alarmo)
# Decommentare questa sezione e commentare la sezione 1 per usarla.
# ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê

