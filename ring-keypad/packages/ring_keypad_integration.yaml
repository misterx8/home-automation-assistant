###############################################################################
# RING KEYPAD V2 - BRIDGE VERSO SISTEMI ESTERNI
#
# Questo file ГЁ il bridge bidirezionale tra il Ring Keypad e il sistema
# di allarme installato. Г€ progettato per essere agnostico: basta
# abilitare la sezione relativa al proprio sistema e commentare le altre.
#
# SISTEMI SUPPORTATI:
#   [ATTIVO]    allarme-core  (sezione 1)
#   [TEMPLATE]  alarm_control_panel generico / Alarmo (sezione 2, commentata)
#
# в”Ђв”Ђ MAPPATURA STATI allarme-core в†’ ring_keypad в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
#   allarme-core: disarmed | arming | armed | triggered
#   ring_keypad:  disarmed | arming | armed_away | triggered_burglar
#
# в”Ђв”Ђ MAPPATURA STATI ring_keypad в†’ allarme-core в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
#   disarmed   в†’ script.disarm_allarme_core
#   armed_home в†’ script.arm_allarme_core  (allarme-core non distingue home/away)
#   armed_away в†’ script.arm_allarme_core
###############################################################################

automation:

  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
  # SEZIONE 1: INTEGRAZIONE CON ALLARME-CORE
  # в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

  # в”Ђв”Ђ SYNC IN: allarme-core в†’ ring_keypad в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Quando lo stato di allarme-core cambia, aggiorna ring_keypad_alarm_state
  - id: ring_keypad_sync_from_allarme_core
    alias: "Keypad - Sync da allarme-core"
    description: >
      Aggiorna lo stato del keypad quando cambia input_select.allarme_core_stato.
      La mappatura ГЁ: disarmedв†’disarmed, armingв†’arming,
      armedв†’armed_away, triggeredв†’triggered_burglar.
    trigger:
      - platform: state
        entity_id: input_select.allarme_core_stato
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state == 'disarmed' }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.ring_keypad_alarm_state
                data:
                  option: "disarmed"

          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state == 'arming' }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.ring_keypad_alarm_state
                data:
                  option: "arming"

          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state == 'armed' }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.ring_keypad_alarm_state
                data:
                  # allarme-core ha un solo stato "armed" в†’ armed_away sul keypad
                  option: "armed_away"

          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state == 'triggered' }}"
            sequence:
              - service: input_select.select_option
                target:
                  entity_id: input_select.ring_keypad_alarm_state
                data:
                  option: "triggered_burglar"

  # в”Ђв”Ђ SYNC OUT: ring_keypad в†’ allarme-core в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Quando il keypad cambia stato (per comando da tastiera), invia al core.
  # ANTI-LOOP: prima di inviare il comando verifica che allarme-core non
  # sia giГ  nello stato corrispondente (evita ring_keypad в†” allarme-core loop).
  - id: ring_keypad_command_to_allarme_core
    alias: "Keypad - Comandi verso allarme-core"
    description: >
      Quando ring_keypad_alarm_state passa a disarmed/armed_home/armed_away,
      richiama gli script di allarme-core solo se lo stato di allarme-core
      ГЁ giГ  diverso (prevenzione loop bidirezionale).
    trigger:
      - platform: state
        entity_id: input_select.ring_keypad_alarm_state
        to:
          - disarmed
          - armed_home
          - armed_away
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state == 'disarmed' }}"
              # Anti-loop: invia solo se allarme-core non ГЁ giГ  disarmed
              - condition: template
                value_template: "{{ states('input_select.allarme_core_stato') != 'disarmed' }}"
            sequence:
              - service: script.disarm_allarme_core

          - conditions:
              - condition: template
                value_template: "{{ trigger.to_state.state in ['armed_home', 'armed_away'] }}"
              # Anti-loop: invia solo se allarme-core non ГЁ giГ  armed
              - condition: template
                value_template: "{{ states('input_select.allarme_core_stato') != 'armed' }}"
            sequence:
              # allarme-core non distingue home/away: usa arm generico
              - service: script.arm_allarme_core

# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
# SEZIONE 2: INTEGRAZIONE CON alarm_control_panel GENERICO (es. Alarmo)
# Decommentare questa sezione e commentare la sezione 1 per usarla.
# в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

