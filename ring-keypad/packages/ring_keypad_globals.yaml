###############################################################################
# RING KEYPAD V2 - HELPERS GLOBALI
# Stato allarme, utenti, PIN, configurazione tastiere, LED
#
# ── PROTOCOLLO Z-WAVE (aggiornato) ───────────────────────────────────────────
# Entry Control CC: unknownClass_111/endpoint_0/{event_type}/{data_type}
# Indicator CC:     indicator/endpoint_0/{Name}/{sub_cmd}/set
# LED config:       configuration/endpoint_0/System_Security_Mode_Display/set
#
# ── PIN UTENTI ────────────────────────────────────────────────────────────────
# I PIN sono in modalità password (nascosti in UI). NON serve secrets.yaml.
# Impostare i PIN dalla UI di Home Assistant dopo il primo avvio.
# Lasciare vuoti gli utenti non utilizzati.
#
# ── TASTIERE ATTIVE ───────────────────────────────────────────────────────────
# In ring_keypad_active_keypads: inserire i topic base separati da virgola.
# Esempio: "tastiera_camera,tastiera_ingresso"
# Il topic base corrisponde al nome del nodo in zwave2mqtt.
###############################################################################

input_select:

  # ── STATO ALLARME (unica fonte di verità per tutti gli indicatori LED) ──────
  ring_keypad_alarm_state:
    name: "Keypad - Stato Allarme"
    options:
      - disarmed           # Sistema disarmato
      - armed_home         # Armato in modalità casa (profilo notte)
      - armed_away         # Armato in modalità fuori (profilo giorno/tutti)
      - armed_sera         # Armato profilo sera: Armed Stay silenzioso + LED fast blink (1s)
      - arming             # In fase di uscita (exit delay in corso)
      - triggered_burglar       # Allarme intrusione (CON suono)
      - triggered_burglar_sera  # Allarme intrusione profilo sera (SILENZIOSO - Alarming payload 1)
      - triggered_rapina        # Anti-rapina (SEMPRE SILENZIOSO - Alarming_Burglar payload 1)
      - triggered_fire     # Allarme fuoco
      - triggered_medical  # Allarme medico
      - triggered_water    # Allarme perdita acqua
    initial: disarmed
    icon: mdi:shield-home

  # ── MODALITÀ LED TASTIERA ───────────────────────────────────────────────────
  # Controlla i LED di stato della tastiera (System_Security_Mode_Display)
  # Spenti=0, Lampeggio 3s=3, Sempre accesi=601
  ring_keypad_led_mode:
    name: "Keypad - Modalità LED"
    options:
      - "Spenti"
      - "Lampeggio (3s)"
      - "Sempre accesi"
    icon: mdi:led-outline

input_text:

  # ── REGISTRO TASTIERE ──────────────────────────────────────────────────────
  ring_keypad_active_keypads:
    name: "Keypad - Tastiere attive (topic base, separati da virgola)"
    max: 255
    icon: mdi:keyboard-settings

  # ── CONFIGURAZIONE PING Z-WAVE (RK-59) ────────────────────────────────────
  # Usato da ring_keypad_ping_verify via servizio zwave_js.ping.
  # ring_keypad_zwave_entity_ids: JSON {"<topic_base>": "<entity_id_zwave_js>"}
  #   Qualsiasi entity_id dell'integrazione zwave_js appartenente al dispositivo.
  #   Esempio: {"tastiera_allarme_camera": "sensor.ring_keypad_v2_battery_level"}
  ring_keypad_zwave_entity_ids:
    name: "Keypad - Entity IDs Z-Wave JS (JSON)"
    max: 255
    icon: mdi:identifier

  # ── LOG E TRACCIAMENTO ─────────────────────────────────────────────────────
  ring_keypad_last_user:
    name: "Keypad - Ultimo utente"
    max: 32

  ring_keypad_last_event:
    name: "Keypad - Ultimo evento"
    max: 128

  ring_keypad_last_keypad:
    name: "Keypad - Ultima tastiera usata"
    max: 64

  # ── MODO ARMING TARGET ─────────────────────────────────────────────────────
  # Memorizza il target mode (armed_home/armed_away) all'avvio dell'arming.
  # Usato dall'integrazione per impostare il profilo corretto su allarme-core
  # prima di chiamare arm_allarme_core, garantendo il calcolo bypass sensori.
  ring_keypad_bypass_mode:
    name: "Keypad - Bypass Mode Pendente"
    max: 16
    icon: mdi:shield-alert-outline

  ring_keypad_bypass_keypad:
    name: "Keypad - Bypass Tastiera Pendente"
    max: 64
    icon: mdi:keyboard-alert

  ring_keypad_arming_target_mode:
    name: "Keypad - Modo arming target"
    max: 16
    icon: mdi:shield-arrow-up

  # ── PIN UTENTI (mode:password = nascosti in UI, non serve secrets.yaml) ────
  # pattern accetta: stringa vuota (PIN non configurato) oppure 4-8 cifre numeriche.
  # HA mostra un errore UI se l'utente tenta di impostare un PIN non valido (FIX C-5).
  ring_keypad_pin_master:
    name: "Keypad PIN - Master"
    max: 16
    mode: password
    pattern: "^$|^[0-9]{4,8}$"
    icon: mdi:shield-key

  ring_keypad_pin_user1:
    name: "Keypad PIN - Utente 1"
    max: 16
    mode: password
    pattern: "^$|^[0-9]{4,8}$"
    icon: mdi:account-key

  ring_keypad_pin_user2:
    name: "Keypad PIN - Utente 2"
    max: 16
    mode: password
    pattern: "^$|^[0-9]{4,8}$"
    icon: mdi:account-key

  ring_keypad_pin_user3:
    name: "Keypad PIN - Utente 3"
    max: 16
    mode: password
    pattern: "^$|^[0-9]{4,8}$"
    icon: mdi:account-key

  # ── NOMI UTENTI ────────────────────────────────────────────────────────────
  ring_keypad_name_master:
    name: "Keypad Nome - Master"
    max: 32

  ring_keypad_name_user1:
    name: "Keypad Nome - Utente 1"
    max: 32

  ring_keypad_name_user2:
    name: "Keypad Nome - Utente 2"
    max: 32

  ring_keypad_name_user3:
    name: "Keypad Nome - Utente 3"
    max: 32

input_number:

  ring_keypad_bypass_timeout:
    name: "Keypad - Timeout Conferma Bypass (sec)"
    # Finestra software entro cui premere V per confermare il bypass.
    # Indipendente dall'hardware: l'indicatore sulla tastiera può scomparire prima,
    # ma premendo V entro questo timeout il sistema arma comunque.
    min: 5
    max: 60
    step: 5
    unit_of_measurement: s
    icon: mdi:timer-alert-outline
    mode: slider

  ring_keypad_exit_delay:
    name: "Keypad - Exit Delay (sec)"
    min: 5
    max: 120
    step: 5
    unit_of_measurement: "s"
    icon: mdi:timer-outline

  ring_keypad_siren_volume:
    name: "Keypad - Volume Sirena (1-10)"
    min: 1
    max: 10
    step: 1
    icon: mdi:volume-high

  # Volume degli annunci vocali della tastiera (Announcement_Audio_Volume Z-Wave CC).
  # Impostato a 0 durante l'exit delay profilo notte per silenziare il beep,
  # ripristinato al valore configurato al termine. Nessun `initial`: il valore
  # viene mantenuto dal registry tra i riavvii.
  ring_keypad_announcement_volume:
    name: "Keypad - Volume Annunci (0-10)"
    min: 0
    max: 10
    step: 1
    icon: mdi:volume-medium

  # ── PROTEZIONE BRUTE-FORCE (FIX C-6) ───────────────────────────────────────
  # Contatore interno tentativi PIN falliti: helper tecnico, non modificato
  # dall'utente → accettato `initial: 0`. Resetta automaticamente dopo 60s
  # di inattività o al disarmo/armo riuscito.
  ring_keypad_failed_attempts:
    name: "Keypad - Tentativi PIN falliti"
    min: 0
    max: 10
    step: 1
    initial: 0
    mode: box
    icon: mdi:counter

  # Soglia lockout configurabile dall'utente → NESSUN `initial`
  # (al riavvio sovrascriverebbe il valore salvato dal registry).
  ring_keypad_max_failed_attempts:
    name: "Keypad - Soglia lockout (tentativi PIN falliti)"
    min: 3
    max: 10
    step: 1
    mode: box
    icon: mdi:shield-lock


input_boolean:

  ring_keypad_debug:
    name: "Keypad - Debug Mode"
    initial: false
    icon: mdi:bug

  ring_keypad_require_code_to_arm:
    name: "Keypad - Richiedi codice per armare"
    icon: mdi:shield-lock-outline

  ring_keypad_bypass_pending:
    name: "Keypad - Bypass Pendente"
    icon: mdi:shield-alert-outline

  # ── FEEDBACK VOCALE ────────────────────────────────────────────────────────
  # Se on: payload 99 (suono+LED) per disarmed/armed_home/armed_away
  # Se off: payload 1 (solo LED, nessun suono di conferma)
  ring_keypad_voice_feedback:
    name: "Keypad - Feedback vocale"
    icon: mdi:volume-high

  # ── LOCKOUT PROTEZIONE BRUTE-FORCE (FIX C-6) ──────────────────────────────
  # Stato tecnico interno: si attiva quando failed_attempts supera la soglia,
  # si resetta esplicitamente dopo 5 minuti o al reset manuale.
  # initial: false garantisce il reset al riavvio HA: senza di esso, se HA
  # si riavvia durante un lockout, il registry ripristina on e il trigger
  # to:"on" for:5min non osserva la transizione → il lockout non scade mai.
  ring_keypad_lockout_active:
    name: "Keypad - Lockout Attivo"
    initial: false
    icon: mdi:lock-alert


# ══════════════════════════════════════════════════════════════════════════
# TEMPLATE BINARY_SENSOR (FIX C-4)
# Rileva PIN duplicati tra utenti: se due o più utenti hanno lo stesso PIN,
# resolve_user assegna sempre all'utente con priorità più alta (master per primo),
# silenziando le credenziali degli altri. Il sensore va mostrato in dashboard
# come warning: on = collisione PIN attiva.
# ══════════════════════════════════════════════════════════════════════════
template:
  - binary_sensor:
      - name: "Keypad - Collisione PIN"
        unique_id: ring_keypad_pin_collision
        icon: mdi:shield-alert
        state: >
          {% set pins = [
            states('input_text.ring_keypad_pin_master'),
            states('input_text.ring_keypad_pin_user1'),
            states('input_text.ring_keypad_pin_user2'),
            states('input_text.ring_keypad_pin_user3')
          ] | select('match', '.{4,}') | list %}
          {{ pins | count != pins | unique | list | count }}
