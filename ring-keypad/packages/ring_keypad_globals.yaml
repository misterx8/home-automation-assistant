###############################################################################
# RING KEYPAD V2 - HELPERS GLOBALI
# Stato allarme, utenti, PIN, configurazione tastiere, LED
#
# ── PROTOCOLLO Z-WAVE (aggiornato) ───────────────────────────────────────────
# Entry Control CC: unknownClass_111/endpoint_0/{event_type}/{data_type}
# Indicator CC:     indicator/endpoint_0/{Name}/{sub_cmd}/set
# LED config:       configuration/endpoint_0/System_Security_Mode_Display/set
#
# ── PIN UTENTI ────────────────────────────────────────────────────────────────
# I PIN sono in modalità password (nascosti in UI). NON serve secrets.yaml.
# Impostare i PIN dalla UI di Home Assistant dopo il primo avvio.
# Lasciare vuoti gli utenti non utilizzati.
#
# ── TASTIERE ATTIVE ───────────────────────────────────────────────────────────
# In ring_keypad_active_keypads: inserire i topic base separati da virgola.
# Esempio: "tastiera_camera,tastiera_ingresso"
# Il topic base corrisponde al nome del nodo in zwave2mqtt.
###############################################################################

input_select:

  # ── STATO ALLARME (unica fonte di verità per tutti gli indicatori LED) ──────
  ring_keypad_alarm_state:
    name: "Keypad - Stato Allarme"
    options:
      - disarmed           # Sistema disarmato
      - armed_home         # Armato in modalità casa
      - armed_away         # Armato in modalità fuori
      - arming             # In fase di uscita (exit delay in corso)
      - triggered_burglar  # Allarme intrusione (CON suono)
      - triggered_rapina   # Anti-rapina (SEMPRE SILENZIOSO - Alarming_Burglar payload 1)
      - triggered_fire     # Allarme fuoco
      - triggered_medical  # Allarme medico
      - triggered_water    # Allarme perdita acqua
    initial: disarmed
    icon: mdi:shield-home

  # ── MODALITÀ LED TASTIERA ───────────────────────────────────────────────────
  # Controlla i LED di stato della tastiera (System_Security_Mode_Display)
  # Spenti=0, Lampeggio 3s=3, Sempre accesi=601
  ring_keypad_led_mode:
    name: "Keypad - Modalità LED"
    options:
      - "Spenti"
      - "Lampeggio (3s)"
      - "Sempre accesi"
    initial: "Sempre accesi"
    icon: mdi:led-outline

input_text:

  # ── REGISTRO TASTIERE ──────────────────────────────────────────────────────
  ring_keypad_active_keypads:
    name: "Keypad - Tastiere attive (topic base, separati da virgola)"
    initial: "tastiera_allarme_camera"
    max: 255
    icon: mdi:keyboard-settings

  # ── LOG E TRACCIAMENTO ─────────────────────────────────────────────────────
  ring_keypad_last_user:
    name: "Keypad - Ultimo utente"
    max: 32

  ring_keypad_last_event:
    name: "Keypad - Ultimo evento"
    max: 128

  ring_keypad_last_keypad:
    name: "Keypad - Ultima tastiera usata"
    max: 64

  # ── MODO ARMING TARGET ─────────────────────────────────────────────────────
  # Memorizza il target mode (armed_home/armed_away) all'avvio dell'arming.
  # Usato dall'integrazione per impostare il profilo corretto su allarme-core
  # prima di chiamare arm_allarme_core, garantendo il calcolo bypass sensori.
  ring_keypad_arming_target_mode:
    name: "Keypad - Modo arming target"
    max: 16
    icon: mdi:shield-arrow-up

  # ── PIN UTENTI (mode:password = nascosti in UI, non serve secrets.yaml) ────
  ring_keypad_pin_master:
    name: "Keypad PIN - Master"
    max: 16
    mode: password
    icon: mdi:shield-key

  ring_keypad_pin_user1:
    name: "Keypad PIN - Utente 1"
    max: 16
    mode: password
    icon: mdi:account-key

  ring_keypad_pin_user2:
    name: "Keypad PIN - Utente 2"
    max: 16
    mode: password
    icon: mdi:account-key

  ring_keypad_pin_user3:
    name: "Keypad PIN - Utente 3"
    max: 16
    mode: password
    icon: mdi:account-key

  # ── NOMI UTENTI ────────────────────────────────────────────────────────────
  ring_keypad_name_master:
    name: "Keypad Nome - Master"
    initial: "Master"
    max: 32

  ring_keypad_name_user1:
    name: "Keypad Nome - Utente 1"
    initial: "Utente 1"
    max: 32

  ring_keypad_name_user2:
    name: "Keypad Nome - Utente 2"
    initial: "Utente 2"
    max: 32

  ring_keypad_name_user3:
    name: "Keypad Nome - Utente 3"
    initial: "Utente 3"
    max: 32

input_number:

  ring_keypad_exit_delay:
    name: "Keypad - Exit Delay (sec)"
    min: 5
    max: 120
    step: 5
    initial: 30
    unit_of_measurement: "s"
    icon: mdi:timer-outline

  ring_keypad_siren_volume:
    name: "Keypad - Volume Sirena (1-10)"
    min: 1
    max: 10
    step: 1
    initial: 5
    icon: mdi:volume-high


input_boolean:

  ring_keypad_debug:
    name: "Keypad - Debug Mode"
    initial: false
    icon: mdi:bug

  ring_keypad_require_code_to_arm:
    name: "Keypad - Richiedi codice per armare"
    initial: false
    icon: mdi:shield-lock-outline

  # ── FEEDBACK VOCALE ────────────────────────────────────────────────────────
  # Se on: payload 99 (suono+LED) per disarmed/armed_home/armed_away
  # Se off: payload 1 (solo LED, nessun suono di conferma)
  ring_keypad_voice_feedback:
    name: "Keypad - Feedback vocale"
    initial: true
    icon: mdi:volume-high
