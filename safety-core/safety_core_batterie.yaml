# ============================================================================
# SAFETY CORE - BATTERIE & CONNETTIVITÀ
# Monitoraggio batteria e disponibilità sensori wireless Zigbee
# Generato automaticamente - modificare tipo_connessione in safety_core_sensori.yaml
# per attivare il monitoraggio (cambiare 'filare' in 'wireless')
#
# Versione semplificata rispetto ad allarme_core_batterie.yaml:
#   - Tutti i wrapper hanno solo sensore_origine (singolo)
#   - Unico percorso di risoluzione implementato:
#   C) sensore_origine presente → sensore singolo
#
# Filtro wrapper: binary_sensor.safety_core_*
#   Esclusi: _attivo, batteria_critica, sensore_offline
# ============================================================================

# ---------------------------------------------------------------------------
# HELPER: soglia batteria bassa e debounce offline
# ---------------------------------------------------------------------------
input_number:
  safety_core_soglia_batteria_bassa:
    name: "Safety Core Soglia Batteria Bassa"
    min: 5
    max: 50
    step: 5
    unit_of_measurement: "%"
    icon: mdi:battery-alert

  safety_core_debounce_offline_minuti:
    name: "Safety Core Debounce Offline (minuti)"
    min: 1
    max: 30
    step: 1
    unit_of_measurement: "min"
    icon: mdi:timer-outline

# ---------------------------------------------------------------------------
# TEMPLATE: sensori batteria e connettività
# ---------------------------------------------------------------------------
template:
  - sensor:

      # -----------------------------------------------------------------------
      # sensor.safety_core_batteria_minima
      # Restituisce il valore minimo di batteria tra tutti i sensori wireless.
      # Attributo 'dettaglio': lista completa dei wireless con batteria rilevata.
      # Attributo 'sensori_bassi': solo quelli sotto soglia.
      # -----------------------------------------------------------------------
      - name: "Safety Core Batteria Minima"
        unique_id: safety_core_batteria_minima
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        state: >
          {% set ns = namespace(batt_list=[]) %}
          {% set soglia = states('input_number.safety_core_soglia_batteria_bassa') | float(20) %}

          {% for s in states.binary_sensor
              | selectattr('entity_id', 'search', '^binary_sensor\.safety_core_')
              | rejectattr('entity_id', 'search', '_attivo|batteria_critica|sensore_offline') %}

            {% set tipo_conn = state_attr(s.entity_id, 'tipo_connessione') | default('filare') | string %}
            {% set sensore_sing = state_attr(s.entity_id, 'sensore_origine') %}

            {# === PERCORSO C: sensore_origine singolo === #}
            {% if tipo_conn == 'wireless' and sensore_sing is not none and sensore_sing | string not in ['','None','none'] %}
              {% set fisico = sensore_sing | string %}
              {% set nome_base = fisico.split('.')[1] %}
              {% set batt_ovr = state_attr(s.entity_id, 'batteria_origine') | default('') | string %}
              {% set batteria_entity = batt_ovr if (batt_ovr != '' and batt_ovr not in ['None','none']) else ('sensor.' ~ nome_base ~ '_battery') %}
              {% set batt = states(batteria_entity) | string %}
              {% if batt in ['true','True','on'] %}
                {# Batteria segnalata bassa (binario) — valore sintetico 5% #}
                {% set ns.batt_list = ns.batt_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'batteria': 5, 'nome': state_attr(s.entity_id,'friendly_name') | default(s.entity_id)}] %}
              {% elif batt not in ['unknown','unavailable','none','None','','false','False','off'] %}
                {# Valore numerico normale #}
                {% set batt_int = batt | int(-1) %}
                {% if batt_int >= 0 %}
                  {% set ns.batt_list = ns.batt_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'batteria': batt_int, 'nome': state_attr(s.entity_id,'friendly_name') | default(s.entity_id)}] %}
                {% endif %}
              {% elif batt in ['unknown','unavailable','none','None',''] %}
                {# Fallback: controlla binary_sensor.X_battery_low #}
                {% if states('binary_sensor.' ~ nome_base ~ '_battery_low') == 'on' %}
                  {% set ns.batt_list = ns.batt_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'batteria': 5, 'nome': state_attr(s.entity_id,'friendly_name') | default(s.entity_id)}] %}
                {% endif %}
              {% endif %}
            {% endif %}

          {% endfor %}

          {% if ns.batt_list | count > 0 %}
            {{ ns.batt_list | map(attribute='batteria') | min }}
          {% else %}
            unknown
          {% endif %}
        attributes:
          dettaglio: >
            {% set ns = namespace(batt_list=[]) %}

            {% for s in states.binary_sensor
                | selectattr('entity_id', 'search', '^binary_sensor\.safety_core_')
                | rejectattr('entity_id', 'search', '_attivo|batteria_critica|sensore_offline') %}

              {% set tipo_conn = state_attr(s.entity_id, 'tipo_connessione') | default('filare') | string %}
              {% set sensore_sing = state_attr(s.entity_id, 'sensore_origine') %}

              {# === PERCORSO C: sensore_origine singolo === #}
              {% if tipo_conn == 'wireless' and sensore_sing is not none and sensore_sing | string not in ['','None','none'] %}
                {% set fisico = sensore_sing | string %}
                {% set nome_base = fisico.split('.')[1] %}
                {% set batt_ovr = state_attr(s.entity_id, 'batteria_origine') | default('') | string %}
                {% set batteria_entity = batt_ovr if (batt_ovr != '' and batt_ovr not in ['None','none']) else ('sensor.' ~ nome_base ~ '_battery') %}
                {% set batt = states(batteria_entity) | string %}
                {% if batt in ['true','True','on'] %}
                  {# Batteria segnalata bassa (binario) — valore sintetico 5% #}
                  {% set ns.batt_list = ns.batt_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'batteria': 5, 'nome': state_attr(s.entity_id,'friendly_name') | default(s.entity_id)}] %}
                {% elif batt not in ['unknown','unavailable','none','None','','false','False','off'] %}
                  {# Valore numerico normale #}
                  {% set batt_int = batt | int(-1) %}
                  {% if batt_int >= 0 %}
                    {% set ns.batt_list = ns.batt_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'batteria': batt_int, 'nome': state_attr(s.entity_id,'friendly_name') | default(s.entity_id)}] %}
                  {% endif %}
                {% elif batt in ['unknown','unavailable','none','None',''] %}
                  {# Fallback: controlla binary_sensor.X_battery_low #}
                  {% if states('binary_sensor.' ~ nome_base ~ '_battery_low') == 'on' %}
                    {% set ns.batt_list = ns.batt_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'batteria': 5, 'nome': state_attr(s.entity_id,'friendly_name') | default(s.entity_id)}] %}
                  {% endif %}
                {% endif %}
              {% endif %}

            {% endfor %}

            {{ ns.batt_list }}
          sensori_bassi: >
            {% set ns = namespace(batt_list=[]) %}
            {% set soglia = states('input_number.safety_core_soglia_batteria_bassa') | float(20) %}

            {% for s in states.binary_sensor
                | selectattr('entity_id', 'search', '^binary_sensor\.safety_core_')
                | rejectattr('entity_id', 'search', '_attivo|batteria_critica|sensore_offline') %}

              {% set tipo_conn = state_attr(s.entity_id, 'tipo_connessione') | default('filare') | string %}
              {% set sensore_sing = state_attr(s.entity_id, 'sensore_origine') %}

              {# === PERCORSO C: sensore_origine singolo (filtro soglia) === #}
              {% if tipo_conn == 'wireless' and sensore_sing is not none and sensore_sing | string not in ['','None','none'] %}
                {% set fisico = sensore_sing | string %}
                {% set nome_base = fisico.split('.')[1] %}
                {% set batt_ovr = state_attr(s.entity_id, 'batteria_origine') | default('') | string %}
                {% set batteria_entity = batt_ovr if (batt_ovr != '' and batt_ovr not in ['None','none']) else ('sensor.' ~ nome_base ~ '_battery') %}
                {% set batt = states(batteria_entity) | string %}
                {% if batt in ['true','True','on'] %}
                  {# Batteria bassa binaria → 5% sintetico, sempre sotto soglia #}
                  {% set ns.batt_list = ns.batt_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'batteria': 5, 'nome': state_attr(s.entity_id,'friendly_name') | default(s.entity_id)}] %}
                {% elif batt not in ['unknown','unavailable','none','None','','false','False','off'] %}
                  {% set batt_int = batt | int(-1) %}
                  {% if batt_int >= 0 and batt_int < soglia %}
                    {% set ns.batt_list = ns.batt_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'batteria': batt_int, 'nome': state_attr(s.entity_id,'friendly_name') | default(s.entity_id)}] %}
                  {% endif %}
                {% elif batt in ['unknown','unavailable','none','None',''] %}
                  {# Fallback: controlla binary_sensor.X_battery_low #}
                  {% if states('binary_sensor.' ~ nome_base ~ '_battery_low') == 'on' %}
                    {% set ns.batt_list = ns.batt_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'batteria': 5, 'nome': state_attr(s.entity_id,'friendly_name') | default(s.entity_id)}] %}
                  {% endif %}
                {% endif %}
              {% endif %}

            {% endfor %}

            {{ ns.batt_list }}

      # -----------------------------------------------------------------------
      # sensor.safety_core_batterie_basse
      # Conta i sensori wireless con batteria sotto soglia.
      # Solo Percorso C: ogni wrapper ha un singolo sensore_origine.
      # -----------------------------------------------------------------------
      - name: "Safety Core Batterie Basse"
        unique_id: safety_core_batterie_basse
        unit_of_measurement: "sensori"
        state_class: measurement
        state: >
          {% set ns = namespace(batt_list=[]) %}
          {% set soglia = states('input_number.safety_core_soglia_batteria_bassa') | float(20) %}

          {% for s in states.binary_sensor
              | selectattr('entity_id', 'search', '^binary_sensor\.safety_core_')
              | rejectattr('entity_id', 'search', '_attivo|batteria_critica|sensore_offline') %}

            {% set tipo_conn = state_attr(s.entity_id, 'tipo_connessione') | default('filare') | string %}
            {% set sensore_sing = state_attr(s.entity_id, 'sensore_origine') %}

            {# === PERCORSO C: sensore_origine singolo (filtro soglia) === #}
            {% if tipo_conn == 'wireless' and sensore_sing is not none and sensore_sing | string not in ['','None','none'] %}
              {% set fisico = sensore_sing | string %}
              {% set nome_base = fisico.split('.')[1] %}
              {% set batt_ovr = state_attr(s.entity_id, 'batteria_origine') | default('') | string %}
              {% set batteria_entity = batt_ovr if (batt_ovr != '' and batt_ovr not in ['None','none']) else ('sensor.' ~ nome_base ~ '_battery') %}
              {% set batt = states(batteria_entity) | string %}
              {% if batt in ['true','True','on'] %}
                {# Batteria bassa binaria → 5% sintetico, sempre sotto soglia #}
                {% set ns.batt_list = ns.batt_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'batteria': 5, 'nome': state_attr(s.entity_id,'friendly_name') | default(s.entity_id)}] %}
              {% elif batt not in ['unknown','unavailable','none','None','','false','False','off'] %}
                {% set batt_int = batt | int(-1) %}
                {% if batt_int >= 0 and batt_int < soglia %}
                  {% set ns.batt_list = ns.batt_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'batteria': batt_int, 'nome': state_attr(s.entity_id,'friendly_name') | default(s.entity_id)}] %}
                {% endif %}
              {% elif batt in ['unknown','unavailable','none','None',''] %}
                {# Fallback: controlla binary_sensor.X_battery_low #}
                {% if states('binary_sensor.' ~ nome_base ~ '_battery_low') == 'on' %}
                  {% set ns.batt_list = ns.batt_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'batteria': 5, 'nome': state_attr(s.entity_id,'friendly_name') | default(s.entity_id)}] %}
                {% endif %}
              {% endif %}
            {% endif %}

          {% endfor %}

          {{ ns.batt_list | count }}
        attributes:
          lista: >
            {% set ns = namespace(batt_list=[]) %}
            {% set soglia = states('input_number.safety_core_soglia_batteria_bassa') | float(20) %}

            {% for s in states.binary_sensor
                | selectattr('entity_id', 'search', '^binary_sensor\.safety_core_')
                | rejectattr('entity_id', 'search', '_attivo|batteria_critica|sensore_offline') %}

              {% set tipo_conn = state_attr(s.entity_id, 'tipo_connessione') | default('filare') | string %}
              {% set sensore_sing = state_attr(s.entity_id, 'sensore_origine') %}

              {# === PERCORSO C: sensore_origine singolo (filtro soglia) === #}
              {% if tipo_conn == 'wireless' and sensore_sing is not none and sensore_sing | string not in ['','None','none'] %}
                {% set fisico = sensore_sing | string %}
                {% set nome_base = fisico.split('.')[1] %}
                {% set batt_ovr = state_attr(s.entity_id, 'batteria_origine') | default('') | string %}
                {% set batteria_entity = batt_ovr if (batt_ovr != '' and batt_ovr not in ['None','none']) else ('sensor.' ~ nome_base ~ '_battery') %}
                {% set batt = states(batteria_entity) | string %}
                {% if batt in ['true','True','on'] %}
                  {# Batteria bassa binaria → 5% sintetico, sempre sotto soglia #}
                  {% set ns.batt_list = ns.batt_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'batteria': 5, 'nome': state_attr(s.entity_id,'friendly_name') | default(s.entity_id)}] %}
                {% elif batt not in ['unknown','unavailable','none','None','','false','False','off'] %}
                  {% set batt_int = batt | int(-1) %}
                  {% if batt_int >= 0 and batt_int < soglia %}
                    {% set ns.batt_list = ns.batt_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'batteria': batt_int, 'nome': state_attr(s.entity_id,'friendly_name') | default(s.entity_id)}] %}
                  {% endif %}
                {% elif batt in ['unknown','unavailable','none','None',''] %}
                  {# Fallback: controlla binary_sensor.X_battery_low #}
                  {% if states('binary_sensor.' ~ nome_base ~ '_battery_low') == 'on' %}
                    {% set ns.batt_list = ns.batt_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'batteria': 5, 'nome': state_attr(s.entity_id,'friendly_name') | default(s.entity_id)}] %}
                  {% endif %}
                {% endif %}
              {% endif %}

            {% endfor %}

            {{ ns.batt_list }}

      # -----------------------------------------------------------------------
      # sensor.safety_core_sensori_offline
      # Conta i sensori wireless il cui canale di disponibilità risulta 'off'.
      # Solo Percorso C: ogni wrapper ha un singolo sensore_origine.
      # -----------------------------------------------------------------------
      - name: "Safety Core Sensori Offline"
        unique_id: safety_core_sensori_offline
        unit_of_measurement: "sensori"
        state_class: measurement
        state: >
          {% set ns = namespace(offline_list=[]) %}

          {% for s in states.binary_sensor
              | selectattr('entity_id', 'search', '^binary_sensor\.safety_core_')
              | rejectattr('entity_id', 'search', '_attivo|batteria_critica|sensore_offline') %}

            {% set tipo_conn = state_attr(s.entity_id, 'tipo_connessione') | default('filare') | string %}
            {% set sensore_sing = state_attr(s.entity_id, 'sensore_origine') %}

            {# === PERCORSO C: sensore_origine singolo === #}
            {% if tipo_conn == 'wireless' and sensore_sing is not none and sensore_sing | string not in ['','None','none'] %}
              {% set fisico = sensore_sing | string %}
              {% set nome_base = fisico.split('.')[1] %}
              {% set avail_ovr = state_attr(s.entity_id, 'disponibilita_origine') | default('') | string %}
              {% set avail_entity = avail_ovr if (avail_ovr != '' and avail_ovr not in ['None','none']) else ('binary_sensor.' ~ nome_base ~ '_availability') %}
              {% if states(avail_entity) == 'off' %}
                {% set ns.offline_list = ns.offline_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'nome': state_attr(s.entity_id,'friendly_name') | default(s.entity_id)}] %}
              {% endif %}
            {% endif %}

          {% endfor %}

          {{ ns.offline_list | count }}
        attributes:
          lista_offline: >
            {% set ns = namespace(offline_list=[]) %}

            {% for s in states.binary_sensor
                | selectattr('entity_id', 'search', '^binary_sensor\.safety_core_')
                | rejectattr('entity_id', 'search', '_attivo|batteria_critica|sensore_offline') %}

              {% set tipo_conn = state_attr(s.entity_id, 'tipo_connessione') | default('filare') | string %}
              {% set sensore_sing = state_attr(s.entity_id, 'sensore_origine') %}

              {# === PERCORSO C: sensore_origine singolo === #}
              {% if tipo_conn == 'wireless' and sensore_sing is not none and sensore_sing | string not in ['','None','none'] %}
                {% set fisico = sensore_sing | string %}
                {% set nome_base = fisico.split('.')[1] %}
                {% set avail_ovr = state_attr(s.entity_id, 'disponibilita_origine') | default('') | string %}
                {% set avail_entity = avail_ovr if (avail_ovr != '' and avail_ovr not in ['None','none']) else ('binary_sensor.' ~ nome_base ~ '_availability') %}
                {% if states(avail_entity) == 'off' %}
                  {% set ns.offline_list = ns.offline_list + [{'wrapper': s.entity_id, 'fisico': fisico, 'nome': state_attr(s.entity_id,'friendly_name') | default(s.entity_id)}] %}
                {% endif %}
              {% endif %}

            {% endfor %}

            {{ ns.offline_list }}

      # -----------------------------------------------------------------------
      # sensor.safety_core_stato_batterie
      # Sensore di riepilogo per Node-RED / automazioni: critical | warning | ok
      # critical: almeno un sensore sotto soglia batteria OPPURE almeno un offline
      # warning:  batterie basse > 0 (ridondante con critical, mantenuto per compatibilità)
      # ok:       tutto nella norma
      # -----------------------------------------------------------------------
      - name: "Safety Core Stato Batterie"
        unique_id: safety_core_stato_batterie
        state: >
          {% set critico = states('binary_sensor.safety_core_batteria_critica') == 'on' %}
          {% set offline  = states('binary_sensor.safety_core_sensore_offline') == 'on' %}
          {% set basse    = states('sensor.safety_core_batterie_basse') | int(0) %}
          {% if critico or offline %}
            critical
          {% elif basse > 0 %}
            warning
          {% else %}
            ok
          {% endif %}
        attributes:
          livello: >
            {% set critico = states('binary_sensor.safety_core_batteria_critica') == 'on' %}
            {% set offline  = states('binary_sensor.safety_core_sensore_offline') == 'on' %}
            {% set basse    = states('sensor.safety_core_batterie_basse') | int(0) %}
            {% if critico or offline %}
              critical
            {% elif basse > 0 %}
              warning
            {% else %}
              ok
            {% endif %}
          batteria_minima: "{{ states('sensor.safety_core_batteria_minima') | int(0) }}"
          contatore_batterie_basse: "{{ states('sensor.safety_core_batterie_basse') | int(0) }}"
          contatore_offline: "{{ states('sensor.safety_core_sensori_offline') | int(0) }}"
          batterie_basse: "{{ state_attr('sensor.safety_core_batterie_basse', 'lista') | default([]) }}"
          sensori_offline: "{{ state_attr('sensor.safety_core_sensori_offline', 'lista_offline') | default([]) }}"
          soglia_corrente: "{{ states('input_number.safety_core_soglia_batteria_bassa') | float(20) }}"
          ultimo_aggiornamento: "{{ now().isoformat() }}"

  - binary_sensor:

      # -----------------------------------------------------------------------
      # binary_sensor.safety_core_batteria_critica
      # ON se almeno un sensore wireless è sotto soglia batteria.
      # -----------------------------------------------------------------------
      - name: "Safety Core Batteria Critica"
        unique_id: safety_core_batteria_critica
        device_class: problem
        state: >
          {{ states('sensor.safety_core_batterie_basse') | int(0) > 0 }}

      # -----------------------------------------------------------------------
      # binary_sensor.safety_core_sensore_offline
      # ON se almeno un sensore wireless risulta offline (availability = off).
      # -----------------------------------------------------------------------
      - name: "Safety Core Sensore Offline"
        unique_id: safety_core_sensore_offline
        device_class: problem
        state: >
          {{ states('sensor.safety_core_sensori_offline') | int(0) > 0 }}
