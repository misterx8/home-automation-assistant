  - type: grid
    cards:
      - type: heading
        heading_style: title
        heading: Log Safety
        icon: mdi:math-log
      - type: tile
        grid_options:
          columns: 6
          rows: 1
        entity: script.safety_core_logbook_cancella_tutto
        name: Cancella tutti i log
        vertical: false
        tap_action:
          action: call-service
          service: script.turn_on
          service_data:
            entity_id: script.safety_core_logbook_cancella_tutto
        features_position: bottom
      - type: tile
        grid_options:
          columns: 6
          rows: 1
        entity: script.safety_core_logbook_nota
        name: Aggiungi Nota
        vertical: false
        tap_action:
          action: call-service
          service: browser_mod.popup
          service_data:
            title: Aggiungi nota al log
            content:
              type: entities
              entities:
                - entity: script.safety_core_logbook_nota
        features_position: bottom
      - type: custom:timeline-card
        title: 🛡️ Safety Core – Stato & Eventi
        hours: 24
        limit: 50
        overflow: scroll
        max_height: 420px
        relative_time: true
        refresh_interval: 30
        entities:
          - entity: input_select.safety_core_stato
            collapse_duplicates: true
            name: " "
            state_map:
              ok: OK
              triggered: ALLARME
            icon_map:
              ok: mdi:shield-check
              triggered: mdi:alarm-light
            icon_color_map:
              ok: green
              triggered: red
      - type: markdown
        title: 🧾 Safety Core – Registro
        content: >
          ### 📌 Ultimo evento **{{
          states('input_text.safety_core_logbook_ultimo_evento') }}**

          ---

          {% set c_raw =
          state_attr('var.safety_core_timeline_critici_md','long_state') |
          default('', true) | string %} {% set c_list = c_raw.split('\n') |
          map('trim') | reject('equalto','') | list %} ### 🚨 Critici ({{ c_list
          | length }}) {{ c_raw | trim if c_list | length > 0 else '_Nessun
          evento critico._' }}

          ---

          {% set o_raw =
          state_attr('var.safety_core_timeline_operazioni_md','long_state') |
          default('', true) | string %} {% set o_list = o_raw.split('\n') |
          map('trim') | reject('equalto','') | list %} ### ⚙️ Operazioni ({{
          o_list | length }}) {{ o_raw | trim if o_list | length > 0 else
          '_Nessuna operazione._' }}

          ---

          {% set n_raw =
          state_attr('var.safety_core_timeline_note_md','long_state') |
          default('', true) | string %} {% set n_list = n_raw.split('\n') |
          map('trim') | reject('equalto','') | list %} ### 📝 Note ({{ n_list |
          length }}) {{ n_raw | trim if n_list | length > 0 else '_Nessuna
          nota._' }}
      - type: markdown
        title: 🛡️ Safety Core – Ultimo Evento
        content: |
          **{{ states('input_text.safety_core_logbook_ultimo_evento') }}**
      - type: logbook
        title: 🛡️ Safety Core – Eventi
        entities:
          - input_text.safety_core_logbook_event
        hours_to_show: 24
  - type: grid
    cards:
      - type: heading
        heading: Immagini Safety
        heading_style: title
        icon: far:image
      - type: markdown
        title: 📸 Snapshot Safety
        content: >
          {% set s =
          state_attr('var.safety_core_last_snapshot_urls','long_state') |
          default('', true) | string %} {% set arr = s.split('\n') | map('trim')
          | reject('equalto','') | list %} {% set imgs = arr[:4] %} {% if
          imgs|length == 0 %} Nessuno snapshot disponibile. {% else %} {% for u
          in imgs %} [![]({{ u }})]({{ u }})

          {% endfor %} {% endif %}
      - type: markdown
        title: 🎥 Clip Safety (30s)
        content: >
          {% set s = state_attr('var.safety_core_last_clip_urls','long_state') |
          default('', true) | string %} {% set arr = s.split('\n') | map('trim')
          | reject('equalto','') | list %} {% set arr = arr[:4] %} {% if
          arr|length == 0 %} Nessuna clip disponibile. {% else %} {% for u in
          arr %} - [Apri clip {{ loop.index }}]({{ u }}) {% endfor %} {% endif
          %}
