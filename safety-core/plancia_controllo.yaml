type: sections
max_columns: 10
title: Safety Core
path: safety-core
icon: mdi:shield-alert
sections:
  - type: grid
    cards:
      - type: heading
        heading_style: title
        heading: Controllo Safety
        icon: mdi:shield-alert
      - type: tile
        entity: input_select.safety_core_stato
        name: Stato Sistema
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        card_mod:
          style: >
            {% set stato = states('input_select.safety_core_stato') %} {% set
            color = 'red' if stato == 'triggered' else 'green' %} ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 3px {{ color }};
              padding-left: 12px;
            }
      - type: tile
        entity: input_select.safety_core_ultima_categoria
        name: Ultima Categoria
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
      - type: tile
        entity: script.safety_core_reset
        name: Reset Manuale
        icon: mdi:shield-check
        vertical: false
        tap_action:
          action: call-service
          service: script.turn_on
          service_data:
            entity_id: script.safety_core_reset
        features_position: bottom
        grid_options:
          columns: 12
          rows: 1
      - type: heading
        heading: Stato Categorie
        heading_style: title
        icon: mdi:view-dashboard
      - type: tile
        entity: binary_sensor.safety_core_fumo_attivo
        name: Fumo
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        card_mod:
          style: >
            {% set on = is_state('binary_sensor.safety_core_fumo_attivo','on')
            %} ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px {{ 'red' if on else 'green' }};
              padding-left: 12px;
            }
      - type: tile
        entity: binary_sensor.safety_core_gas_attivo
        name: Gas
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        card_mod:
          style: >
            {% set on = is_state('binary_sensor.safety_core_gas_attivo','on') %}
            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px {{ 'red' if on else 'green' }};
              padding-left: 12px;
            }
      - type: tile
        entity: binary_sensor.safety_core_carbonio_attivo
        name: Monossido
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        card_mod:
          style: >
            {% set on =
            is_state('binary_sensor.safety_core_carbonio_attivo','on') %}
            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px {{ 'red' if on else 'green' }};
              padding-left: 12px;
            }
      - type: tile
        entity: binary_sensor.safety_core_acqua_attivo
        name: Acqua
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        card_mod:
          style: >
            {% set on = is_state('binary_sensor.safety_core_acqua_attivo','on')
            %} ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px {{ 'red' if on else 'green' }};
              padding-left: 12px;
            }
      - type: tile
        entity: binary_sensor.safety_core_qualsiasi_attivo
        name: Qualsiasi Allerta
        vertical: false
        features_position: bottom
        grid_options:
          columns: 12
          rows: 1
        card_mod:
          style: >
            {% set on =
            is_state('binary_sensor.safety_core_qualsiasi_attivo','on') %}
            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 3px {{ 'red' if on else 'green' }};
              padding-left: 12px;
            }
      - type: heading
        heading: Master Switch Categorie
        heading_style: title
        icon: mdi:toggle-switch
      - type: tile
        entity: input_boolean.safety_core_categoria_fumo_abilitato
        name: Categoria Fumo
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
      - type: tile
        entity: input_boolean.safety_core_categoria_gas_abilitato
        name: Categoria Gas
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
      - type: tile
        entity: input_boolean.safety_core_categoria_carbonio_abilitato
        name: Categoria Carbonio
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
      - type: tile
        entity: input_boolean.safety_core_categoria_acqua_abilitato
        name: Categoria Acqua
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
      - type: heading
        icon: mdi:pipe-valve
        heading: Controllo Elettrovalvole
        heading_style: title
      - type: tile
        entity: switch.eth_rly16_board1_relay_1
        name: Elettrovalvola GAS
        vertical: false
        features_position: bottom
      - type: tile
        entity: switch.eth_rly16_board2_relay_3
        name: Elettrovalvola Acqua
        vertical: false
        features_position: bottom
      - type: button
        name: Configurazione Avanzata
        icon: mdi:cog-outline
        grid_options:
          columns: 9
          rows: 1
        tap_action:
          action: perform-action
          perform_action: browser_mod.popup
          data:
            title: "⚙️ Configurazione Avanzata"
            content:
              type: vertical-stack
              cards:
                - type: entities
                  title: "🔗 URL & Credenziali"
                  entities:
                    - entity: input_text.safety_core_url_base_ha
                      name: URL Home Assistant
                    - entity: input_text.safety_core_url_base_frigate
                      name: URL Frigate
                - type: entities
                  title: "🎥 Clip Frigate"
                  entities:
                    - entity: input_number.safety_core_clip_secondi_prima
                      name: Clip — secondi prima
                    - entity: input_number.safety_core_clip_secondi_dopo
                      name: Clip — secondi dopo
                - type: entities
                  title: "🔋 Monitoraggio Batterie"
                  entities:
                    - entity: input_number.safety_core_soglia_batteria_bassa
                      name: Soglia batteria bassa
                    - entity: input_number.safety_core_debounce_offline_minuti
                      name: Debounce offline (minuti)
        card_mod:
          style: >
            {% set ha_ok = states('input_text.safety_core_url_base_ha') not in
            ['','unknown','unavailable'] %} {% set fr_ok =
            states('input_text.safety_core_url_base_frigate') not in
            ['','unknown','unavailable'] %} {% set all_ok = ha_ok and fr_ok %}
            {% set none_ok = not ha_ok and not fr_ok %} {% set border_color =
            'green' if all_ok else ('red' if none_ok else 'orange') %} ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 3px {{ border_color }};
              position: relative;
            } {% if not all_ok %} ha-card::after {
              content: "⚠️";
              position: absolute;
              top: 6px;
              right: 8px;
              font-size: 0.85em;
              pointer-events: none;
              z-index: 1;
            } {% endif %}
      - type: button
        name: Debug
        icon: mdi:bug-outline
        grid_options:
          columns: 3
          rows: 1
        card_mod:
          style: |
            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 3px #444;
              opacity: 0.5;
            }
        tap_action:
          action: perform-action
          perform_action: browser_mod.popup
          data:
            title: "🐛 Debug — Variabili"
            content:
              type: entities
              entities:
                - entity: var.safety_core_sensori_attivazione_var
                - entity: input_boolean.safety_core_reset_in_corso
                - entity: input_select.safety_core_ultima_categoria
                - entity: input_select.safety_core_stato
