        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        tap_action:
          action: call-service
          service: browser_mod.popup
          service_data:
            title: Gas Cucina — Dettagli
            content:
              type: entities
              entities:
                - entity: input_boolean.safety_core_gas_cucina_abilitato
                - entity: input_text.safety_core_gas_cucina_camera
                  secondary_info: last-updated
        card_mod:
          style: >
            {% set enabled =
            states('input_boolean.safety_core_gas_cucina_abilitato') %} {% set
            cat = states('input_boolean.safety_core_categoria_gas_abilitato') %}
            {% set fisico = states('binary_sensor.gas_cucina_vd4') %} {% set
            border_color = 'green' if (enabled == 'on' and cat == 'on') else
            'red' %} ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px {{ border_color }};
              padding-left: 12px;
              position: relative;
            } {% if enabled == 'off' or cat == 'off' %} ha-card::after {
              content: "🔕";
              position: absolute;
              top: 12px; right: 12px;
              font-size: 1.2em;
            } {% elif fisico in ['unknown','unavailable'] %} ha-card::after {
              content: "⚠️";
              position: absolute;
              top: 12px; right: 12px;
              font-size: 1.2em;
            } {% endif %}
