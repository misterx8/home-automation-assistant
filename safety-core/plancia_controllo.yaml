            content:
              type: entities
              entities:
                - entity: input_boolean.safety_core_gas_cucina_abilitato
                - entity: input_text.safety_core_gas_cucina_camera
                  secondary_info: last-updated
        card_mod:
          style: >
            {% set enabled =
            states('input_boolean.safety_core_gas_cucina_abilitato') %} {% set
            cat = states('input_boolean.safety_core_categoria_gas_abilitato') %}
            {% set sensore = states('binary_sensor.safety_core_gas_cucina') %}
            {# Anomalia fisico: legge sensore_origine dal wrapper tramite config.entity.
               Stesso approccio dinamico della plancia allarme-core — nessun entity hardcoded. #}
            {% set fisico_s = state_attr(config.entity, 'sensore_origine') %}
            {% set ns_fa = namespace(v=false) %}
            {% if fisico_s is not none and states(fisico_s) not in ['on','off'] %}
              {% set ns_fa.v = true %}
            {% endif %}
            {% set fisico_anomalo = enabled == 'on' and ns_fa.v %}

            {# Colore bordo: grigio=disabilitato | rosso=allarme | arancio=fisico anomalo | verde=ok #}
            {% set border_color = 'grey' if (enabled == 'off' or cat == 'off') else ('red' if sensore == 'on' else ('orange' if fisico_anomalo else 'green')) %}
            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px {{ border_color }};
              padding-left: 12px;
              position: relative;
            } {% if enabled == 'off' or cat == 'off' %} ha-card::after {
              content: "🔕";
              position: absolute;
              top: 12px; right: 12px;
              font-size: 1.2em;
            } {% elif fisico_anomalo %} ha-card::after {
              content: "⚠️";
              position: absolute;
              top: 12px; right: 12px;
              font-size: 1.2em;
            } {% endif %}
