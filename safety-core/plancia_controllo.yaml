              top: 12px; right: 12px;
              font-size: 1.2em;
            } {% elif fisico_anomalo %} ha-card::after {
              content: "⚠️";
              position: absolute;
              top: 12px; right: 12px;
              font-size: 1.2em;
            } {% endif %}
      - type: tile
        entity: binary_sensor.safety_core_fumo_tecnologico_pt
        name: Tecnologico PT
        vertical: false
        features_position: bottom
        grid_options:
          columns: 6
          rows: 1
        tap_action:
          action: call-service
          service: browser_mod.popup
          service_data:
            title: Fumo Tecnologico PT — Dettagli
            content:
              type: entities
              entities:
                - entity: input_boolean.safety_core_fumo_tecnologico_pt_abilitato
                - entity: input_text.safety_core_fumo_tecnologico_pt_camera
                  secondary_info: last-updated
        card_mod:
          style: >
            {% set enabled =
            states('input_boolean.safety_core_fumo_tecnologico_pt_abilitato') %}
            {% set cat =
            states('input_boolean.safety_core_categoria_fumo_abilitato') %}
            {% set sensore = states('binary_sensor.safety_core_fumo_tecnologico_pt') %}
            {# Anomalia fisico: legge sensore_origine dal wrapper tramite config.entity.
               Stesso approccio dinamico della plancia allarme-core — nessun entity hardcoded. #}
            {% set fisico_s = state_attr(config.entity, 'sensore_origine') %}
            {% set ns_fa = namespace(v=false) %}
            {% if fisico_s is not none and states(fisico_s) not in ['on','off'] %}
              {% set ns_fa.v = true %}
            {% endif %}
            {% set fisico_anomalo = enabled == 'on' and ns_fa.v %}

            {# Colore bordo: grigio=disabilitato | rosso=allarme | arancio=fisico anomalo | verde=ok #}
            {% set border_color = 'grey' if (enabled == 'off' or cat == 'off') else ('red' if sensore == 'on' else ('orange' if fisico_anomalo else 'green')) %}
            ha-card {
              border-radius: 30px;
              box-shadow: 0 0 0 2px {{ border_color }};
              padding-left: 12px;
              position: relative;
            } {% if enabled == 'off' or cat == 'off' %} ha-card::after {
              content: "🔕";
              position: absolute;
              top: 12px; right: 12px;
              font-size: 1.2em;
            } {% elif fisico_anomalo %} ha-card::after {
              content: "⚠️";
              position: absolute;
              top: 12px; right: 12px;
              font-size: 1.2em;
            } {% endif %}
  - type: grid
    cards:
      - type: heading
        heading_style: title
        heading: Log & Attività
        icon: mdi:math-log
      - type: button
        grid_options:
          columns: 6
          rows: 2
        name: Registro
        icon: mdi:book-open-outline
        tap_action:
          action: perform-action
          perform_action: browser_mod.popup
          data:
            title: Registro Log Safety Core
            content:
              type: vertical-stack
              cards:
                - type: markdown
                  title: Critici
                  content: >
                    {% set c_raw =
                    state_attr('var.safety_core_timeline_critici_md','long_state')
                    | default('', true) | string %} {% set c_list =
                    c_raw.split('\n') | map('trim') | reject('equalto','') |
                    list %} ### 🚨 Critici ({{ c_list | length }}) {{ c_raw |
                    trim if c_list | length > 0 else '_Nessun evento critico._'
                    }}
                  card_mod:
                    style: |
                      ha-markdown {
                        max-height: 200px;
                        overflow-y: auto;
                        display: block;
                      }
                - type: markdown
                  title: Operazioni
                  content: >
                    {% set o_raw =
                    state_attr('var.safety_core_timeline_operazioni_md','long_state')
                    | default('', true) | string %} {% set o_list =
                    o_raw.split('\n') | map('trim') | reject('equalto','') |
                    list %} ### ⚙️ Operazioni ({{ o_list | length }}) {{ o_raw |
                    trim if o_list | length > 0 else '_Nessuna operazione._' }}
                  card_mod:
                    style: |
                      ha-markdown {
                        max-height: 200px;
                        overflow-y: auto;
                        display: block;
                      }
                - type: markdown
                  title: Note
                  content: >
                    {% set n_raw =
                    state_attr('var.safety_core_timeline_note_md','long_state')
                    | default('', true) | string %} {% set n_list =
                    n_raw.split('\n') | map('trim') | reject('equalto','') |
                    list %} ### 📝 Note ({{ n_list | length }}) {{ n_raw | trim
                    if n_list | length > 0 else '_Nessuna nota._' }}
                  card_mod:
                    style: |
                      ha-markdown {
                        max-height: 200px;
                        overflow-y: auto;
                        display: block;
                      }
      - type: tile
        grid_options:
          columns: 4
          rows: 1
        entity: script.safety_core_logbook_cancella_tutto
        name: Cancella Log
        vertical: false
        tap_action:
          action: toggle
        icon_tap_action:
          action: toggle
        features_position: bottom
      - type: tile
        grid_options:
          columns: 4
          rows: 1
        entity: script.safety_core_logbook_nota_da_ui
        name: Aggiungi Nota
        icon: mdi:note-plus
        vertical: false
        tap_action:
          action: perform-action
          perform_action: browser_mod.popup
          data:
            title: Aggiungi nota al log
            content:
              type: entities
              entities:
                - entity: input_text.safety_core_nota_manuale
                  name: Testo della nota
                - entity: script.safety_core_logbook_nota_da_ui
                  name: Salva nota
        features_position: bottom
      - type: custom:timeline-card
        title: Safety Core – Stato & Eventi
        hours: 24
        limit: 50
        overflow: scroll
        max_height: 480px
        relative_time: true
        refresh_interval: 30
        entities:
          - entity: input_select.safety_core_stato
            collapse_duplicates: true
            name: Stato
            state_map:
              ok: OK
              triggered: ALLARME
            icon_map:
              ok: mdi:shield-check
              triggered: mdi:alarm-light
            icon_color_map:
              ok: green
              triggered: red
          - entity: input_select.safety_core_ultima_categoria
            collapse_duplicates: true
            name: Categoria
            state_map:
              nessuna: NESSUNA
              fumo: FUMO
              gas: GAS
              carbonio: CARBONIO
              acqua: ACQUA
            icon_map:
              nessuna: mdi:shield-off-outline
              fumo: mdi:smoke-detector
              gas: mdi:gas-cylinder
              carbonio: mdi:molecule-co
              acqua: mdi:water-alert
            icon_color_map:
              nessuna: grey
              fumo: orange
              gas: yellow
              carbonio: purple
              acqua: blue
      - type: tile
        grid_options:
          columns: 12
          rows: 1
        entity: input_text.safety_core_logbook_ultimo_evento
        name: Ultimo Evento
        vertical: false
        features_position: bottom
      - type: logbook
        title: Safety Core – Eventi
        entities:
          - input_text.safety_core_logbook_event
        hours_to_show: 24
  - type: grid
    cards:
      - type: heading
        heading: Immagini
        heading_style: title
        icon: far:image
      - type: markdown
        title: 📸 Snapshot Safety
        content: >
          {% set s =
          state_attr('var.safety_core_last_snapshot_urls','long_state') |
          default('', true) | string %} {% set arr = s.split('\n') | map('trim')
          | reject('equalto','') | list %} {% set imgs = arr[:4] %} {% set
          base_raw = states('input_text.safety_core_url_base_ha') | trim %} {%
          set base = '' if base_raw in ['unknown','unavailable'] else base_raw
          %} {% if imgs|length == 0 %} Nessuno snapshot disponibile. {% else %}
          {% for u in imgs %} [![]({{ base ~ u }})]({{ base ~ u }}) {% endfor %} {%
          endif %}
      - type: markdown
        title: 🎥 Clip Safety
        content: >
          _{{ states('input_number.safety_core_clip_secondi_prima') | int(30)
          }}s prima + {{ states('input_number.safety_core_clip_secondi_dopo') |
          int(10) }}s dopo_

          {% set s = state_attr('var.safety_core_last_clip_urls','long_state') |
          default('', true) | string %} {% set arr = s.split('\n') | map('trim')
          | reject('equalto','') | list %} {% set arr = arr[:4] %} {% if
          arr|length == 0 %} Nessuna clip disponibile. {% else %} {% for u in
          arr %} - [Apri clip {{ loop.index }}]({{ u }}) {% endfor %} {% endif
          %}
  - type: grid
    cards:
      - type: heading
        heading: Batterie & Connettività
        heading_style: title
        icon: mdi:battery-heart-variant
      - type: gauge
        entity: sensor.safety_core_batteria_minima
        name: "Batteria Minima"
        min: 0
        max: 100
        severity:
          green: 30
          yellow: 20
          red: 0
        needle: true
      - type: entity
        entity: sensor.safety_core_batterie_basse
        name: "Batterie Basse"
        icon: mdi:battery-alert
      - type: entity
        entity: sensor.safety_core_sensori_offline
        name: "Sensori Offline"
        icon: mdi:wifi-off
      - type: markdown
        title: "Sensori con batteria bassa"
        content: |-
          {% set lista = state_attr('sensor.safety_core_batterie_basse', 'lista') | default([]) %}
          {% if lista | length == 0 %}
          Nessun sensore sotto soglia.
          {% else %}
          | Nome | Batteria |
          |------|----------|
          {% for s in lista %}| {{ s.nome }} | {{ s.batteria }}% |
          {% endfor %}{% endif %}
      - type: markdown
        title: "Sensori offline"
        content: |-
          {% set lista = state_attr('sensor.safety_core_sensori_offline', 'lista_offline') | default([]) %}
          {% if lista | length == 0 %}
          Tutti i sensori sono online.
          {% else %}
          | Nome | Fisico |
          |------|--------|
          {% for s in lista %}| {{ s.nome }} | {{ s.fisico }} |
          {% endfor %}{% endif %}

