      device_class: moisture
      state: >
        {% set fisico = states('binary_sensor.sensore_acqua_lavanderia') %}
        {% set abilitato = is_state('input_boolean.safety_core_acqua_lavanderia_abilitato','on')
                        and is_state('input_boolean.safety_core_categoria_acqua_abilitato','on') %}
        {% if fisico in ['on','off'] %}
          {{ 'on' if (abilitato and fisico == 'on') else 'off' }}
        {% else %}
          off
        {% endif %}
      attributes:
        sensore_origine: binary_sensor.sensore_acqua_lavanderia
        tipo: acqua
        priorita: alta
        camera: "{{ states('input_text.safety_core_acqua_lavanderia_camera').split(',') }}"
        abilitato: "{{ is_state('input_boolean.safety_core_acqua_lavanderia_abilitato','on') }}"
        categoria_abilitata: "{{ is_state('input_boolean.safety_core_categoria_acqua_abilitato','on') }}"
        tipo_connessione: wireless
        batteria_origine: ""
        disponibilita_origine: ""

