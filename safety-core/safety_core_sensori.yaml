# ============================================================================
# SAFETY CORE - SENSORI
# Gestione sensori fumo, gas, monossido di carbonio e perdite d'acqua.
# Filosofia identica ad allarme_core_sensori.yaml:
#   - input_boolean per abilitare/disabilitare ogni singolo sensore
#   - input_text per associare telecamere al sensore
#   - binary_sensor template che wrappa il sensore fisico
# Prefisso entità: safety_core_
# ============================================================================

# ----------------------------------------------------------------------------
# INPUT BOOLEAN — abilitazione singolo sensore
# Ogni sensore può essere disabilitato individualmente dalla UI
# ----------------------------------------------------------------------------
input_boolean:

  # region fumo
  safety_core_fumo_studio_abilitato:
    name: "Safety Fumo Studio Abilitato"
    icon: mdi:smoke-detector
  safety_core_fumo_ufficio_abilitato:
    name: "Safety Fumo Ufficio Abilitato"
    icon: mdi:smoke-detector
  safety_core_fumo_tecnologico_p1_abilitato:
    name: "Safety Fumo Tecnologico P1 Abilitato"
    icon: mdi:smoke-detector
  safety_core_fumo_cucina_abilitato:
    name: "Safety Fumo Cucina Abilitato"
    icon: mdi:smoke-detector
  safety_core_fumo_solaio_abilitato:
    name: "Safety Fumo Solaio Abilitato"
    icon: mdi:smoke-detector
  safety_core_fumo_tecnologico_pt_abilitato:
    name: "Safety Fumo Tecnologico PT Abilitato"
    icon: mdi:smoke-detector
  # endregion

  # region gas e monossido
  safety_core_gas_cucina_abilitato:
    name: "Safety Gas Cucina Abilitato"
    icon: mdi:gas-cylinder
  safety_core_gas_caldaia_abilitato:
    name: "Safety Gas Caldaia Abilitato"
    icon: mdi:gas-cylinder
  safety_core_gas_studio_abilitato:
    name: "Safety Gas Studio Abilitato"
    icon: mdi:gas-cylinder
  safety_core_carbonio_taverna_abilitato:
    name: "Safety Carbonio Taverna Abilitato"
    icon: mdi:molecule-co
  # endregion

  #region acqua
  safety_core_acqua_vasca_abilitato:
    name: "Safety Acqua Vasca Abilitato"
    icon: mdi:water-alert
  safety_core_acqua_bagno_abilitato:
    name: "Safety Acqua Bagno Abilitato"
    icon: mdi:water-alert
  safety_core_acqua_cucina_principale_abilitato:
    name: "Safety Acqua Cucina Principale Abilitato"
    icon: mdi:water-alert
  safety_core_acqua_doccia_abilitato:
    name: "Safety Acqua Doccia Abilitato"
    icon: mdi:water-alert
  safety_core_acqua_lavanderia_abilitato:
    name: "Safety Acqua Lavanderia Abilitato"
    icon: mdi:water-alert
  safety_core_acqua_lavello_cucina_abilitato:
    name: "Safety Acqua Lavello Cucina Abilitato"
    icon: mdi:water-alert
  safety_core_acqua_studio_abilitato:
    name: "Safety Acqua Studio Abilitato"
    icon: mdi:water-alert
  safety_core_acqua_stufa_abilitato:
    name: "Safety Acqua Stufa Abilitato"
    icon: mdi:water-alert
  safety_core_acqua_tecnologico_pt_abilitato:
    name: "Safety Acqua Tecnologico PT Abilitato"
    icon: mdi:water-alert
  # endregion

  # ----------------------------------------------------------------------------
  # INPUT BOOLEAN — abilitazione per tipologia (master switch per categoria)
  # Disabilitando una categoria si disabilitano tutti i sensori di quel tipo
  # ----------------------------------------------------------------------------
  safety_core_categoria_fumo_abilitato:
    name: "Safety Categoria Fumo Abilitata"
    icon: mdi:smoke-detector-variant
  safety_core_categoria_gas_abilitato:
    name: "Safety Categoria Gas Abilitata"
    icon: mdi:gas-burner
  safety_core_categoria_carbonio_abilitato:
    name: "Safety Categoria Carbonio Abilitata"
    icon: mdi:molecule-co
  safety_core_categoria_acqua_abilitato:
    name: "Safety Categoria Acqua Abilitata"
    icon: mdi:water-alert


# ----------------------------------------------------------------------------
# INPUT TEXT — associazione telecamere per ogni sensore
# Stessa logica di allarme_core: lista separata da virgole
# ----------------------------------------------------------------------------
input_text:

  # region fumo
  safety_core_fumo_studio_camera:
    name: "Camera Fumo Studio Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  safety_core_fumo_ufficio_camera:
    name: "Camera Fumo Ufficio Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  safety_core_fumo_tecnologico_p1_camera:
    name: "Camera Fumo Tecnologico P1 Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  safety_core_fumo_cucina_camera:
    name: "Camera Fumo Cucina Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  safety_core_fumo_solaio_camera:
    name: "Camera Fumo Solaio Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  safety_core_fumo_tecnologico_pt_camera:
    name: "Camera Fumo Tecnologico PT Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  # endregion

  # region gas e monossido
  safety_core_gas_cucina_camera:
    name: "Camera Gas Cucina Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  safety_core_gas_caldaia_camera:
    name: "Camera Gas Caldaia Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  safety_core_gas_studio_camera:
    name: "Camera Gas Studio Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  safety_core_carbonio_taverna_camera:
    name: "Camera Carbonio Taverna Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  # endregion

  #region acqua
  safety_core_acqua_vasca_camera:
    name: "Camera Acqua Vasca Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  safety_core_acqua_bagno_camera:
    name: "Camera Acqua Bagno Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  safety_core_acqua_cucina_principale_camera:
    name: "Camera Acqua Cucina Principale Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  safety_core_acqua_doccia_camera:
    name: "Camera Acqua Doccia Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  safety_core_acqua_lavanderia_camera:
    name: "Camera Acqua Lavanderia Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  safety_core_acqua_lavello_cucina_camera:
    name: "Camera Acqua Lavello Cucina Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  safety_core_acqua_studio_camera:
    name: "Camera Acqua Studio Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  safety_core_acqua_stufa_camera:
    name: "Camera Acqua Stufa Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  safety_core_acqua_tecnologico_pt_camera:
    name: "Camera Acqua Tecnologico PT Safety"
    pattern: "^[^,]+(,[^,]+)*$"
  # endregion


# ----------------------------------------------------------------------------
# TEMPLATE BINARY SENSOR — wrap dei sensori fisici
# Logica: il sensore è attivo solo se:
#   1. il master switch della categoria è ON
#   2. il singolo input_boolean del sensore è ON
#   3. il sensore fisico sottostante è ON
# ----------------------------------------------------------------------------
template:
  - binary_sensor:

    # region fumo

    - name: "Safety Core Fumo Studio"
      unique_id: safety_core_fumo_studio
      device_class: smoke
      state: >
        {% set fisico = states('binary_sensor.sensore_fumo_studio') %}
        {% set abilitato = is_state('input_boolean.safety_core_fumo_studio_abilitato','on')
                        and is_state('input_boolean.safety_core_categoria_fumo_abilitato','on') %}
        {% if fisico in ['on','off'] %}
          {{ 'on' if (abilitato and fisico == 'on') else 'off' }}
        {% else %}
          off
        {% endif %}
      attributes:
        sensore_origine: binary_sensor.sensore_fumo_studio
        tipo: fumo
        priorita: alta
        camera: "{{ states('input_text.safety_core_fumo_studio_camera').split(',') }}"
        abilitato: "{{ is_state('input_boolean.safety_core_fumo_studio_abilitato','on') }}"
        categoria_abilitata: "{{ is_state('input_boolean.safety_core_categoria_fumo_abilitato','on') }}"
        tipo_connessione: wireless
        batteria_origine: sensor.batteria_sensore_fumo_studio
        disponibilita_origine: binary_sensor.disponibilita_sensore_fumo_studio

