    # ----------------------------------------------------------------------------
    # SENSORI AGGREGATI PER CATEGORIA
    # Utili per dashboard e automazioni: un singolo binary_sensor per categoria
    # ----------------------------------------------------------------------------

    - name: "Safety Core Fumo Attivo"
      unique_id: safety_core_fumo_attivo
      device_class: smoke
      state: >
        {{
          states.binary_sensor
            | selectattr('entity_id','search','binary_sensor.safety_core_fumo_')
            | rejectattr('entity_id','search','_attivo')
            | selectattr('state','eq','on')
            | list | count > 0
        }}
      attributes:
        sensori_attivi: >
          {{
            states.binary_sensor
              | selectattr('entity_id','search','binary_sensor.safety_core_fumo_')
              | rejectattr('entity_id','search','_attivo')
              | selectattr('state','eq','on')
              | map(attribute='entity_id')
              | list
          }}

